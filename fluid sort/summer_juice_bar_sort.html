// ============================================================
// TWEEN ENGINE (GSAP-style subset)
// ============================================================
const tweens = [];
function tween(obj, to, dur, opts) {
  opts = opts || {};
  const from = {};
  for (const k in to) from[k] = obj[k];
  const t = {
    obj, from, to, dur,
    ease: opts.ease || 'outSine',
    onUpdate: opts.onUpdate || null,
    onComplete: opts.onComplete || null,
    delay: opts.delay || 0,
    elapsed: 0,
    alive: true
  };
  tweens.push(t);
  return t;
}
function killTweensOf(obj, keys) {
  for (const t of tweens) {
    if (t.obj !== obj) continue;
    if (!keys) { t.alive = false; continue; }
    for (const k of keys) if (k in t.to) { t.alive = false; break; }
  }
}
const EASE = {
  linear:    t => t,
  outSine:   t => Math.sin(t * Math.PI / 2),
  inSine:    t => 1 - Math.cos(t * Math.PI / 2),
  inOutSine: t => -(Math.cos(Math.PI * t) - 1) / 2,
  outQuad:   t => 1 - (1-t)*(1-t),
  inQuad:    t => t*t,
  outCubic:  t => 1 - Math.pow(1-t, 3),
  inCubic:   t => t*t*t,
  inOutCubic: t => t<0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2,
  outBack:   t => { const c1=1.70158, c3=c1+1; return 1 + c3*Math.pow(t-1,3) + c1*Math.pow(t-1,2); },
  outElastic: t => {
    if (t===0 || t===1) return t;
    const c = (2*Math.PI)/3;
    return Math.pow(2,-10*t) * Math.sin((t*10-0.75)*c) + 1;
  },
  outBounce: t => {
    const n1 = 7.5625, d1 = 2.75;
    if (t < 1/d1) return n1 * t * t;
    if (t < 2/d1) { t -= 1.5/d1; return n1 * t * t + 0.75; }
    if (t < 2.5/d1) { t -= 2.25/d1; return n1 * t * t + 0.9375; }
    t -= 2.625/d1; return n1 * t * t + 0.984375;
  }
};
function updateTweens(dt) {
  for (let i = tweens.length - 1; i >= 0; i--) {
    const t = tweens[i];
    if (!t.alive) { tweens.splice(i, 1); continue; }
    if (t.delay > 0) { t.delay -= dt; continue; }
    t.elapsed += dt;
    const k = t.dur > 0 ? Math.min(1, t.elapsed / t.dur) : 1;
    const e = EASE[t.ease](k);
    for (const key in t.to) {
      t.obj[key] = t.from[key] + (t.to[key] - t.from[key]) * e;
    }
    if (t.onUpdate) t.onUpdate();
    if (k >= 1) {
      if (t.onComplete) t.onComplete();
      tweens.splice(i, 1);
    }
  }
}

// ============================================================
// AUDIO (Web Audio API — procedural SFX & music, no external assets)
// Maps the Magic Sort sound bank onto a juice-bar tropical timbre.
// ============================================================
let audioCtx = null;
let audioMaster = null;
let audioMuted = false;
let ambientTimer = null;

function initAudio() {
  if (audioCtx) return;
  const Ctx = window.AudioContext || window.webkitAudioContext;
  if (!Ctx) return;
  try {
    audioCtx = new Ctx();
    audioMaster = audioCtx.createGain();
    audioMaster.gain.value = 0.55;
    audioMaster.connect(audioCtx.destination);
  } catch (e) { audioCtx = null; }
}
function audioResume() {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
}

// Single-oscillator note with ADSR-ish envelope and optional pitch sweep.
function playTone(opts) {
  if (!audioCtx || audioMuted) return;
  const o = opts || {};
  const freq    = o.freq    || 440;
  const dur     = o.dur     || 0.12;
  const type    = o.type    || 'sine';
  const vol     = o.vol     || 0.25;
  const attack  = o.attack  || 0.005;
  const release = o.release || 0.05;
  const sweep   = o.sweep   || 0;
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  if (sweep) {
    const target = Math.max(40, freq + sweep);
    osc.frequency.exponentialRampToValueAtTime(target, t0 + dur);
  }
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol, t0 + attack);
  g.gain.linearRampToValueAtTime(0, t0 + dur + release);
  osc.connect(g);
  g.connect(audioMaster);
  osc.start(t0);
  osc.stop(t0 + dur + release + 0.02);
}

// Filtered white noise burst — for splashes, pour streams, swooshes.
function playNoise(opts) {
  if (!audioCtx || audioMuted) return;
  const o = opts || {};
  const dur     = o.dur     || 0.1;
  const vol     = o.vol     || 0.25;
  const freq    = o.freq    || 1500;
  const q       = o.q       || 4;
  const attack  = o.attack  || 0.005;
  const release = o.release || 0.06;
  const ftype   = o.filter  || 'bandpass';
  const t0 = audioCtx.currentTime;
  const len = Math.ceil((dur + release) * audioCtx.sampleRate);
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const filt = audioCtx.createBiquadFilter();
  filt.type = ftype;
  filt.frequency.value = freq;
  filt.Q.value = q;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol, t0 + attack);
  g.gain.linearRampToValueAtTime(0, t0 + dur + release);
  src.connect(filt);
  filt.connect(g);
  g.connect(audioMaster);
  src.start(t0);
  src.stop(t0 + dur + release + 0.02);
}

// "bottle_up": glass tinkle picking up — short rising triangle
function sfxBottleUp() {

}
// "bottle_down": glass tinkle settling — short falling triangle
function sfxBottleDown() {
  playTone({ freq: 720, dur: 0.07, type: 'triangle', vol: 0.18, sweep: -340, attack: 0.002 });
}
// "Short_1/Mid/Long": pour stream — bandpassed noise
function sfxPour() {
  playNoise({ dur: 0.5, vol: 0.16, freq: 1800, q: 3, attack: 0.05, release: 0.18 });
}
// "water_short" + tonal blob: liquid landing splash. Soft attack on both
// layers + lower frequencies so it reads as "water plop" rather than a
// sharp percussive burst (the previous 2ms attack was creating a "puff"
// transient that sounded like a mini-explosion).
function sfxSplash() {
  playNoise({ dur: 0.13, vol: 0.10, freq: 1300, q: 5, attack: 0.025, release: 0.08 });
  playTone({ freq: 350, dur: 0.10, type: 'sine', vol: 0.07, sweep: -100, attack: 0.015, release: 0.05 });
}
// "glass_shake": invalid pour — low square bonk
function sfxInvalid() {
  playTone({ freq: 180, dur: 0.13, type: 'square', vol: 0.16, sweep: -40, attack: 0.005, release: 0.06 });
}
// "Cork_Low" + ice_crack reskinned: umbrella swoosh + 2 ice clinks
function sfxSealed() {
  playNoise({ dur: 0.18, vol: 0.14, freq: 4000, q: 1, attack: 0.005, release: 0.08 });
  setTimeout(() => playTone({ freq: 2400, dur: 0.05, type: 'triangle', vol: 0.18, attack: 0.001 }), 240);

}
// Pink reaches goal — sounds like LIQUID FILLING A GLASS. Three layers
// recreate the physical effect:
//   1. Tonal pitch sweeping UP (the resonance of the shrinking air column
//      above the rising water — the iconic "glug-glug rising in pitch")
//   2. Bandpassed noise → soft burble of the flowing liquid
//   3. Low triangle body → weight/thump of the pour
function sfxGoalProgress() {
  playTone({ freq: 285, dur: 0.55, type: 'sine',     vol: 0.13, sweep: 415, attack: 0.04, release: 0.18 });
  playNoise({ dur: 0.5,  vol: 0.07, freq: 1100, q: 5,            attack: 0.05, release: 0.15 });
  playTone({ freq: 160, dur: 0.45, type: 'triangle', vol: 0.04, sweep: 80,  attack: 0.06, release: 0.12 });
}
// "win" + "confetti-pop": triumphant arpeggio
function sfxWin() {
  const notes = [523, 659, 784, 1047, 1319]; // C E G C E
  notes.forEach((f, i) => setTimeout(
    () => playTone({ freq: f, dur: 0.18, type: 'triangle', vol: 0.22, attack: 0.005, release: 0.1 }),

  ));

function sfxClick() {
  playTone({ freq: 1100, dur: 0.04, type: 'sine', vol: 0.2, attack: 0.001 });
}

// "ambient" (20s loop in the original): light, plucky melody on a major
// scale — gives a beach-bar atmosphere without overpowering the SFX.
function startAmbient() {
  if (!audioCtx || audioMuted || ambientTimer) return;
  const pattern = [
    { f: 392, d: 0.35 }, { f: 523, d: 0.35 },
    { f: 659, d: 0.35 }, { f: 523, d: 0.35 },
    { f: 587, d: 0.35 }, { f: 698, d: 0.35 },
    { f: 587, d: 0.35 }, { f: 392, d: 0.55 }
  ];
  let idx = 0;
  function tick() {
    if (audioMuted || !audioCtx) { ambientTimer = null; return; }
    const note = pattern[idx % pattern.length];
    const t0 = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = note.f;
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(0.04, t0 + 0.04);
    g.gain.exponentialRampToValueAtTime(0.0008, t0 + note.d);
    osc.connect(g);
    g.connect(audioMaster);
    osc.start(t0);
    osc.stop(t0 + note.d + 0.05);
    idx++;
    ambientTimer = setTimeout(tick, note.d * 1000);
  }
  tick();
}
function stopAmbient() { if (ambientTimer) { clearTimeout(ambientTimer); ambientTimer = null; } }
