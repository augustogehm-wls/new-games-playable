<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,user-scalable=no,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,viewport-fit=cover">
<title>Summer Juice Bar Sort</title>
<style>
* { padding:0; margin:0; user-select:none; -webkit-user-select:none; -moz-user-select:none; -ms-user-select:none; }
html, body { background:#1d2229; position:absolute; top:0; right:0; left:0; bottom:0; overflow:hidden; }
canvas { position:fixed; top:0; left:0; display:block; touch-action:manipulation; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
'use strict';

// ============================================================
// SETUP
// ============================================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;

function resize() {
  DPR = Math.min(2, window.devicePixelRatio || 1);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  layoutBottles();
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', resize);

// ============================================================
// TWEEN ENGINE (GSAP-style subset)
// ============================================================
const tweens = [];
function tween(obj, to, dur, opts) {
  opts = opts || {};
  const from = {};
  for (const k in to) from[k] = obj[k];
  const t = {
    obj, from, to, dur,
    ease: opts.ease || 'outSine',
    onUpdate: opts.onUpdate || null,
    onComplete: opts.onComplete || null,
    delay: opts.delay || 0,
    elapsed: 0,
    alive: true
  };
  tweens.push(t);
  return t;
}
function killTweensOf(obj, keys) {
  for (const t of tweens) {
    if (t.obj !== obj) continue;
    if (!keys) { t.alive = false; continue; }
    for (const k of keys) if (k in t.to) { t.alive = false; break; }
  }
}
const EASE = {
  linear:    t => t,
  outSine:   t => Math.sin(t * Math.PI / 2),
  inSine:    t => 1 - Math.cos(t * Math.PI / 2),
  inOutSine: t => -(Math.cos(Math.PI * t) - 1) / 2,
  outQuad:   t => 1 - (1-t)*(1-t),
  inQuad:    t => t*t,
  outCubic:  t => 1 - Math.pow(1-t, 3),
  inCubic:   t => t*t*t,
  inOutCubic: t => t<0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2,
  outBack:   t => { const c1=1.70158, c3=c1+1; return 1 + c3*Math.pow(t-1,3) + c1*Math.pow(t-1,2); },
  outElastic: t => {
    if (t===0 || t===1) return t;
    const c = (2*Math.PI)/3;
    return Math.pow(2,-10*t) * Math.sin((t*10-0.75)*c) + 1;
  },
  outBounce: t => {
    const n1 = 7.5625, d1 = 2.75;
    if (t < 1/d1) return n1 * t * t;
    if (t < 2/d1) { t -= 1.5/d1; return n1 * t * t + 0.75; }
    if (t < 2.5/d1) { t -= 2.25/d1; return n1 * t * t + 0.9375; }
    t -= 2.625/d1; return n1 * t * t + 0.984375;
  }
};
function updateTweens(dt) {
  for (let i = tweens.length - 1; i >= 0; i--) {
    const t = tweens[i];
    if (!t.alive) { tweens.splice(i, 1); continue; }
    if (t.delay > 0) { t.delay -= dt; continue; }
    t.elapsed += dt;
    const k = t.dur > 0 ? Math.min(1, t.elapsed / t.dur) : 1;
    const e = EASE[t.ease](k);
    for (const key in t.to) {
      t.obj[key] = t.from[key] + (t.to[key] - t.from[key]) * e;
    }
    if (t.onUpdate) t.onUpdate();
    if (k >= 1) {
      if (t.onComplete) t.onComplete();
      tweens.splice(i, 1);
    }
  }
}

// ============================================================
// AUDIO (Web Audio API — procedural SFX & music, no external assets)
// Maps the Magic Sort sound bank onto a juice-bar tropical timbre.
// ============================================================
let audioCtx = null;
let audioMaster = null;
let audioMuted = false;
let ambientTimer = null;

function initAudio() {
  if (audioCtx) return;
  const Ctx = window.AudioContext || window.webkitAudioContext;
  if (!Ctx) return;
  try {
    audioCtx = new Ctx();
    audioMaster = audioCtx.createGain();
    audioMaster.gain.value = 0.55;
    audioMaster.connect(audioCtx.destination);
  } catch (e) { audioCtx = null; }
}
function audioResume() {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
}

// Single-oscillator note with ADSR-ish envelope and optional pitch sweep.
function playTone(opts) {
  if (!audioCtx || audioMuted) return;
  const o = opts || {};
  const freq    = o.freq    || 440;
  const dur     = o.dur     || 0.12;
  const type    = o.type    || 'sine';
  const vol     = o.vol     || 0.25;
  const attack  = o.attack  || 0.005;
  const release = o.release || 0.05;
  const sweep   = o.sweep   || 0;
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  if (sweep) {
    const target = Math.max(40, freq + sweep);
    osc.frequency.exponentialRampToValueAtTime(target, t0 + dur);
  }
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol, t0 + attack);
  g.gain.linearRampToValueAtTime(0, t0 + dur + release);
  osc.connect(g);
  g.connect(audioMaster);
  osc.start(t0);
  osc.stop(t0 + dur + release + 0.02);
}

// Filtered white noise burst — for splashes, pour streams, swooshes.
function playNoise(opts) {
  if (!audioCtx || audioMuted) return;
  const o = opts || {};
  const dur     = o.dur     || 0.1;
  const vol     = o.vol     || 0.25;
  const freq    = o.freq    || 1500;
  const q       = o.q       || 4;
  const attack  = o.attack  || 0.005;
  const release = o.release || 0.06;
  const ftype   = o.filter  || 'bandpass';
  const t0 = audioCtx.currentTime;
  const len = Math.ceil((dur + release) * audioCtx.sampleRate);
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const filt = audioCtx.createBiquadFilter();
  filt.type = ftype;
  filt.frequency.value = freq;
  filt.Q.value = q;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol, t0 + attack);
  g.gain.linearRampToValueAtTime(0, t0 + dur + release);
  src.connect(filt);
  filt.connect(g);
  g.connect(audioMaster);
  src.start(t0);
  src.stop(t0 + dur + release + 0.02);
}

// === Game-event SFX (juice-bar themed remap of the Magic Sort sounds) ===

// "bottle_up": glass tinkle picking up — short rising triangle
function sfxBottleUp() {
  playTone({ freq: 580, dur: 0.07, type: 'triangle', vol: 0.22, sweep: 280, attack: 0.002 });
}
// "bottle_down": glass tinkle settling — short falling triangle
function sfxBottleDown() {
  playTone({ freq: 720, dur: 0.07, type: 'triangle', vol: 0.18, sweep: -340, attack: 0.002 });
}
// "Short_1/Mid/Long": pour stream — bandpassed noise
function sfxPour() {
  playNoise({ dur: 0.5, vol: 0.16, freq: 1800, q: 3, attack: 0.05, release: 0.18 });
}
// "water_short" + tonal blob: liquid landing splash. Soft attack on both
// layers + lower frequencies so it reads as "water plop" rather than a
// sharp percussive burst (the previous 2ms attack was creating a "puff"
// transient that sounded like a mini-explosion).
function sfxSplash() {
  playNoise({ dur: 0.13, vol: 0.10, freq: 1300, q: 5, attack: 0.025, release: 0.08 });
  playTone({ freq: 350, dur: 0.10, type: 'sine', vol: 0.07, sweep: -100, attack: 0.015, release: 0.05 });
}
// "glass_shake": invalid pour — low square bonk
function sfxInvalid() {
  playTone({ freq: 180, dur: 0.13, type: 'square', vol: 0.16, sweep: -40, attack: 0.005, release: 0.06 });
}
// "Cork_Low" + ice_crack reskinned: umbrella swoosh + 2 ice clinks
function sfxSealed() {
  playNoise({ dur: 0.18, vol: 0.14, freq: 4000, q: 1, attack: 0.005, release: 0.08 });
  setTimeout(() => playTone({ freq: 2400, dur: 0.05, type: 'triangle', vol: 0.18, attack: 0.001 }), 240);
  setTimeout(() => playTone({ freq: 2800, dur: 0.05, type: 'triangle', vol: 0.16, attack: 0.001 }), 380);
}
// Pink reaches goal — sounds like LIQUID FILLING A GLASS. Three layers
// recreate the physical effect:
//   1. Tonal pitch sweeping UP (the resonance of the shrinking air column
//      above the rising water — the iconic "glug-glug rising in pitch")
//   2. Bandpassed noise → soft burble of the flowing liquid
//   3. Low triangle body → weight/thump of the pour
function sfxGoalProgress() {
  playTone({ freq: 285, dur: 0.55, type: 'sine',     vol: 0.13, sweep: 415, attack: 0.04, release: 0.18 });
  playNoise({ dur: 0.5,  vol: 0.07, freq: 1100, q: 5,            attack: 0.05, release: 0.15 });
  playTone({ freq: 160, dur: 0.45, type: 'triangle', vol: 0.04, sweep: 80,  attack: 0.06, release: 0.12 });
}
// "win" + "confetti-pop": triumphant arpeggio
function sfxWin() {
  const notes = [523, 659, 784, 1047, 1319]; // C E G C E
  notes.forEach((f, i) => setTimeout(
    () => playTone({ freq: f, dur: 0.18, type: 'triangle', vol: 0.22, attack: 0.005, release: 0.1 }),
    i * 90
  ));
}
// "bostap"/CTA tap: short click
function sfxClick() {
  playTone({ freq: 1100, dur: 0.04, type: 'sine', vol: 0.2, attack: 0.001 });
}

// "ambient" (20s loop in the original): light, plucky melody on a major
// scale — gives a beach-bar atmosphere without overpowering the SFX.
function startAmbient() {
  if (!audioCtx || audioMuted || ambientTimer) return;
  const pattern = [
    { f: 392, d: 0.35 }, { f: 523, d: 0.35 },
    { f: 659, d: 0.35 }, { f: 523, d: 0.35 },
    { f: 587, d: 0.35 }, { f: 698, d: 0.35 },
    { f: 587, d: 0.35 }, { f: 392, d: 0.55 }
  ];
  let idx = 0;
  function tick() {
    if (audioMuted || !audioCtx) { ambientTimer = null; return; }
    const note = pattern[idx % pattern.length];
    const t0 = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = note.f;
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(0.04, t0 + 0.04);
    g.gain.exponentialRampToValueAtTime(0.0008, t0 + note.d);
    osc.connect(g);
    g.connect(audioMaster);
    osc.start(t0);
    osc.stop(t0 + note.d + 0.05);
    idx++;
    ambientTimer = setTimeout(tick, note.d * 1000);
  }
  tick();
}
function stopAmbient() { if (ambientTimer) { clearTimeout(ambientTimer); ambientTimer = null; } }

// ============================================================
// JUICE PALETTE
// ============================================================
const JUICE = {
  orange:  { top:'#ffc069', mid:'#ff8c1a', bot:'#c25d00', speckle:'#a33c00' },
  lime:    { top:'#d4ee72', mid:'#9ed635', bot:'#5a8f18', speckle:'#233d08' },
  yellow:  { top:'#ffeb7a', mid:'#f5c518', bot:'#b38800', speckle:'#5c3f00' },
  // "red" slot now holds beetroot juice — a dark magenta/purple
  red:     { top:'#c97bb5', mid:'#8e2a7a', bot:'#4a0f44', speckle:'#2a0625' },
  pink:    { top:'#ffbedb', mid:'#ff6b9d', bot:'#c72a6d', speckle:'#7d0f3f' },
  blue:    { top:'#82d2ff', mid:'#3aa4e8', bot:'#105e9c' },
  purple:  { top:'#c478e0', mid:'#8a3fb6', bot:'#4f1577' }
};
const COLOR_KEYS = Object.keys(JUICE);
const GOAL_COLOR = 'pink';
let GOAL_UNITS = 24; // updated in layoutBottles to match objective capacity

// ============================================================
// GAME STATE
// ============================================================
const CAPACITY = 4;
let LAYER_PX = 47;         // pixel height of ONE juice unit (consistent across all glasses)
const WALL_TOP_RATIO = 0.085;
const WALL_BOT_RATIO = 0.035;
let bottles = [];
let objective = null;
let selected = null;
let isAnimating = false;
let won = false;
let flowLine = null;
let particles = [];
let totalTime = 0;
let ctaHitBox = null;
let flowEmitAccum = 0;

function buildLevel() {
  bottles = [];
  // 6 pink cups (24 pink units = enough to fill the goal tube) + 4 cups
  // for each of the 5 other flavors (20 cups) + 4 empty workspaces = 30 total.
  const distribution = [
    { color: 'pink',   cups: 6 },
    { color: 'orange', cups: 4 },
    { color: 'lime',   cups: 4 },
    { color: 'yellow', cups: 4 },
    { color: 'red',    cups: 4 },
    { color: 'blue',   cups: 4 }
  ];
  const emptyCount = 4;

  const glasses = [];
  for (const { color, cups } of distribution) {
    for (let i = 0; i < cups; i++) glasses.push([color, color, color, color]);
  }
  for (let i = 0; i < emptyCount; i++) glasses.push([]);

  // Reverse-scramble to deeply mix while staying solvable
  const filledCount = glasses.length - emptyCount;
  const moves = filledCount * 5;
  for (let m = 0; m < moves; m++) {
    const nonEmpty = [], notFull = [];
    for (const g of glasses) {
      if (g.length > 0) nonEmpty.push(g);
      if (g.length < CAPACITY) notFull.push(g);
    }
    if (!nonEmpty.length || !notFull.length) break;
    const s = nonEmpty[(Math.random() * nonEmpty.length) | 0];
    const d = notFull[(Math.random() * notFull.length) | 0];
    if (s === d && s.length >= CAPACITY) continue;
    d.push(s.pop());
  }

  // Guard: no bottle should start already COMPLETE (4 of same color).
  // Swap tops with a different-color neighbor to break uniform stacks.
  for (let pass = 0; pass < 12; pass++) {
    let swapped = false;
    for (let gi = 0; gi < glasses.length; gi++) {
      const g = glasses[gi];
      if (g.length !== CAPACITY) continue;
      const first = g[0];
      let uniform = true;
      for (let i = 1; i < g.length; i++) if (g[i] !== first) { uniform = false; break; }
      if (!uniform) continue;
      // Find a partner with a different top to swap with
      const partners = [];
      for (let oi = 0; oi < glasses.length; oi++) {
        if (oi === gi) continue;
        const o = glasses[oi];
        if (o.length === 0) continue;
        if (o[o.length - 1] === first) continue;
        partners.push(o);
      }
      if (!partners.length) continue;
      const other = partners[(Math.random() * partners.length) | 0];
      const gTop = g.pop(), oTop = other.pop();
      g.push(oTop); other.push(gTop);
      swapped = true;
    }
    if (!swapped) break;
  }

  for (let i = 0; i < glasses.length; i++) {
    bottles.push({
      id: i,
      isObjective: false,
      layers: glasses[i].slice(),
      fillLevel: glasses[i].length,
      capacity: CAPACITY,
      x: 0, y: 0, baseX: 0, baseY: 0,
      w: 0, h: 0,
      angle: 0, lift: 0, glow: 0,
      slosh: 0, sloshSeed: Math.random() * 100,
      capTriggered: false,      // latched once the seal sequence starts
      umbrellaProgress: 0,      // 0→1: paper umbrella slides in from the right
      ice1Progress: 0,          // 0→1: first ice cube drops and bounces
      ice2Progress: 0           // 0→1: second ice cube drops and bounces
    });
  }

  // Ensure there's enough pink to succeed. The reverse scramble disperses
  // pink across glasses — the player finds one with pink on top and pours.
  objective = {
    id: bottles.length,
    isObjective: true,
    goalColor: GOAL_COLOR,
    layers: [],
    fillLevel: 0,
    capacity: 10,
    x: 0, y: 0, baseX: 0, baseY: 0,
    w: 0, h: 0,
    angle: 0, lift: 0, glow: 0,
    slosh: 0, sloshSeed: Math.random() * 100
  };
  bottles.push(objective);
}

function layoutBottles() {
  if (!bottles.length) return;
  const landscape = W >= H;

  // Grid: always 6×5 (30 small cups) — consistent across orientations.
  const cols = 6;
  const rows = 5;
  const ratio = landscape ? 2.4 : 2.6;
  const smalls = bottles.filter(b => !b.isObjective);

  // Logo takes top-left (smaller now). Layout starts below it.
  const logoW = Math.min(150, W * 0.20);
  const logoH = logoW * 0.55;
  const logoBottom = 14 + logoH + 10;

  const topMargin = Math.max(logoBottom, H * 0.10);
  const bottomMargin = H * 0.14; // CTA reservation
  const usableH = H - topMargin - bottomMargin;

  // Objective gets a dedicated left strip (same logic landscape & portrait)
  const objStripW = Math.min(W * 0.16, 130);
  const gridAreaX = objStripW + 4;
  const gridAreaW = W - gridAreaX - 10;

  // Tight horizontal gap, generous vertical gap (matching reference)
  const hPadFactor = 0.12;
  const vPadFactor = 0.22;

  let gh = usableH / (rows + (rows - 1) * vPadFactor);
  let gw = gh / ratio;
  const maxGW = (gridAreaW - 20) / (cols + (cols - 1) * hPadFactor);
  if (gw > maxGW) { gw = maxGW; gh = gw * ratio; }
  gw = Math.max(26, Math.min(gw, 90));
  gh = gw * ratio;

  const hPad = gw * hPadFactor;
  const vPad = gh * vPadFactor;
  const gridPixelW = cols * gw + (cols - 1) * hPad;
  const gridPixelH = rows * gh + (rows - 1) * vPad;

  const gridLeftX = gridAreaX + (gridAreaW - gridPixelW) / 2;
  const firstRowTopY = topMargin + (usableH - gridPixelH) / 2;
  const firstRowBaseY = firstRowTopY + gh;

  const smallInteriorH = gh * (1 - WALL_TOP_RATIO - WALL_BOT_RATIO);
  LAYER_PX = smallInteriorH / CAPACITY;

  for (let i = 0; i < smalls.length; i++) {
    const r = Math.floor(i / cols);
    const c = i % cols;
    const x = gridLeftX + gw/2 + c * (gw + hPad);
    const y = firstRowBaseY + r * (gh + vPad);
    const b = smalls[i];
    b.baseX = x; b.baseY = y;
    b.x = x;     b.y = y;
    b.w = gw;    b.h = gh;
    b.capacity = CAPACITY;
  }

  // Objective: aligned EXACTLY with grid vertical extent
  const objTop = firstRowTopY;
  const lastRowBaseY = firstRowBaseY + (rows - 1) * (gh + vPad);
  const objBottom = lastRowBaseY;
  objective.h = objBottom - objTop;
  objective.w = Math.min(gw * 1.75, objStripW * 0.82, 115);
  // Right edge of the objective sits just left of the first grid bottle
  objective.x = gridLeftX - 12 - objective.w / 2;
  if (objective.x - objective.w / 2 < 6) objective.x = objective.w / 2 + 6;
  objective.y = objBottom;
  const objInteriorH = objective.h * (1 - WALL_TOP_RATIO - WALL_BOT_RATIO);
  objective.capacity = Math.max(6, Math.floor(objInteriorH / LAYER_PX));
  // Win when the goal tube is filled — we have 24 pink units available,
  // but cap the goal at whatever actually fits in the tube.
  GOAL_UNITS = Math.min(24, objective.capacity);
  objective.baseX = objective.x;
  objective.baseY = objective.y;
}

// ============================================================
// INPUT
// ============================================================
function pointerPos(ev) {
  const rect = canvas.getBoundingClientRect();
  const t = (ev.touches && ev.touches[0]) || (ev.changedTouches && ev.changedTouches[0]) || ev;
  return { x: (t.clientX || 0) - rect.left, y: (t.clientY || 0) - rect.top };
}
function onTap(ev) {
  ev.preventDefault && ev.preventDefault();
  const p = pointerPos(ev);
  handleTap(p.x, p.y);
}
canvas.addEventListener('mousedown', onTap);
canvas.addEventListener('touchstart', onTap, { passive: false });

function handleTap(px, py) {
  // First tap unlocks audio (mobile autoplay policy) and starts the ambient.
  if (!audioCtx) { initAudio(); startAmbient(); }
  audioResume();

  if (hitCTA(px, py)) { fireCTA(); return; }
  if (won || isAnimating) return;

  const b = hitTestBottle(px, py);
  if (!b) return;

  if (!selected) {
    if (b.layers.length === 0) return;
    if (b.isObjective) return; // objective is destination only
    if (isBottleCompleted(b)) return; // sealed bottles can't be picked up
    selected = b;
    killTweensOf(b, ['lift', 'glow']);
    tween(b, { lift: -b.h * 0.1, glow: 1 }, 0.22, { ease: 'outBack' });
    // Big initial slosh that settles into a gentle sustained wobble — the
    // surface stays alive the whole time the bottle is selected.
    triggerSlosh(b, 0.95, 0.55, 0.14);
    sfxBottleUp();
  } else if (selected === b) {
    const s = selected; selected = null;
    killTweensOf(s, ['lift', 'glow']);
    tween(s, { lift: 0, glow: 0 }, 0.2, { ease: 'outQuad' });
    // Full decay once deselected
    triggerSlosh(s, 0.4, 0.6, 0);
    sfxBottleDown();
  } else {
    const src = selected; const dst = b;
    selected = null;
    if (canPour(src, dst)) {
      executePour(src, dst);
    } else {
      killTweensOf(src, ['lift', 'glow']);
      tween(src, { lift: 0, glow: 0 }, 0.2, { ease: 'outQuad' });
      const ox = dst.x;
      tween(dst, { x: ox - 5 }, 0.06, { ease: 'outSine',
        onComplete: () => tween(dst, { x: ox + 5 }, 0.08, { ease: 'inOutSine',
          onComplete: () => tween(dst, { x: ox }, 0.06, { ease: 'outSine' })
        })
      });
      triggerSlosh(dst, 0.5, 0.4);
      sfxInvalid();
    }
  }
}

function triggerSlosh(b, amp, decay, target) {
  // `target` is the resting slosh value the tween settles to (default 0).
  // Passing a positive target keeps the liquid gently wobbling — used while
  // a bottle is selected, so the surface is alive the whole time.
  if (target == null) target = 0;
  killTweensOf(b, ['slosh']);
  b.slosh = amp;
  tween(b, { slosh: target }, decay, { ease: 'outSine' });
}

function hitTestBottle(px, py) {
  for (const b of bottles) {
    const top = b.y - b.h + b.lift - 10;
    const bot = b.y + b.lift + 24;
    const pad = b.isObjective ? 8 : 0;
    if (px >= b.x - b.w*0.75 - pad && px <= b.x + b.w*0.75 + pad &&
        py >= top && py <= bot) return b;
  }
  return null;
}

function canPour(src, dst) {
  if (src === dst) return false;
  if (src.layers.length === 0) return false;
  const dstCap = dst.capacity || CAPACITY;
  if (dst.layers.length >= dstCap) return false;
  // Objective tube accepts ONLY the goal juice (pink) — reject anything else
  if (dst.isObjective && src.layers[src.layers.length - 1] !== GOAL_COLOR) return false;
  if (dst.layers.length === 0) return true;
  return src.layers[src.layers.length-1] === dst.layers[dst.layers.length-1];
}

// ============================================================
// POUR CHOREOGRAPHY
// ============================================================
function executePour(src, dst) {
  isAnimating = true;
  const color = src.layers[src.layers.length - 1];

  let sameCount = 0;
  for (let i = src.layers.length - 1; i >= 0; i--) {
    if (src.layers[i] === color) sameCount++;
    else break;
  }
  const dstCap = dst.capacity || CAPACITY;
  const space = dstCap - dst.layers.length;
  const transfer = Math.min(sameCount, space);

  const sign = src.baseX <= dst.baseX ? 1 : -1;
  const tiltDeg = 58;
  const tiltAngle = sign * tiltDeg * Math.PI / 180;
  const cosA = Math.cos(tiltAngle);
  const sinA = Math.sin(tiltAngle);

  // For tall targets (objective), pour at the CURRENT FILL SURFACE + small gap
  // rather than at the rim. Keeps source onscreen and feels physically right.
  const dstRimY = dst.baseY - dst.h;
  let spoutTargetY;
  if (dst.h > src.h * 1.4) {
    const avgFill = dst.fillLevel + transfer / 2;
    const surfaceY = getLayerTopY(dst, avgFill);
    spoutTargetY = surfaceY - Math.max(30, dst.w * 0.45);
    // Keep at least a minimum gap to rim
    spoutTargetY = Math.min(spoutTargetY, dstRimY - 12);
  } else {
    spoutTargetY = dstRimY - 14;
  }
  const spoutTargetX = dst.baseX;

  // Solve src position so its rim (sign*w/2, -h) after rotation lands at spout target
  const tgtX = spoutTargetX - sign * src.w/2 * cosA - src.h * sinA;
  const tgtY = spoutTargetY - sign * src.w/2 * sinA + src.h * cosA;

  killTweensOf(src, ['lift','glow','x','y','angle']);
  src.lift = 0; src.glow = 0;

  tween(src, { x: tgtX, y: tgtY, angle: tiltAngle }, 0.55, {
    ease: 'inOutCubic',
    onComplete: () => startPourSequence()
  });

  function startPourSequence() {
    flowLine = { color, src, dst, sign, alpha: 0, active: true };
    tween(flowLine, { alpha: 1 }, 0.12);
    sfxPour();

    let done = 0;
    function pourOne() {
      if (!flowLine || done >= transfer) { endPour(); return; }
      done++;

      spawnSplash(dst, color);
      sfxSplash();
      // Bonus sparkle when pink lands in the goal tube
      if (dst.isObjective && color === GOAL_COLOR) sfxGoalProgress();
      // Strong impact slosh, but settle to a sustained wobble (0.22) so the
      // destination keeps visibly sloshing between pour-unit impacts.
      triggerSlosh(dst, 1.0, 0.9, 0.22);

      dst.layers.push(color);
      tween(dst, { fillLevel: dst.fillLevel + 1 }, 0.42, { ease: 'outQuad' });
      tween(src, { fillLevel: src.fillLevel - 1 }, 0.42, {
        ease: 'outQuad',
        onComplete: () => {
          src.layers.pop();
          pourOne();
        }
      });
    }
    pourOne();
  }

  function endPour() {
    if (flowLine) {
      flowLine.active = false;
      tween(flowLine, { alpha: 0 }, 0.2, { onComplete: () => { flowLine = null; } });
    }
    // Sustained slosh on destination was held at 0.22 during pour; now let
    // it naturally decay back to 0 over ~1s for a nice settling effect.
    triggerSlosh(dst, dst.slosh || 0.22, 1.1, 0);
    tween(src, { x: src.baseX, y: src.baseY, angle: 0 }, 0.55, {
      ease: 'inOutCubic',
      onComplete: () => {
        triggerSlosh(src, 0.5, 0.6, 0);
        sfxBottleDown();
        isAnimating = false;
        checkWin();
      }
    });
  }
}

function checkWin() {
  // Win when objective has at least GOAL_UNITS of the goal color at the bottom
  let goalHits = 0;
  for (const c of objective.layers) {
    if (c === GOAL_COLOR) goalHits++;
  }
  if (goalHits >= GOAL_UNITS) {
    won = true;
    sfxWin();
    stopAmbient();
    celebrate();
  }
}

function celebrate() {
  for (const b of bottles) {
    if (!b.layers.length) continue;
    tween(b, { lift: -b.h * 0.05 }, 0.35, { ease: 'outBack', delay: Math.random() * 0.3 });
    tween(b, { glow: 0.6 }, 0.5);
    triggerSlosh(b, 0.8, 1.0);
  }
  setTimeout(() => {
    for (const b of bottles) if (b.layers.length) burstCelebrate(b);
  }, 250);
}

function burstCelebrate(b) {
  const topY = getLayerTopY(b, b.layers.length);
  const color = b.layers[b.layers.length - 1];
  for (let i = 0; i < 10; i++) {
    const a = (i / 10) * Math.PI * 2 + Math.random() * 0.3;
    const s = 90 + Math.random() * 80;
    particles.push({
      x: b.x, y: topY,
      vx: Math.cos(a) * s, vy: Math.sin(a) * s - 90,
      life: 0, maxLife: 0.9,
      color: JUICE[color].mid, edge: JUICE[color].bot,
      size: 2.5 + Math.random() * 2.5,
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: 0.15
    });
  }
}

// ============================================================
// PARTICLES
// ============================================================
function spawnSplash(bottle, color) {
  const topY = getLayerTopY(bottle, bottle.fillLevel);
  const count = 9;
  const j = JUICE[color];
  for (let i = 0; i < count; i++) {
    const spread = (i / (count - 1) - 0.5) * 2;
    // Horizontal: gentle side spread; Vertical: strong upward kick so the
    // particles clearly shoot UP, decelerate under gravity, and fall back.
    const vx = spread * (18 + Math.random() * 22);
    const vy = -95 - Math.random() * 50;
    particles.push({
      parent: bottle,
      x: bottle.x + spread * bottle.w * 0.16,
      y: topY,
      vx, vy,
      life: 0, maxLife: 0.6 + Math.random() * 0.2,
      color: j.mid, edge: j.bot,
      size: 2.3 + Math.random() * 1.9,
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: 0.11
    });
  }
}

// Continuous "reaction" droplets that spawn at the destination's liquid
// surface WHILE the pour stream is flowing. Small, short-lived, and
// clipped to the bottle so they never escape the glass.
function emitFlowDroplets(dt) {
  if (!flowLine || !flowLine.active) return;
  flowEmitAccum += dt;
  const interval = 0.05;
  while (flowEmitAccum > interval) {
    flowEmitAccum -= interval;
    const dst = flowLine.dst;
    const color = flowLine.color;
    const j = JUICE[color];
    const topY = getLayerTopY(dst, Math.min(dst.capacity || CAPACITY, dst.fillLevel + 0.15));
    const count = 1 + (Math.random() < 0.45 ? 1 : 0);
    for (let i = 0; i < count; i++) {
      const spread = (Math.random() - 0.5) * 1.1;
      // Small but clearly upward: kick up, arc, fall under lowered gravity
      const vx = spread * (12 + Math.random() * 14);
      const vy = -55 - Math.random() * 30;
      particles.push({
        parent: dst,
        x: dst.x + (Math.random() - 0.5) * dst.w * 0.2,
        y: topY,
        vx, vy,
        life: 0, maxLife: 0.4 + Math.random() * 0.12,
        color: j.mid, edge: j.bot,
        size: 1.4 + Math.random() * 1.2,
        wobble: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.1
      });
    }
  }
}

function updateParticles(dt) {
  // Gravity lowered from 520 → 380 so particles actually arc noticeably
  // (shoot up, pause at apex, fall) instead of snapping straight down.
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life += dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 380 * dt;
    p.wobble += p.wobbleSpeed;
    if (p.life >= p.maxLife) particles.splice(i, 1);
  }
}

function drawParticleAt(p) {
  const k = p.life / p.maxLife;
  const a = Math.min(1, 1 - k * k);
  const wx = p.x + (p.wobbleSpeed ? Math.cos(p.wobble) * 2.2 : 0);
  const wy = p.y + (p.wobbleSpeed ? Math.sin(p.wobble) * 1.4 : 0);
  ctx.globalAlpha = a;
  ctx.fillStyle = p.color;
  ctx.beginPath();
  ctx.arc(wx, wy, p.size, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = p.edge;
  ctx.beginPath();
  ctx.arc(wx - 0.4, wy + 0.5, p.size * 0.45, 0, Math.PI*2);
  ctx.fill();
}

function drawParticles() {
  // Split by parent bottle. Parented particles get clipped to that bottle's
  // interior so splashes never escape the glass walls.
  const parented = new Map();
  const loose = [];
  for (const p of particles) {
    if (p.parent) {
      if (!parented.has(p.parent)) parented.set(p.parent, []);
      parented.get(p.parent).push(p);
    } else {
      loose.push(p);
    }
  }
  for (const p of loose) drawParticleAt(p);
  for (const [parent, ps] of parented) {
    // Simple bounding-rect clip in world space — keeps splash particles
    // from escaping the glass without getting tripped up by the rotated
    // interior-path clip across transform resets.
    ctx.save();
    ctx.beginPath();
    const padX = 4;
    const padY = 10;
    ctx.rect(
      parent.x - parent.w / 2 - padX,
      parent.y + parent.lift - parent.h - padY,
      parent.w + 2 * padX,
      parent.h + 2 * padY
    );
    ctx.clip();
    for (const p of ps) drawParticleAt(p);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// GEOMETRY HELPERS
// ============================================================
function roundRectPath(l, t, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(l + r, t);
  ctx.lineTo(l + w - r, t);
  ctx.quadraticCurveTo(l + w, t, l + w, t + r);
  ctx.lineTo(l + w, t + h - r);
  ctx.quadraticCurveTo(l + w, t + h, l + w - r, t + h);
  ctx.lineTo(l + r, t + h);
  ctx.quadraticCurveTo(l, t + h, l, t + h - r);
  ctx.lineTo(l, t + r);
  ctx.quadraticCurveTo(l, t, l + r, t);
  ctx.closePath();
}

// Juice-glass shape: slight outward taper (wider at top, narrower at base)
// with a thicker rounded bottom and a pronounced rim — classic bar look.
function glassBodyPath(w, h) {
  const taperBottom = w * 0.065; // inset on each side at bottom
  const topCornerR = w * 0.14;
  const botCornerR = w * 0.22;
  const l = -w/2, r = w/2, t = -h, bot = 0;
  const bl = l + taperBottom, br = r - taperBottom;

  ctx.beginPath();
  ctx.moveTo(l + topCornerR, t);
  ctx.lineTo(r - topCornerR, t);
  ctx.quadraticCurveTo(r, t, r, t + topCornerR);
  // Right wall tapering inward toward base
  ctx.lineTo(br + botCornerR * 0.1, bot - botCornerR);
  ctx.quadraticCurveTo(br, bot, br - botCornerR * 0.5, bot);
  ctx.lineTo(bl + botCornerR * 0.5, bot);
  ctx.quadraticCurveTo(bl, bot, bl - botCornerR * 0.1, bot - botCornerR);
  // Left wall
  ctx.lineTo(l, t + topCornerR);
  ctx.quadraticCurveTo(l, t, l + topCornerR, t);
  ctx.closePath();
}

// Interior (where juice lives), slightly inset from the glass outline
function glassInteriorPath(w, h) {
  const wallX = w * 0.05;
  const iw = w - wallX * 2;
  const taperBottom = iw * 0.05;
  const topCornerR = iw * 0.12;
  const botCornerR = iw * 0.2;
  const il = -iw/2, ir = iw/2;
  const it = -h + h * WALL_TOP_RATIO;
  const ibot = -h * WALL_BOT_RATIO;
  const bl = il + taperBottom, br = ir - taperBottom;

  ctx.beginPath();
  ctx.moveTo(il + topCornerR, it);
  ctx.lineTo(ir - topCornerR, it);
  ctx.quadraticCurveTo(ir, it, ir, it + topCornerR);
  ctx.lineTo(br + botCornerR * 0.1, ibot - botCornerR);
  ctx.quadraticCurveTo(br, ibot, br - botCornerR * 0.5, ibot);
  ctx.lineTo(bl + botCornerR * 0.5, ibot);
  ctx.quadraticCurveTo(bl, ibot, bl - botCornerR * 0.1, ibot - botCornerR);
  ctx.lineTo(il, it + topCornerR);
  ctx.quadraticCurveTo(il, it, il + topCornerR, it);
  ctx.closePath();
}

function getInteriorBounds(b) {
  const wallX = b.w * 0.05;
  const iw = b.w - wallX * 2;
  const top = -b.h + b.h * WALL_TOP_RATIO;
  const bot = -b.h * WALL_BOT_RATIO;
  return { l: -iw/2, r: iw/2, w: iw, t: top, b: bot, h: bot - top };
}

function getLayerTopY(b, fillUnits) {
  const i = getInteriorBounds(b);
  return b.y + b.lift + (i.b - fillUnits * LAYER_PX);
}

// ============================================================
// RENDER: BACKGROUND
// ============================================================
function drawBackground() {
  const sky = ctx.createLinearGradient(0, 0, 0, H * 0.6);
  sky.addColorStop(0, '#49a8e0');
  sky.addColorStop(0.6, '#86cfee');
  sky.addColorStop(1, '#d4ecf7');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H * 0.6);

  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  drawCloud(W * 0.18, H * 0.12, 38);
  drawCloud(W * 0.68, H * 0.08, 52);
  drawCloud(W * 0.42, H * 0.2, 28);

  const sea = ctx.createLinearGradient(0, H * 0.54, 0, H * 0.74);
  sea.addColorStop(0, '#3994c9');
  sea.addColorStop(1, '#174f82');
  ctx.fillStyle = sea;
  ctx.fillRect(0, H * 0.54, W, H * 0.22);

  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1.1;
  for (let i = 0; i < 12; i++) {
    const y = H * 0.58 + i * 7;
    ctx.beginPath();
    const segs = 3 + (i % 3);
    for (let s = 0; s < segs; s++) {
      const x1 = (i * 137 + s * 211 + totalTime * 12) % W;
      ctx.moveTo(x1, y);
      ctx.lineTo(x1 + 16, y);
    }
    ctx.stroke();
  }

  const deck = ctx.createLinearGradient(0, H * 0.72, 0, H);
  deck.addColorStop(0, '#d69a62');
  deck.addColorStop(0.5, '#a26836');
  deck.addColorStop(1, '#6d4420');
  ctx.fillStyle = deck;
  ctx.fillRect(0, H * 0.72, W, H * 0.28);
  ctx.strokeStyle = 'rgba(40,18,4,0.35)';
  ctx.lineWidth = 1;
  for (let i = 1; i < 10; i++) {
    const y = H * 0.72 + i * (H * 0.28 / 9);
    ctx.beginPath();
    ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  drawPalmLeaf(W + 30, H * 0.02, -0.7, 1.3);
  drawPalmLeaf(-30, H * 0.05, 0.7, 1.1);

  const vg = ctx.createLinearGradient(0, 0, 0, H * 0.2);
  vg.addColorStop(0, 'rgba(0,0,0,0.25)');
  vg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H * 0.2);
}

function drawCloud(x, y, r) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.arc(x + r*0.8, y - r*0.1, r*0.8, 0, Math.PI*2);
  ctx.arc(x - r*0.7, y, r*0.7, 0, Math.PI*2);
  ctx.arc(x + r*1.5, y + r*0.1, r*0.6, 0, Math.PI*2);
  ctx.fill();
}

function drawPalmLeaf(x, y, dir, scale) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  ctx.rotate(dir * 0.3);
  for (let i = 0; i < 5; i++) {
    ctx.save();
    ctx.rotate(dir * (0.25 + i * 0.25));
    ctx.fillStyle = '#2a7a2a';
    ctx.beginPath();
    ctx.ellipse(dir * 60, 10, 75, 14, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#1f5a1f';
    ctx.beginPath();
    ctx.ellipse(dir * 60, 14, 75, 5, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
  ctx.restore();
}

// ============================================================
// RENDER: GLASS (unified for small cups and objective)
// ============================================================
function drawGlass(b) {
  ctx.save();
  ctx.translate(b.x, b.y + b.lift);
  ctx.rotate(b.angle);

  const w = b.w, h = b.h;

  // Coaster under glass (only when upright)
  if (Math.abs(b.angle) < 0.1) {
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(0, 3, w*0.55, w*0.12, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#7a4a22';
    ctx.beginPath();
    ctx.ellipse(0, 0, w*0.58, w*0.13, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#a07040';
    ctx.beginPath();
    ctx.ellipse(0, -2, w*0.5, w*0.1, 0, 0, Math.PI*2);
    ctx.fill();
    // Decorative mark on coaster
    ctx.fillStyle = '#ffd17a';
    ctx.beginPath();
    ctx.arc(0, -2, w*0.06, 0, Math.PI*2);
    ctx.fill();
  }

  // Back glass (subtle tint)
  glassBodyPath(w, h);
  const backTint = ctx.createLinearGradient(-w/2, 0, w/2, 0);
  backTint.addColorStop(0, 'rgba(200,230,255,0.22)');
  backTint.addColorStop(0.5, 'rgba(255,255,255,0.05)');
  backTint.addColorStop(1, 'rgba(60,90,130,0.2)');
  ctx.fillStyle = backTint;
  ctx.fill();

  // ==== LIQUID: counter-rotated so layers stay WORLD-HORIZONTAL ====
  ctx.save();
  glassInteriorPath(w, h);
  ctx.clip();
  ctx.rotate(-b.angle);
  drawJuiceLayersWorld(b);
  ctx.restore();

  // Front overlay (shine + rim)
  drawGlassOverlay(w, h, b.isObjective);

  // Drink "sealing" decoration on completed bottles (same color fully stacked,
  // non-pink). Paper umbrella slides in from the right, two ice cubes drop
  // and bounce on top — much more cocktail-bar than a cork.
  if (isBottleCompleted(b)) drawSealed(w, h, b);

  // Selected glow
  if (b.glow > 0) {
    ctx.save();
    ctx.globalAlpha = b.glow;
    glassBodyPath(w + 6, h + 6);
    ctx.strokeStyle = '#fff4c2';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#ffd24d';
    ctx.shadowBlur = 14;
    ctx.stroke();
    ctx.restore();
  }

  ctx.restore();

  // Label/tag (outside rotated frame so it stays upright)
  if (b.isObjective) drawObjectiveLabel(b);
}

function drawGlassOverlay(w, h, isBig) {
  const l = -w/2, r = w/2, t = -h, bot = 0;

  // Left vertical highlight strip
  ctx.save();
  ctx.globalAlpha = 0.55;
  const hi = ctx.createLinearGradient(l, 0, l + w * 0.4, 0);
  hi.addColorStop(0, 'rgba(255,255,255,0)');
  hi.addColorStop(0.5, 'rgba(255,255,255,0.9)');
  hi.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hi;
  ctx.fillRect(l + w * 0.08, t + h * 0.1, w * 0.1, h * 0.75);
  ctx.restore();

  // Right rim darkening
  const rim = ctx.createLinearGradient(r - w * 0.22, 0, r, 0);
  rim.addColorStop(0, 'rgba(40,60,80,0)');
  rim.addColorStop(1, 'rgba(40,60,80,0.32)');
  ctx.fillStyle = rim;
  ctx.fillRect(r - w * 0.22, t + h * 0.05, w * 0.22, h * 0.9);

  // Top rim ellipse (opening) — defines the reference perspective angle
  ctx.beginPath();
  ctx.ellipse(0, t, w * 0.44, w * 0.14, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(210,235,255,0.35)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.9)';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(0, t + 3, w * 0.36, w * 0.1, 0, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(60,100,130,0.4)';
  ctx.lineWidth = 1.3;
  ctx.stroke();

  // Bottom interior ellipse — same perspective angle as the top rim so the
  // base of the glass isn't a flat line. Drawn as a subtle dark arc that
  // suggests looking down into the glass bottom from the viewing angle.
  ctx.beginPath();
  ctx.ellipse(0, bot - w * 0.04, w * 0.36, w * 0.11, 0, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(40,70,110,0.45)';
  ctx.lineWidth = 1.4;
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fill();

  // Subtle glass outline
  glassBodyPath(w, h);
  ctx.strokeStyle = 'rgba(255,255,255,0.32)';
  ctx.lineWidth = 1.3;
  ctx.stroke();
}

// ============================================================
// RENDER: LIQUID LAYERS (merge runs, wavy top, meniscus)
// ============================================================
function drawJuiceLayersWorld(b) {
  if (b.layers.length === 0) return;
  const interior = getInteriorBounds(b);
  const wide = Math.max(interior.w, interior.h) * 1.5;
  const rx = interior.w / 2;
  // Angulation matches the glass top rim (ry/rx ≈ 0.32) for consistent perspective
  const ry = rx * 0.32;

  // Group consecutive same-color units into RUNS so adjacent same-color
  // layers render as a single block with NO internal seam.
  const runs = [];
  let runColor = b.layers[0];
  let runStart = 0;
  for (let i = 1; i <= b.layers.length; i++) {
    if (i === b.layers.length || b.layers[i] !== runColor) {
      runs.push({ color: runColor, fromIdx: runStart, toIdx: i });
      if (i < b.layers.length) { runColor = b.layers[i]; runStart = i; }
    }
  }

  // PASS 1: draw rectangular bodies (no hard seams — colors stack straight)
  for (let ri = 0; ri < runs.length; ri++) {
    const run = runs[ri];
    const juice = JUICE[run.color];
    const isTop = (ri === runs.length - 1);

    const baseY = interior.b - run.fromIdx * LAYER_PX;
    const topSolidY = interior.b - run.toIdx * LAYER_PX;
    const topY = isTop ? (interior.b - b.fillLevel * LAYER_PX) : topSolidY;
    const visH = baseY - topY;
    if (visH <= 0.5) continue;

    // Gradient ENDS at juice.mid (not bot) so the rect's bottom color is
    // identical to the interface ellipse drawn on top of it in pass 2.
    // This eliminates the dark-to-lighter "line" that was showing up at
    // every color boundary between different juices.
    const g = ctx.createLinearGradient(0, topY, 0, baseY);
    g.addColorStop(0, juice.top);
    g.addColorStop(0.55, juice.mid);
    g.addColorStop(1, juice.mid);
    ctx.fillStyle = g;

    if (isTop && b.slosh > 0.04) {
      drawWavyLayer(topY, baseY, wide, juice, b.slosh, b.sloshSeed);
    } else {
      ctx.fillRect(-wide, topY, wide * 2, visH);
    }

    // Soft LEFT-side highlight only — the right-side darkening was adding a
    // subtle 8%-black band that showed up as a serrated line at the bottom
    // of each layer (where the interface ellipse meets the rect).
    const side = ctx.createLinearGradient(-rx, 0, rx, 0);
    side.addColorStop(0, 'rgba(255,255,255,0.16)');
    side.addColorStop(0.5, 'rgba(255,255,255,0)');
    side.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = side;
    ctx.fillRect(-wide, topY, wide * 2, visH);

    if (juice.speckle) drawSpecklesWorld(topY, baseY, interior.w, juice.speckle, run.fromIdx);
  }

  // PASS 2: interface ellipses between different-colored runs.
  // The bottom half of an ellipse in the UPPER run's color is drawn onto
  // the lower rect — the upper layer "bowls down" into the lower. This
  // guarantees the upper layer always renders IN FRONT of the lower at
  // every boundary, instead of a lower dome poking up into the upper.
  for (let ri = 0; ri < runs.length - 1; ri++) {
    const thisRun = runs[ri];
    const nextRun = runs[ri + 1];
    const upperJuice = JUICE[nextRun.color];
    const interfaceY = interior.b - thisRun.toIdx * LAYER_PX;

    // Skip the ellipse when the upper run is still practically empty
    // (very early in the pour tween) — avoids a flash of upper color
    // before the actual rect is visible.
    const isUpperTop = (ri + 1 === runs.length - 1);
    const upperHeight = isUpperTop
      ? (b.fillLevel - nextRun.fromIdx) * LAYER_PX
      : (nextRun.toIdx - nextRun.fromIdx) * LAYER_PX;
    if (upperHeight < 1) continue;

    drawInterfaceEllipse(interfaceY, rx, ry, upperJuice);
  }

  // PASS 3: topmost meniscus — ALWAYS visible at full opacity (no more
  // alpha fade that was creating a visible fade-in/out when pour animations
  // ended). The dome bobs vertically with slosh so the surface still feels
  // alive during motion, but it never fades away.
  const topRun = runs[runs.length - 1];
  const topJuice = JUICE[topRun.color];
  const topY = interior.b - b.fillLevel * LAYER_PX;
  const bob = b.slosh > 0.01
    ? Math.sin(totalTime * 7 + b.sloshSeed) * b.slosh * 1.8
    : 0;
  drawLayerMeniscus(topY + bob, rx, ry, topJuice);

  // PASS 4: base ellipse — the bottom of the glass/liquid column seen
  // through the lowest juice layer. Top half of an ellipse in the darker
  // shade of that juice, positioned at interior.b so it protrudes UP into
  // the bottom rect area and gives the base a curved (not flat) appearance.
  const bottomRun = runs[0];
  const bottomJuice = JUICE[bottomRun.color];
  const baseG = ctx.createRadialGradient(0, interior.b - ry * 0.35, rx * 0.08, 0, interior.b, rx);
  baseG.addColorStop(0, bottomJuice.mid);
  baseG.addColorStop(0.7, bottomJuice.bot);
  baseG.addColorStop(1, bottomJuice.bot);
  ctx.fillStyle = baseG;
  ctx.beginPath();
  ctx.ellipse(0, interior.b, rx, ry, 0, Math.PI, 2 * Math.PI);
  ctx.closePath();
  ctx.fill();
}

function drawLayerMeniscus(y, rx, ry, juice) {
  // Solid dome in juice.top — matches the rect's top color seamlessly at y.
  ctx.fillStyle = juice.top;
  ctx.beginPath();
  ctx.ellipse(0, y, rx, ry, 0, Math.PI, 2 * Math.PI);
  ctx.closePath();
  ctx.fill();

  // Subtle top-only highlight — NO darkening at the base anymore. The old
  // gradient had 10% black at y which was creating the dark serrated line
  // at the top of the liquid where the dome met the rect.
  const dg = ctx.createLinearGradient(0, y, 0, y - ry);
  dg.addColorStop(0, 'rgba(255,255,255,0)');
  dg.addColorStop(0.5, 'rgba(255,255,255,0)');
  dg.addColorStop(1, 'rgba(255,255,255,0.22)');
  ctx.fillStyle = dg;
  ctx.beginPath();
  ctx.ellipse(0, y, rx, ry, 0, Math.PI, 2 * Math.PI);
  ctx.closePath();
  ctx.fill();

  // Bright specular shine on upper-left of the dome
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.beginPath();
  ctx.ellipse(-rx * 0.28, y - ry * 0.55, rx * 0.38, ry * 0.42, 0, Math.PI, 2 * Math.PI);
  ctx.closePath();
  ctx.fill();
}

// Bottom half of an ellipse in the UPPER run's color, drawn at the interface
// between two different-colored runs. The upper color "bowls down" into the
// lower — upper layer always in front. Kept intentionally simple (no dark
// shading, no horizontal rim line) to avoid visible artifact lines between
// the layers.
function drawInterfaceEllipse(y, rx, ry, upperJuice) {
  // Solid opaque fill using juice.mid — IDENTICAL to the rect's bottom color
  // (pass 1 gradient now ends at juice.mid). This makes the transition from
  // rect to ellipse literally invisible — no dark line between layers.
  // No sheen/highlight, no gradient overlay — just a clean continuous fill.
  ctx.fillStyle = upperJuice.mid;
  ctx.beginPath();
  ctx.ellipse(0, y, rx, ry, 0, 0, Math.PI);
  ctx.closePath();
  ctx.fill();
}

// ============================================================
// CAPS & COMPLETION
// ============================================================
function isBottleCompleted(b) {
  if (!b || b.isObjective) return false;
  if (b.layers.length !== (b.capacity || CAPACITY)) return false;
  const first = b.layers[0];
  if (first === GOAL_COLOR) return false; // pink is destined for the objective
  for (let i = 1; i < b.layers.length; i++) if (b.layers[i] !== first) return false;
  return true;
}

// Drink "sealing" decoration: paper umbrella comes in from the right,
// then two ice cubes fall and bounce into place. Replaces the old cork cap
// — matches the summer-juice-bar theme.
function drawSealed(w, h, b) {
  const t = -h;
  const uP = b.umbrellaProgress || 0;
  const i1 = b.ice1Progress || 0;
  const i2 = b.ice2Progress || 0;

  // --- Ice cubes (drawn first so the umbrella sits in front on the right) ---
  // Final resting position is now deeper into the glass — the cubes float
  // just BELOW the rim rather than perching on top of it.
  if (i1 > 0.01) {
    const startY = t - h * 0.45;
    const endY = t + w * 0.32;
    const y = startY + (endY - startY) * i1;
    drawIceCube(-w * 0.18, y, w * 0.32, -0.14, Math.min(1, i1 * 1.6));
  }
  if (i2 > 0.01) {
    const startY = t - h * 0.55;
    const endY = t + w * 0.28;
    const y = startY + (endY - startY) * i2;
    drawIceCube(w * 0.06, y, w * 0.28, 0.24, Math.min(1, i2 * 1.6));
  }

  // --- Paper umbrella: drops straight DOWN from above the glass and settles
  // slightly to the RIGHT of center with a right tilt. ---
  if (uP > 0.01) {
    const finalX = w * 0.20;          // right of center
    const finalY = t - w * 0.08;
    const finalA = 0.32;              // tilted to the right (apex leans right)
    const dropFrom = w * 1.8;         // starts this far above the final position
    const startA = 0.75;              // starts more tilted, settles to final

    const x = finalX;                                 // pure vertical drop
    const y = (finalY - dropFrom) + dropFrom * uP;
    const a = startA + (finalA - startA) * uP;
    drawUmbrella(x, y, a, w * 0.7, Math.min(1, uP * 1.8));
  }
}

// Tropical cocktail paper umbrella — TRIANGULAR silhouette: tall pointed apex,
// nearly straight bottom edge (slight sag between ribs), 6 colored wedges of
// 3 repeating tropical colors, white stick going down into the drink.
function drawUmbrella(cx, cy, angle, size, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(cx, cy);
  ctx.rotate(angle);

  const halfW = size * 0.5;
  const apexH = size * 0.62;           // tall apex → triangular silhouette
  const sag   = size * 0.04;           // tiny downward bow between rib points
  const stickW = Math.max(2, size * 0.05);
  const segs = 6;

  // --- White stick going DOWN into the drink (drawn first so canopy covers top) ---
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = stickW;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(0, apexH * 1.75);
  ctx.stroke();
  ctx.strokeStyle = 'rgba(60,40,10,0.28)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(-stickW * 0.5, 0);
  ctx.lineTo(-stickW * 0.5, apexH * 1.75);
  ctx.moveTo(stickW * 0.5, 0);
  ctx.lineTo(stickW * 0.5, apexH * 1.75);
  ctx.stroke();

  // --- Canopy: 6 straight-sided triangular wedges from apex to the bottom line ---
  const apex = { x: 0, y: -apexH };
  // Bottom rim points spaced along a slightly sagging line
  const rim = [];
  for (let i = 0; i <= segs; i++) {
    const t = i / segs;
    const x = -halfW + t * halfW * 2;
    // Slight parabolic sag (maximum at the center)
    const y = Math.sin(t * Math.PI) * sag;
    rim.push({ x, y });
  }

  const tropicalColors = ['#ff5a5a', '#ffd24d', '#8bd94f'];

  // Fill each wedge as a pure TRIANGLE from apex to two adjacent rim points.
  // Straight edges — no arc, no bulge — for a true triangular silhouette.
  for (let i = 0; i < segs; i++) {
    const p0 = rim[i];
    const p1 = rim[i + 1];
    ctx.fillStyle = tropicalColors[i % 3];
    ctx.beginPath();
    ctx.moveTo(apex.x, apex.y);
    ctx.lineTo(p0.x, p0.y);
    ctx.lineTo(p1.x, p1.y);
    ctx.closePath();
    ctx.fill();
  }

  // Subtle scalloped bottom edge: small arcs connecting rim points, dipping
  // just slightly below each segment for a "folded paper" feel.
  ctx.strokeStyle = 'rgba(50,25,0,0.55)';
  ctx.lineWidth = 1.3;
  ctx.beginPath();
  ctx.moveTo(rim[0].x, rim[0].y);
  for (let i = 0; i < segs; i++) {
    const p0 = rim[i];
    const p1 = rim[i + 1];
    const mx = (p0.x + p1.x) * 0.5;
    const my = (p0.y + p1.y) * 0.5 + size * 0.025;
    ctx.quadraticCurveTo(mx, my, p1.x, p1.y);
  }
  ctx.stroke();

  // Rib lines (apex → rim)
  ctx.strokeStyle = 'rgba(50,25,0,0.38)';
  ctx.lineWidth = 0.9;
  for (let i = 0; i <= segs; i++) {
    ctx.beginPath();
    ctx.moveTo(apex.x, apex.y);
    ctx.lineTo(rim[i].x, rim[i].y);
    ctx.stroke();
  }

  // White apex tip (the spike at the top — classic paper umbrella detail)
  ctx.fillStyle = '#ffffff';
  ctx.strokeStyle = 'rgba(50,25,0,0.5)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.arc(apex.x, apex.y, size * 0.055, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  ctx.restore();
}

// A translucent ice cube with beveled edges and a bright shine highlight.
function drawIceCube(cx, cy, size, angle, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  const s = size * 0.5;

  // Main body
  ctx.fillStyle = 'rgba(220,238,250,0.82)';
  roundRectPath(-s, -s, size, size, size * 0.16);
  ctx.fill();
  ctx.strokeStyle = 'rgba(120,160,200,0.7)';
  ctx.lineWidth = 1.2;
  ctx.stroke();

  // Inner bevel (top-left face)
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.beginPath();
  ctx.moveTo(-s * 0.75, -s * 0.75);
  ctx.lineTo(s * 0.4, -s * 0.75);
  ctx.lineTo(-s * 0.75, s * 0.4);
  ctx.closePath();
  ctx.fill();

  // Shine highlight
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.fillRect(-s * 0.55, -s * 0.55, size * 0.25, size * 0.12);

  // Bottom shadow for depth
  ctx.fillStyle = 'rgba(80,120,160,0.25)';
  ctx.fillRect(-s, s * 0.55, size, size * 0.2);

  ctx.restore();
}

function drawWavyLayer(topY, baseY, wide, juice, slosh, seed) {
  // Multi-frequency wave for organic "water" motion (3 superimposed sines
  // with different freqs, speeds and phases — mimics the GPU displacement
  // shader used in Magic Sort).
  const t = totalTime;
  const amp1 = Math.min(7, slosh * 8);
  const amp2 = amp1 * 0.5;
  const amp3 = amp1 * 0.28;
  const maxAmp = amp1 + amp2 + amp3;        // worst-case upward excursion
  const freq1 = 0.08, freq2 = 0.17, freq3 = 0.23;
  const speed1 = 6, speed2 = 10, speed3 = 14;

  // The wave is SHIFTED UP by maxAmp so that waveAt() is always ≤ 0.
  // That guarantees wy = topY + waveAt never dips below topY, which was
  // causing a visible empty strip (void) between topY and the wave trough
  // during slosh. Now the trembling surface only extends UPWARD from topY.
  function waveAt(x) {
    return (Math.sin(x * freq1 + t * speed1 + seed)       * amp1
          + Math.sin(x * freq2 + t * speed2 + seed * 1.3) * amp2
          + Math.sin(x * freq3 - t * speed3 + seed * 1.7) * amp3) - maxAmp;
  }

  // Gradient ends at juice.mid — matches the interface ellipse below so
  // there's no dark seam reappearing when the wave is active.
  const g = ctx.createLinearGradient(0, topY - maxAmp * 2, 0, baseY);
  g.addColorStop(0, juice.top);
  g.addColorStop(0.55, juice.mid);
  g.addColorStop(1, juice.mid);
  ctx.fillStyle = g;

  ctx.beginPath();
  const steps = 40;
  for (let i = 0; i <= steps; i++) {
    const tt = i / steps;
    const x = -wide + tt * wide * 2;
    const wy = topY + waveAt(x);
    if (i === 0) ctx.moveTo(x, wy);
    else ctx.lineTo(x, wy);
  }
  ctx.lineTo(wide, baseY);
  ctx.lineTo(-wide, baseY);
  ctx.closePath();
  ctx.fill();

  // Bright crest line following the wave top
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const tt = i / steps;
    const x = -wide + tt * wide * 2;
    const wy = topY + waveAt(x);
    if (i === 0) ctx.moveTo(x, wy);
    else ctx.lineTo(x, wy);
  }
  ctx.stroke();

  // Secondary highlight line slightly below (hints at refraction/depth)
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const tt = i / steps;
    const x = -wide + tt * wide * 2;
    const wy = topY + waveAt(x) + 3;
    if (i === 0) ctx.moveTo(x, wy);
    else ctx.lineTo(x, wy);
  }
  ctx.stroke();
}

function drawMeniscusFlat(y, interior, juice) {
  const rx = interior.w / 2;
  const ry = rx * 0.16;
  const g = ctx.createRadialGradient(0, y - ry * 0.3, rx * 0.1, 0, y, rx);
  g.addColorStop(0, juice.top);
  g.addColorStop(1, juice.mid);
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.ellipse(0, y, rx, ry, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath();
  ctx.ellipse(-rx * 0.25, y - ry * 0.2, rx * 0.45, ry * 0.3, 0, 0, Math.PI*2);
  ctx.fill();
}

function drawSpecklesWorld(top, bot, w, color, seed) {
  // Properly distributed pulp/chia speckles via xorshift32. The old hash
  // (seed*1931 + i*7919) had a severe Y bias for low index values, which
  // piled up ALL the speckles in the top ~4% of the rect — they looked
  // like a horizontal serrated line just below the meniscus. xorshift gives
  // a full 32-bit-range hash that scatters them evenly across the body.
  ctx.fillStyle = color;
  const area = (bot - top) * w;
  const n = Math.max(3, Math.floor(area / 320));
  const U32 = 4294967295;
  for (let i = 0; i < n; i++) {
    let s = ((seed + 1) * 2654435761 ^ (i + 1) * 40503) | 0;
    if (s === 0) s = 1;
    s ^= s << 13; s ^= s >>> 17; s ^= s << 5;
    const sx = -w/2 + ((s >>> 0) / U32) * w;
    s ^= s << 13; s ^= s >>> 17; s ^= s << 5;
    const sy = top + ((s >>> 0) / U32) * (bot - top);
    s ^= s << 13; s ^= s >>> 17; s ^= s << 5;
    const r = 0.8 + (((s >>> 0) % 4)) * 0.35;
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI*2);
    ctx.fill();
  }
}

// ============================================================
// RENDER: OBJECTIVE LABEL (chalkboard-style tip, like the reference)
// ============================================================
function drawObjectiveLabel(b) {
  // Pulsing pink glow around the tube (attention cue — this is the goal!)
  const pulse = 0.4 + 0.2 * Math.sin(totalTime * 2.2);
  ctx.save();
  ctx.globalAlpha = pulse;
  ctx.strokeStyle = JUICE[GOAL_COLOR].top;
  ctx.lineWidth = 3;
  ctx.shadowColor = JUICE[GOAL_COLOR].mid;
  ctx.shadowBlur = 16;
  ctx.save();
  ctx.translate(b.x, b.y + b.lift);
  glassBodyPath(b.w + 4, b.h + 4);
  ctx.stroke();
  ctx.restore();
  ctx.restore();

  // Minimal tag: just a small round cream paper badge with the pink drop.
  // No "GOAL" text, no progress counter — only the drop identifies the color.
  const size = Math.min(b.w * 0.78, 50);
  const cx = b.x;
  const cy = b.y + b.lift - b.h * 0.6;

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.35)';
  ctx.shadowBlur = 5;
  ctx.shadowOffsetY = 2;
  ctx.fillStyle = '#fffdf2';
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  ctx.strokeStyle = '#7a4a22';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.5, 0, Math.PI * 2);
  ctx.stroke();

  // Pink tear-drop icon centered in the badge
  const dr = size * 0.30;
  const dx = cx;
  const dy = cy + dr * 0.12;
  const dg = ctx.createRadialGradient(dx, dy - dr * 0.3, 1, dx, dy, dr);
  dg.addColorStop(0, JUICE[GOAL_COLOR].top);
  dg.addColorStop(0.6, JUICE[GOAL_COLOR].mid);
  dg.addColorStop(1, JUICE[GOAL_COLOR].bot);
  ctx.fillStyle = dg;
  ctx.beginPath();
  ctx.moveTo(dx, dy - dr * 1.15);
  ctx.bezierCurveTo(dx + dr * 1.15, dy - dr * 0.3, dx + dr, dy + dr, dx, dy + dr * 1.05);
  ctx.bezierCurveTo(dx - dr, dy + dr, dx - dr * 1.15, dy - dr * 0.3, dx, dy - dr * 1.15);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath();
  ctx.ellipse(dx - dr * 0.3, dy - dr * 0.4, dr * 0.2, dr * 0.32, 0, 0, Math.PI*2);
  ctx.fill();
}

// ============================================================
// RENDER: FLOW LINE
// ============================================================
function drawFlowLine() {
  if (!flowLine) return;
  const f = flowLine;
  const src = f.src;
  const dst = f.dst;

  const spoutLocalX = f.sign * src.w * 0.42;
  const spoutLocalY = -src.h + src.w * 0.06;
  const cos = Math.cos(src.angle), sin = Math.sin(src.angle);
  const spoutX = src.x + spoutLocalX * cos - spoutLocalY * sin;
  const spoutY = src.y + src.lift + spoutLocalX * sin + spoutLocalY * cos;

  const landY = getLayerTopY(dst, Math.min(dst.capacity || CAPACITY, dst.fillLevel + 0.1));
  const landX = dst.x;

  ctx.save();
  ctx.globalAlpha = f.alpha;
  const juice = JUICE[f.color];
  const midX = (spoutX + landX) / 2;
  const midY = (spoutY + landY) / 2 + 4;
  const streamW = src.w * 0.11;

  ctx.fillStyle = juice.mid;
  ctx.beginPath();
  ctx.moveTo(spoutX - streamW * 0.7, spoutY);
  ctx.quadraticCurveTo(midX - streamW * 0.5, midY, landX - streamW * 0.55, landY);
  ctx.lineTo(landX + streamW * 0.55, landY);
  ctx.quadraticCurveTo(midX + streamW * 0.5, midY, spoutX + streamW * 0.7, spoutY);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = juice.top;
  ctx.lineWidth = streamW * 0.32;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(spoutX - streamW * 0.2, spoutY);
  ctx.quadraticCurveTo(midX - streamW * 0.2, midY, landX - streamW * 0.2, landY);
  ctx.stroke();

  ctx.fillStyle = juice.top;
  ctx.beginPath();
  ctx.arc(landX, landY - 1, streamW * 0.7, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = juice.bot;
  ctx.beginPath();
  ctx.arc(landX, landY + 1, streamW * 0.35, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

// ============================================================
// RENDER: UI
// ============================================================
function drawLogo() {
  const lw = Math.min(150, W * 0.20);
  const lh = lw * 0.55;
  const lx = 10, ly = 10;
  ctx.save();
  const g = ctx.createLinearGradient(0, ly, 0, ly + lh);
  g.addColorStop(0, '#7e4820');
  g.addColorStop(1, '#5a2f10');
  ctx.fillStyle = g;
  roundRectPath(lx, ly, lw, lh, 8);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,220,150,0.5)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = '#ffd24d';
  ctx.font = 'bold ' + Math.floor(lh * 0.26) + 'px system-ui,-apple-system,sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('SUMMER', lx + lw/2, ly + lh * 0.27);
  ctx.fillStyle = '#fff';
  ctx.fillText('JUICE BAR', lx + lw/2, ly + lh * 0.57);
  ctx.fillStyle = '#ffd24d';
  ctx.font = 'bold ' + Math.floor(lh * 0.16) + 'px system-ui,sans-serif';
  ctx.fillText('— SORT —', lx + lw/2, ly + lh * 0.83);
  ctx.restore();
}

function drawCTA() {
  const cw = Math.min(240, W * 0.52);
  const ch = 56;
  const cx = W / 2;
  const cy = H - ch / 2 - 18;
  ctaHitBox = { x: cx - cw/2, y: cy - ch/2, w: cw, h: ch };

  const pulse = 1 + Math.sin(totalTime * 3.2) * 0.04;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(pulse, pulse);
  ctx.shadowColor = 'rgba(0,0,0,0.35)';
  ctx.shadowBlur = 10;
  ctx.shadowOffsetY = 4;
  const g = ctx.createLinearGradient(0, -ch/2, 0, ch/2);
  g.addColorStop(0, '#ffe066');
  g.addColorStop(0.5, '#ffa524');
  g.addColorStop(1, '#d96b00');
  ctx.fillStyle = g;
  roundRectPath(-cw/2, -ch/2, cw, ch, ch/2);
  ctx.fill();
  ctx.shadowColor = 'transparent';
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px system-ui,-apple-system,sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(won ? 'DOWNLOAD NOW' : 'PLAY NOW', 0, 0);
  ctx.restore();
}

function drawWinOverlay() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 44px system-ui,-apple-system,sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(255,180,30,0.85)';
  ctx.shadowBlur = 20;
  ctx.fillText('JUICE DELIVERED!', W/2, H * 0.3);
  ctx.shadowBlur = 0;
  ctx.font = '18px system-ui,sans-serif';
  ctx.fillStyle = '#ffe6b3';
  ctx.fillText('100+ juicy levels inside', W/2, H * 0.3 + 32);
  ctx.restore();
}

function hitCTA(px, py) {
  if (!ctaHitBox) return false;
  return px >= ctaHitBox.x && px <= ctaHitBox.x + ctaHitBox.w &&
         py >= ctaHitBox.y && py <= ctaHitBox.y + ctaHitBox.h;
}
function fireCTA() {
  sfxClick();
  try {
    if (window.mraid && window.mraid.open) window.mraid.open('https://apps.apple.com/');
    else if (window.install) window.install();
  } catch(e) {}
}

// ============================================================
// MAIN LOOP
// ============================================================
let lastTime = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - lastTime) / 1000);
  lastTime = now;
  totalTime += dt;

  updateTweens(dt);
  updateParticles(dt);
  emitFlowDroplets(dt);

  // Trigger drink-sealing sequence the first frame a bottle becomes complete:
  //   1. Paper umbrella slides in from the right
  //   2. First ice cube drops and bounces
  //   3. Second ice cube drops and bounces (slightly offset)
  for (const b of bottles) {
    const done = isBottleCompleted(b);
    if (done && !b.capTriggered) {
      b.capTriggered = true;
      b.umbrellaProgress = 0;
      b.ice1Progress = 0;
      b.ice2Progress = 0;
      tween(b, { umbrellaProgress: 1 }, 0.42, { ease: 'outCubic' });
      tween(b, { ice1Progress: 1 },     0.55, { delay: 0.25, ease: 'outBounce' });
      tween(b, { ice2Progress: 1 },     0.55, { delay: 0.42, ease: 'outBounce' });
      sfxSealed();
    }
  }

  drawBackground();

  // Ordering: objective behind other glasses, selected/animating on top
  const order = bottles.slice().sort((a, b) => {
    if (a.isObjective !== b.isObjective) return a.isObjective ? -1 : 1;
    const aAnim = (a === selected || (isAnimating && a.angle !== 0));
    const bAnim = (b === selected || (isAnimating && b.angle !== 0));
    if (aAnim !== bAnim) return aAnim ? 1 : -1;
    return a.baseY - b.baseY;
  });
  for (const b of order) drawGlass(b);

  drawFlowLine();
  drawParticles();

  drawLogo();
  drawCTA();
  if (won) drawWinOverlay();

  requestAnimationFrame(loop);
}

// ============================================================
// BOOT
// ============================================================
buildLevel();
resize();
requestAnimationFrame(loop);

})();
</script>
