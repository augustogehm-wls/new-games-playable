// ============================================================
// TWEEN ENGINE (GSAP-style subset)
// ============================================================
const tweens = [];
function tween(obj, to, dur, opts) {
  opts = opts || {};
  const from = {};
  for (const k in to) from[k] = obj[k];
  const t = {
    obj, from, to, dur,
    ease: opts.ease || 'outSine',
    onUpdate: opts.onUpdate || null,
    onComplete: opts.onComplete || null,
    delay: opts.delay || 0,
    elapsed: 0,
    alive: true
  };
  tweens.push(t);
  return t;
}
function killTweensOf(obj, keys) {
  for (const t of tweens) {
    if (t.obj !== obj) continue;
    if (!keys) { t.alive = false; continue; }
    for (const k of keys) if (k in t.to) { t.alive = false; break; }
  }
}
const EASE = {
  linear:    t => t,
  outSine:   t => Math.sin(t * Math.PI / 2),
  inSine:    t => 1 - Math.cos(t * Math.PI / 2),
  inOutSine: t => -(Math.cos(Math.PI * t) - 1) / 2,
  outQuad:   t => 1 - (1-t)*(1-t),
  inQuad:    t => t*t,
  outCubic:  t => 1 - Math.pow(1-t, 3),
  inCubic:   t => t*t*t,
  inOutCubic: t => t<0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2,
  outBack:   t => { const c1=1.70158, c3=c1+1; return 1 + c3*Math.pow(t-1,3) + c1*Math.pow(t-1,2); },
  outElastic: t => {
    if (t===0 || t===1) return t;
    const c = (2*Math.PI)/3;
    return Math.pow(2,-10*t) * Math.sin((t*10-0.75)*c) + 1;
  },
  outBounce: t => {
    const n1 = 7.5625, d1 = 2.75;
    if (t < 1/d1) return n1 * t * t;
    if (t < 2/d1) { t -= 1.5/d1; return n1 * t * t + 0.75; }
    if (t < 2.5/d1) { t -= 2.25/d1; return n1 * t * t + 0.9375; }
    t -= 2.625/d1; return n1 * t * t + 0.984375;
  }
};
function updateTweens(dt) {
  for (let i = tweens.length - 1; i >= 0; i--) {
    const t = tweens[i];
    if (!t.alive) { tweens.splice(i, 1); continue; }
    if (t.delay > 0) { t.delay -= dt; continue; }
    t.elapsed += dt;
    const k = t.dur > 0 ? Math.min(1, t.elapsed / t.dur) : 1;
    const e = EASE[t.ease](k);
    for (const key in t.to) {
      t.obj[key] = t.from[key] + (t.to[key] - t.from[key]) * e;
    }
    if (t.onUpdate) t.onUpdate();
    if (k >= 1) {
      if (t.onComplete) t.onComplete();
      tweens.splice(i, 1);
    }
  }
}

// ============================================================
// AUDIO (Web Audio API — procedural SFX & music, no external assets)
// Maps the Magic Sort sound bank onto a juice-bar tropical timbre.
// ============================================================
let audioCtx = null;
let audioMaster = null;
let audioMuted = false;
let ambientTimer = null;

function initAudio() {
  if (audioCtx) return;
  const Ctx = window.AudioContext || window.webkitAudioContext;
  if (!Ctx) return;
  try {
    audioCtx = new Ctx();
    audioMaster = audioCtx.createGain();
    audioMaster.gain.value = 0.55;
    audioMaster.connect(audioCtx.destination);
  } catch (e) { audioCtx = null; }
}
function audioResume() {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
}

// Single-oscillator note with ADSR-ish envelope and optional pitch sweep.
function playTone(opts) {
  if (!audioCtx || audioMuted) return;
  const o = opts || {};
  const freq    = o.freq    || 440;
  const dur     = o.dur     || 0.12;
  const type    = o.type    || 'sine';
  const vol     = o.vol     || 0.25;
  const attack  = o.attack  || 0.005;
  const release = o.release || 0.05;
  const sweep   = o.sweep   || 0;
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  if (sweep) {
    const target = Math.max(40, freq + sweep);
    osc.frequency.exponentialRampToValueAtTime(target, t0 + dur);
  }
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol, t0 + attack);
  g.gain.linearRampToValueAtTime(0, t0 + dur + release);
  osc.connect(g);
  g.connect(audioMaster);
  osc.start(t0);
  osc.stop(t0 + dur + release + 0.02);
}

// Filtered white noise burst — for splashes, pour streams, swooshes.
function playNoise(opts) {
  if (!audioCtx || audioMuted) return;
  const o = opts || {};
  const dur     = o.dur     || 0.1;
  const vol     = o.vol     || 0.25;
  const freq    = o.freq    || 1500;
  const q       = o.q       || 4;
  const attack  = o.attack  || 0.005;
  const release = o.release || 0.06;
  const ftype   = o.filter  || 'bandpass';
  const t0 = audioCtx.currentTime;
  const len = Math.ceil((dur + release) * audioCtx.sampleRate);
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const filt = audioCtx.createBiquadFilter();
  filt.type = ftype;
  filt.frequency.value = freq;
  filt.Q.value = q;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol, t0 + attack);
  g.gain.linearRampToValueAtTime(0, t0 + dur + release);
  src.connect(filt);
  filt.connect(g);
  g.connect(audioMaster);
  src.start(t0);
  src.stop(t0 + dur + release + 0.02);
}

// Magical ambient loop — D major pentatonic plucks, gentle and dreamy
// (lighter than the witch's A-minor). Same volume / envelope per
// CLAUDE.md (vol ≈ 0.04).
function startAmbient() {
  if (!audioCtx || audioMuted || ambientTimer) return;
  // D-major pentatonic wandering line: D F# A B D ...
  const pattern = [
    { f: 294, d: 0.42 }, { f: 370, d: 0.42 },
    { f: 440, d: 0.42 }, { f: 494, d: 0.42 },
    { f: 587, d: 0.42 }, { f: 494, d: 0.42 },
    { f: 440, d: 0.42 }, { f: 294, d: 0.62 }
  ];
  let idx = 0;
  function tick() {
    if (audioMuted || !audioCtx) { ambientTimer = null; return; }
    const note = pattern[idx % pattern.length];
    const t0 = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = note.f;
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(0.04, t0 + 0.04);
    g.gain.exponentialRampToValueAtTime(0.0008, t0 + note.d);
    osc.connect(g);
    g.connect(audioMaster);
    osc.start(t0);
    osc.stop(t0 + note.d + 0.05);
    idx++;
    ambientTimer = setTimeout(tick, note.d * 1000);
  }
  tick();
}
function stopAmbient() { if (ambientTimer) { clearTimeout(ambientTimer); ambientTimer = null; } }

// ============================================================
// POTION PALETTE — witchy bottles full of magical brews.
// Slot names kept identical to the juice-bar version so all engine code
// (GOAL_COLOR === 'pink', distribution table, etc.) keeps working. Only
// the rgb values change — pink is now an arcane magenta-violet (the
// witch's signature potion), the others are fire / poison / gold magic
// / blood / frost / arcane purple.
// ============================================================
// Each colour is an "element" of magic sand. The `element` field drives
// the per-colour particle SHAPE drawn inside each liquid run (replaces
// the simple round bubbles from the witch potion theme — see
// drawSandParticle below for the per-element rendering).
//
// Slot keys are kept identical to the previous themes (`orange`, `lime`,
// `yellow`, `red`, `pink`, `blue`, `purple`) so all engine code
// (GOAL_COLOR === 'pink', distribution table, etc.) keeps working —
// only the visuals change. `pink` is the goal: a glowing arcane sand.
const JUICE = {
  orange:  { top:'#ffd486', mid:'#ff8420', bot:'#a04200', element:'ember'    }, // ember sparks
  lime:    { top:'#c5f88a', mid:'#5fdb24', bot:'#246a08', element:'leaf'     }, // forest leaf
  yellow:  { top:'#ffeea0', mid:'#ffc02e', bot:'#a06800', element:'sparkle'  }, // sleep sand
  red:     { top:'#ff9a86', mid:'#e63630', bot:'#680c0c', element:'flame'    }, // fire
  pink:    { top:'#e9b4ff', mid:'#a84cff', bot:'#3e0a82', element:'swirl'    }, // arcane (GOAL)
  blue:    { top:'#9ad6ff', mid:'#3f8eea', bot:'#0d3e8a', element:'snowflake'}, // ice
  purple:  { top:'#caa0ff', mid:'#7e36c0', bot:'#2a0a60', element:'wisp'     }  // shadow
};
const COLOR_KEYS = Object.keys(JUICE);
const GOAL_COLOR = 'pink';
let GOAL_UNITS = 24; // updated in layoutBottles to match objective capacity

// ============================================================
// GAME STATE
// ============================================================
const CAPACITY = 4;
let LAYER_PX = 47;         // pixel height of ONE potion unit (consistent across all bottles)
const WALL_TOP_RATIO = 0.085;
const WALL_BOT_RATIO = 0.035;

// ----- Bottle anatomy (fractions of total height/width) -----
// Tuned for the Magic Sand theme: SLIMMER + TALLER body than the witch
// potion bottle, with a shorter / wider neck and a very small lip flare.
// Total height splits as: lip (3%) + neck (10%) + shoulder S-curve (7%)
// + body (80%). Sand lives ONLY in the body — the shoulder, neck and lip
// are decorative glass that the cork stopper plugs into.
//
// (Variable names kept as POTION_* for engine-wide compatibility — the
// witch_potion theme used the same parameter set, just different values.)
const POTION_BODY_FRAC      = 0.80;  // body height / total height
const POTION_SHOULDER_BOT_Y = -0.80; // y of body top (start of shoulder) in -h units
const POTION_NECK_BOT_Y     = -0.87; // y of neck bottom (end of shoulder) in -h units
const POTION_LIP_BOT_Y      = -0.97; // y of lip bottom (start of neck) in -h units
const POTION_NECK_W_FRAC    = 0.56;  // neck width / body width — wider than potion
const POTION_LIP_FLARE      = 0.03;  // each side of lip flares this much past neck (× w)
const POTION_LIP_X_FRAC     = POTION_NECK_W_FRAC / 2 + POTION_LIP_FLARE; // 0.31 — lip outer x / w
let bottles = [];
let objective = null;
let selected = null;
let isAnimating = false;
let won = false;
let flowLine = null;
let particles = [];
let totalTime = 0;
let ctaHitBox = null;
let flowEmitAccum = 0;
let sandGrainPattern = null;          // Tileable noise texture (CanvasPattern)
const SAND_GRAIN_TILE = 96;           // px — large enough that the repeat isn't obvious

// Build a 96×96 offscreen canvas filled with semi-transparent dark + light
// dots, then wrap it in a CanvasPattern(`repeat`). Drawing this pattern as
// a fillStyle is GPU-accelerated and effectively free at runtime — the
// expensive part (generating the noise) runs ONCE at boot.
//
// Tileability: dots near an edge are also drawn at the wrapped opposite
// edges (and corners) so when the pattern repeats, dots don't get cut
// off mid-circle.
function buildSandGrainPattern() {
  const off = document.createElement('canvas');
  off.width = SAND_GRAIN_TILE;
  off.height = SAND_GRAIN_TILE;
  const octx = off.getContext('2d');

  function paintDot(x, y, r, fill) {
    octx.fillStyle = fill;
    // Main + 4 axis-wraps + 4 corner-wraps for seamless tiling.
    const offsets = [[0, 0]];
    if (x - r < 0)             offsets.push([SAND_GRAIN_TILE, 0]);
    if (x + r > SAND_GRAIN_TILE) offsets.push([-SAND_GRAIN_TILE, 0]);
    if (y - r < 0)             offsets.push([0, SAND_GRAIN_TILE]);
    if (y + r > SAND_GRAIN_TILE) offsets.push([0, -SAND_GRAIN_TILE]);
    if (x - r < 0 && y - r < 0)                       offsets.push([SAND_GRAIN_TILE, SAND_GRAIN_TILE]);
    if (x + r > SAND_GRAIN_TILE && y - r < 0)         offsets.push([-SAND_GRAIN_TILE, SAND_GRAIN_TILE]);
    if (x - r < 0 && y + r > SAND_GRAIN_TILE)         offsets.push([SAND_GRAIN_TILE, -SAND_GRAIN_TILE]);
    if (x + r > SAND_GRAIN_TILE && y + r > SAND_GRAIN_TILE) offsets.push([-SAND_GRAIN_TILE, -SAND_GRAIN_TILE]);
    for (const [dx, dy] of offsets) {
      octx.beginPath();
      octx.arc(x + dx, y + dy, r, 0, Math.PI * 2);
      octx.fill();
    }
  }

  // Dark grit — gives the sand its "shadow speckle" look against any
  // colour. Alpha range was 0.20–0.40; softened by ×0.85 (15% more
  // transparent) per user feedback to make the grain less harsh.
  for (let i = 0; i < 260; i++) {
    paintDot(
      Math.random() * SAND_GRAIN_TILE,
      Math.random() * SAND_GRAIN_TILE,
      0.4 + Math.random() * 0.9,
      'rgba(0,0,0,' + (0.17 + Math.random() * 0.17).toFixed(3) + ')'
    );
  }
  // Light highlights — tiny bright catches that read as glints on grain edges
  for (let i = 0; i < 150; i++) {
    paintDot(
      Math.random() * SAND_GRAIN_TILE,
      Math.random() * SAND_GRAIN_TILE,
      0.3 + Math.random() * 0.7,
      'rgba(255,255,255,' + (0.14 + Math.random() * 0.18).toFixed(3) + ')'
    );
  }
  // Sparse mid-tone clumps — small clusters of 2-3 dots for a more organic
  // grain distribution (single isolated dots can look "TV-static-y").
  // Alpha also softened by ×0.85 (range was 0.18–0.28).
  for (let i = 0; i < 40; i++) {
    const cx = Math.random() * SAND_GRAIN_TILE;
    const cy = Math.random() * SAND_GRAIN_TILE;
    const c = 'rgba(0,0,0,' + (0.15 + Math.random() * 0.085).toFixed(3) + ')';
    for (let k = 0; k < 3; k++) {
      paintDot(
        cx + (Math.random() - 0.5) * 4,
        cy + (Math.random() - 0.5) * 4,
        0.5 + Math.random() * 0.6,
        c
      );
    }
  }

  sandGrainPattern = ctx.createPattern(off, 'repeat');
}

// ============================================================
// TUTORIAL — hand-tap hint (modeled on the magic_sort reference).
// State machine:
//   • If the player has not interacted yet AND no bottle is selected,
//     a hand floats over a non-objective bottle that has the goal color
//     (pink) on top. The hand "taps" in a yoyo scale loop and the
//     pointed bottle "jumps" in sync (lift up + down) every tap cycle.
//   • Once the player selects that source bottle, the hand moves over
//     to the objective tube and resumes tapping there with the
//     objective bottle jumping each cycle.
//   • Any pour, tap on a different bottle, or victory permanently
//     dismisses the hand. After dismissal the hand never reappears for
//     the rest of the play (matches the reference behaviour and avoids
//     pestering the player).
// All bottle-jump motion goes through `b.lift` (the existing select-up
// transform), so it composes cleanly with select / pour / shake — no
// extra transform stack added.
// ============================================================
const tutorial = {
  dismissed: false,            // permanently disabled after first interaction with the puzzle
  state: 'idle',               // 'idle' | 'pointing-source' | 'pointing-target'
  bottle: null,                // current target of the hand
  // Hand transform (animated). `mirror` flips horizontally so the wrist
  // can come from either side of the fingertip without flipping vertically
  // (which would invert the pointing direction).
  hand: { x: 0, y: 0, scale: 0, alpha: 0, mirror: false },
  // Tap cycle — drives the hand-shrink + bottle-jump rhythm.
  tapPhase: 0,                 // 0..1, sawtooth driven by dt
  tapDur: 1.1,                 // seconds per full tap cycle
  // Idle delay before the hand first appears (reference uses a small delay
  // so the player has a chance to act before being prompted).
  idleTimer: 0,
  IDLE_DELAY: 1.6
};

function buildLevel() {
  bottles = [];
  // 6 pink cups (24 pink units = enough to fill the goal tube) + 4 cups
  // for each of the 5 other flavors (20 cups) + 4 empty workspaces = 30 total.
  const distribution = [
    { color: 'pink',   cups: 6 },
    { color: 'orange', cups: 4 },
    { color: 'lime',   cups: 4 },
    { color: 'yellow', cups: 4 },
    { color: 'red',    cups: 4 },
    { color: 'blue',   cups: 4 }
  ];
  const emptyCount = 4;

  const glasses = [];
  for (const { color, cups } of distribution) {
    for (let i = 0; i < cups; i++) glasses.push([color, color, color, color]);
  }
  for (let i = 0; i < emptyCount; i++) glasses.push([]);

  // Reverse-scramble to deeply mix while staying solvable
  const filledCount = glasses.length - emptyCount;
  const moves = filledCount * 5;
  for (let m = 0; m < moves; m++) {
    const nonEmpty = [], notFull = [];
    for (const g of glasses) {
      if (g.length > 0) nonEmpty.push(g);
      if (g.length < CAPACITY) notFull.push(g);
    }
    if (!nonEmpty.length || !notFull.length) break;
    const s = nonEmpty[(Math.random() * nonEmpty.length) | 0];
    const d = notFull[(Math.random() * notFull.length) | 0];
    if (s === d && s.length >= CAPACITY) continue;
    d.push(s.pop());
  }

  // Guard: no bottle should start already COMPLETE (4 of same color).
  // Swap tops with a different-color neighbor to break uniform stacks.
  for (let pass = 0; pass < 12; pass++) {
    let swapped = false;
    for (let gi = 0; gi < glasses.length; gi++) {
      const g = glasses[gi];
      if (g.length !== CAPACITY) continue;
      const first = g[0];
      let uniform = true;
      for (let i = 1; i < g.length; i++) if (g[i] !== first) { uniform = false; break; }
      if (!uniform) continue;
      // Find a partner with a different top to swap with
      const partners = [];
      for (let oi = 0; oi < glasses.length; oi++) {
        if (oi === gi) continue;
        const o = glasses[oi];
        if (o.length === 0) continue;
        if (o[o.length - 1] === first) continue;
        partners.push(o);
      }
      if (!partners.length) continue;
      const other = partners[(Math.random() * partners.length) | 0];
      const gTop = g.pop(), oTop = other.pop();
      g.push(oTop); other.push(gTop);
      swapped = true;
    }
    if (!swapped) break;
  }

  for (let i = 0; i < glasses.length; i++) {
    bottles.push({
      id: i,
      isObjective: false,
      layers: glasses[i].slice(),
      fillLevel: glasses[i].length,
      capacity: CAPACITY,
      x: 0, y: 0, baseX: 0, baseY: 0,
      w: 0, h: 0,
      angle: 0, lift: 0, glow: 0,
      slosh: 0, sloshSeed: Math.random() * 100,
      capTriggered: false,      // latched once the seal sequence starts
      // Seal-sequence state. Names are kept from the juice-bar version
      // (so the engine wiring is identical) but the visuals are now:
      //   umbrellaProgress → CORK STOPPER drop progress (0→1)
      //   ice1Progress     → first MAGIC SMOKE WISP rise progress (0→1)
      //   ice2Progress     → second MAGIC SMOKE WISP rise progress (0→1)
      umbrellaProgress: 0,
      ice1Progress: 0,
      ice2Progress: 0
    });
  }

  // Ensure there's enough pink to succeed. The reverse scramble disperses
  // pink across glasses — the player finds one with pink on top and pours.
  objective = {
    id: bottles.length,
    isObjective: true,
    goalColor: GOAL_COLOR,
    layers: [],
    fillLevel: 0,
    capacity: 10,
    x: 0, y: 0, baseX: 0, baseY: 0,
    w: 0, h: 0,
    angle: 0, lift: 0, glow: 0,
    slosh: 0, sloshSeed: Math.random() * 100
  };
  bottles.push(objective);
}

function layoutBottles() {
  if (!bottles.length) return;
  const landscape = W >= H;

  // Grid: always 6×5 (30 small cups) — consistent across orientations.
  const cols = 6;
  const rows = 5;
  const ratio = landscape ? 2.4 : 2.6;
  const smalls = bottles.filter(b => !b.isObjective);

  // Logo takes top-left (smaller now). Layout starts below it.
  const logoW = Math.min(150, W * 0.20);
  const logoH = logoW * 0.55;
  const logoBottom = 14 + logoH + 10;

  const topMargin = Math.max(logoBottom, H * 0.10);
  const bottomMargin = H * 0.14; // CTA reservation
  const usableH = H - topMargin - bottomMargin;

  // Objective gets a dedicated left strip (same logic landscape & portrait)
  const objStripW = Math.min(W * 0.16, 130);
  const gridAreaX = objStripW + 4;
  const gridAreaW = W - gridAreaX - 10;

  // Tight horizontal gap, generous vertical gap (matching reference)
  const hPadFactor = 0.12;
  const vPadFactor = 0.22;

  let gh = usableH / (rows + (rows - 1) * vPadFactor);
  let gw = gh / ratio;
  const maxGW = (gridAreaW - 20) / (cols + (cols - 1) * hPadFactor);
  if (gw > maxGW) { gw = maxGW; gh = gw * ratio; }
  gw = Math.max(26, Math.min(gw, 90));
  gh = gw * ratio;

  const hPad = gw * hPadFactor;
  const vPad = gh * vPadFactor;
  const gridPixelW = cols * gw + (cols - 1) * hPad;
  const gridPixelH = rows * gh + (rows - 1) * vPad;

  const gridLeftX = gridAreaX + (gridAreaW - gridPixelW) / 2;
  const firstRowTopY = topMargin + (usableH - gridPixelH) / 2;
  const firstRowBaseY = firstRowTopY + gh;

  // Liquid lives only in the BODY of the potion bottle, so LAYER_PX is
  // derived from the body interior height (matches getInteriorBounds for
  // non-objective bottles). The goal flask uses the SAME LAYER_PX so a
  // single potion unit looks the same size everywhere — its capacity is
  // recomputed below from this LAYER_PX.
  const smallBodyInteriorH = gh * (POTION_BODY_FRAC - WALL_TOP_RATIO * 0.5 - WALL_BOT_RATIO);
  LAYER_PX = smallBodyInteriorH / CAPACITY;

  for (let i = 0; i < smalls.length; i++) {
    const r = Math.floor(i / cols);
    const c = i % cols;
    const x = gridLeftX + gw/2 + c * (gw + hPad);
    const y = firstRowBaseY + r * (gh + vPad);
    const b = smalls[i];
    b.baseX = x; b.baseY = y;
    b.x = x;     b.y = y;
    b.w = gw;    b.h = gh;
    b.capacity = CAPACITY;
  }

  // Objective: aligned EXACTLY with grid vertical extent
  const objTop = firstRowTopY;
  const lastRowBaseY = firstRowBaseY + (rows - 1) * (gh + vPad);
  const objBottom = lastRowBaseY;
  objective.h = objBottom - objTop;
  objective.w = Math.min(gw * 1.75, objStripW * 0.82, 115);
  // Right edge of the objective sits just left of the first grid bottle
  objective.x = gridLeftX - 12 - objective.w / 2;
  if (objective.x - objective.w / 2 < 6) objective.x = objective.w / 2 + 6;
  objective.y = objBottom;
  const objInteriorH = objective.h * (1 - WALL_TOP_RATIO - WALL_BOT_RATIO);
  objective.capacity = Math.max(6, Math.floor(objInteriorH / LAYER_PX));
  // Win when the goal tube is filled — we have 24 pink units available,
  // but cap the goal at whatever actually fits in the tube.
  GOAL_UNITS = Math.min(24, objective.capacity);
  objective.baseX = objective.x;
  objective.baseY = objective.y;
}

// ============================================================
// INPUT
// ============================================================
function pointerPos(ev) {
  const rect = canvas.getBoundingClientRect();
  const t = (ev.touches && ev.touches[0]) || (ev.changedTouches && ev.changedTouches[0]) || ev;
  return { x: (t.clientX || 0) - rect.left, y: (t.clientY || 0) - rect.top };
}
function onTap(ev) {
  ev.preventDefault && ev.preventDefault();
  const p = pointerPos(ev);
  handleTap(p.x, p.y);
}
canvas.addEventListener('mousedown', onTap);
canvas.addEventListener('touchstart', onTap, { passive: false });

function handleTap(px, py) {
  // First tap unlocks audio (mobile autoplay policy) and starts the ambient.
  if (!audioCtx) { initAudio(); startAmbient(); }
  audioResume();

  if (hitCTA(px, py)) { fireCTA(); return; }
  if (won || isAnimating) return;

  const b = hitTestBottle(px, py);
  if (!b) return;

  if (!selected) {
    if (b.layers.length === 0) return;
    if (b.isObjective) return; // objective is destination only
    if (isBottleCompleted(b)) return; // sealed bottles can't be picked up
    selected = b;
    // First click that reveals the puzzle: if the hand was pointing at
    // THIS bottle (the suggested source), keep the tutorial alive so it
    // can shift to the objective on the next idle. Any other bottle =>
    // dismiss permanently (player explored on their own).
    if (!tutorial.dismissed) {
      if (tutorial.bottle && b !== tutorial.bottle) {
        dismissTutorial();
      } else {
        tutorial.idleTimer = tutorial.IDLE_DELAY;
        tutorialUpdateTarget();
      }
    }
    killTweensOf(b, ['lift', 'glow']);
    tween(b, { lift: -b.h * 0.1, glow: 1 }, 0.22, { ease: 'outBack' });
    // Big initial slosh that settles into a gentle sustained wobble — the
    // surface stays alive the whole time the bottle is selected.
    triggerSlosh(b, 0.95, 0.55, 0.14);
    sfxBottleUp();
  } else if (selected === b) {
    if (!tutorial.dismissed) dismissTutorial();
    const s = selected; selected = null;
    killTweensOf(s, ['lift', 'glow']);
    tween(s, { lift: 0, glow: 0 }, 0.2, { ease: 'outQuad' });
    // Full decay once deselected
    triggerSlosh(s, 0.4, 0.6, 0);
    sfxBottleDown();
  } else {
    if (!tutorial.dismissed) dismissTutorial();
    const src = selected; const dst = b;
    selected = null;
    if (canPour(src, dst)) {
      executePour(src, dst);
    } else {
      killTweensOf(src, ['lift', 'glow']);
      tween(src, { lift: 0, glow: 0 }, 0.2, { ease: 'outQuad' });
      const ox = dst.x;
      tween(dst, { x: ox - 5 }, 0.06, { ease: 'outSine',
        onComplete: () => tween(dst, { x: ox + 5 }, 0.08, { ease: 'inOutSine',
          onComplete: () => tween(dst, { x: ox }, 0.06, { ease: 'outSine' })
        })
      });
      triggerSlosh(dst, 0.5, 0.4);
      sfxInvalid();
    }
  }
}

function triggerSlosh(b, amp, decay, target) {
  // `target` is the resting slosh value the tween settles to (default 0).
  // Passing a positive target keeps the liquid gently wobbling — used while
  // a bottle is selected, so the surface is alive the whole time.
  if (target == null) target = 0;
  killTweensOf(b, ['slosh']);
  b.slosh = amp;
  tween(b, { slosh: target }, decay, { ease: 'outSine' });
}

// ============================================================
// TUTORIAL HELPERS
// ============================================================
// Find the source bottle for the first tutorial step: a non-objective,
// non-completed bottle that already has the goal color (pink) on top so
// the player's first move is a single tap → pour into the objective.
function findTutorialSourceBottle() {
  let fallback = null;
  for (const b of bottles) {
    if (b.isObjective) continue;
    if (!b.layers || b.layers.length === 0) continue;
    if (isBottleCompleted(b)) continue;
    const top = b.layers[b.layers.length - 1];
    if (top === GOAL_COLOR) return b;          // ideal: pink on top → can pour straight in
    if (!fallback) fallback = b;                // any non-empty bottle, just in case
  }
  return fallback;
}

function tutorialHandTargetFor(b) {
  // Place the fingertip on the bottle's body so the gesture is clearly
  // "tap THIS bottle". The hand silhouette extends down-and-to-one-side
  // from the fingertip — pick the side that points AWAY from screen
  // edges so the wrist isn't clipped and doesn't hide the objective.
  if (!b) return null;
  // Mirror horizontally for bottles on the right half so the body extends
  // down-LEFT (away from the right edge). Default (mirror=false) puts the
  // body down-RIGHT, used for the objective tube and the left-side
  // bottles so the wrist never sits over the goal flask.
  const mirror = (b.baseX > W * 0.5);
  const fingertipX = b.baseX + (mirror ? b.w * 0.05 : -b.w * 0.05);
  // Fingertip on the upper half of the body — keeps the wrist/cuff
  // (which extends ~baseSize below the fingertip) within the bottle's
  // own footprint instead of spilling into the row below.
  const fingertipY = b.baseY - b.h * 0.55;
  return { x: fingertipX, y: fingertipY, mirror: mirror };
}

function tutorialUpdateTarget() {
  // Choose source vs. target based on the current selection state.
  if (won || tutorial.dismissed) { tutorial.state = 'idle'; return; }
  if (!selected) {
    const src = findTutorialSourceBottle();
    if (!src) { tutorial.state = 'idle'; return; }
    tutorial.state = 'pointing-source';
    tutorial.bottle = src;
  } else {
    tutorial.state = 'pointing-target';
    tutorial.bottle = objective;
  }
  const t = tutorialHandTargetFor(tutorial.bottle);
  if (!t) { tutorial.state = 'idle'; return; }
  tutorial.hand.mirror = t.mirror;
  // First time the hand appears in this state, snap into position before
  // tweening alpha/scale in. On state changes (source → target) we tween
  // the position smoothly so it feels continuous.
  if (tutorial.hand.alpha < 0.05) {
    tutorial.hand.x = t.x;
    tutorial.hand.y = t.y;
    killTweensOf(tutorial.hand, ['alpha', 'scale']);
    tween(tutorial.hand, { alpha: 1, scale: 1 }, 0.5, { ease: 'outBack' });
    tutorial.tapPhase = 0;
  } else {
    killTweensOf(tutorial.hand, ['x', 'y']);
    tween(tutorial.hand, { x: t.x, y: t.y }, 0.55, { ease: 'inOutCubic' });
  }
}

function dismissTutorial() {
  // Permanent for the rest of the play. The hand fades out smoothly so
  // we don't see a hard pop as the user taps.
  tutorial.dismissed = true;
  tutorial.state = 'idle';
  killTweensOf(tutorial.hand);
  tween(tutorial.hand, { alpha: 0, scale: 0.8 }, 0.25, { ease: 'inQuad' });
}

// One bottle "jump" in sync with a hand tap. Goes through b.lift so it
// composes with select-up / shake / pour-position transforms (the loop
// already uses `lift` to offset draw position vertically).
//
// The objective tube is much taller than the small bottles (≈ 5× the
// height), so a 10 %-of-height jump on it visibly travels far further
// in pixels and reads as a big bouncing flask. The objective uses 1/4
// (2.5 %) of the regular amplitude, so the absolute pixel travel is
// closer to a small-bottle jump.
function tutorialJumpBottle(b, dur) {
  if (!b) return;
  // Don't fight the select-up tween — if the bottle is already selected,
  // the lift is held at -h*0.10. Skip the jump so we don't snap it down.
  if (b === selected) return;
  killTweensOf(b, ['lift']);
  const amp = b.isObjective ? 0.025 : 0.10;
  const up = -b.h * amp;
  tween(b, { lift: up }, dur * 0.45, {
    ease: 'outSine',
    onComplete: () => tween(b, { lift: 0 }, dur * 0.55, { ease: 'inSine' })
  });
  // Liquid slosh paired with the lift — the bottle should look like the
  // potion is responding to the jump, not just the glass moving with the
  // liquid frozen inside. Decays back to 0 over the full jump duration so
  // the wave is gone by the time the lift settles. Smaller amp on the
  // objective tube to match the smaller lift (matches `amp` ratio).
  const sloshAmp = b.isObjective ? 0.18 : 0.55;
  triggerSlosh(b, sloshAmp, dur, 0);
}

function updateTutorial(dt) {
  if (won) {
    if (tutorial.hand.alpha > 0.01) dismissTutorial();
    return;
  }
  if (tutorial.dismissed) return;
  // While a pour animation is happening, freeze the tutorial so the
  // bottle-jump doesn't fight the pour transform. Resume on next frame.
  if (isAnimating) return;

  // Idle delay — only relevant for the very first appearance.
  if (tutorial.state === 'idle') {
    tutorial.idleTimer += dt;
    if (tutorial.idleTimer < tutorial.IDLE_DELAY) return;
    tutorialUpdateTarget();
    return;
  }

  // Sanity: bottle might have been completed/changed since last frame.
  if (!tutorial.bottle ||
      (tutorial.state === 'pointing-source' && (selected || isBottleCompleted(tutorial.bottle))) ||
      (tutorial.state === 'pointing-target' && !selected)) {
    tutorialUpdateTarget();
    if (tutorial.state === 'idle') return;
  }

  // Tap cycle — sawtooth from 0 to 1 over tapDur seconds.
  const prev = tutorial.tapPhase;
  tutorial.tapPhase += dt / tutorial.tapDur;
  if (tutorial.tapPhase >= 1) {
    tutorial.tapPhase -= 1;
    // Cycle just wrapped — fire the bottle jump on the new cycle's start.
    tutorialJumpBottle(tutorial.bottle, tutorial.tapDur);
  } else if (prev === 0) {
    // First-ever tap — fire immediately so it doesn't feel like a delay.
    tutorialJumpBottle(tutorial.bottle, tutorial.tapDur);
  }
}

// Tutorial hand — uses the witch_hand.png sprite (loaded as base64
// data URI at script start; see WITCH_HAND_B64). Pivot is the image's
// top-left corner, as requested:
//   * tutorial.hand.x, tutorial.hand.y is the position of the image's
//     (0, 0) corner in world space.
//   * Tap-shrink yoyo scales the sprite around that pivot, so the
//     fingertip (which sits in the upper-left region of the artwork)
//     stays anchored while the rest of the hand "presses in".
//   * Mirror flips horizontally (negative x scale) so the wrist can
//     come from either side of the target bottle without flipping
//     the pointing direction vertically.
function drawTutorialHand() {
  if (!handImgReady) return;
  if (tutorial.hand.alpha < 0.01 || tutorial.hand.scale < 0.01) return;
  const HX = tutorial.hand.x, HY = tutorial.hand.y;
  const a = tutorial.hand.alpha;

  // Tap-cycle yoyo. Smaller squash than the procedural version (0.84
  // floor vs 0.72) — the painted artwork has its own visual punch and
  // an aggressive squash now reads as wobble.
  const p = tutorial.tapPhase;
  const tapShrink = p < 0.5
    ? 1.0 - 0.16 * EASE.outQuad(p / 0.5)         // 1.0 → 0.84
    : 0.84 + 0.16 * EASE.outQuad((p - 0.5) / 0.5); // 0.84 → 1.0

  // Display size — width/height of the rendered sprite. Source PNG is
  // 128×128, scaled down to roughly 1.6× the small-bottle width.
  const baseDisp = Math.max(54, Math.min(82, (bottles[0] ? bottles[0].w : 40) * 1.6));
  const dispSize = baseDisp * tapShrink * tutorial.hand.scale;
  // Per-playable horizontal squeeze — for THIS specific playable the
  // user asked the witch hand to be a touch narrower (80 % of normal X).
  // Applied only to X so the vertical proportion of the painted artwork
  // is preserved. Other playables can keep this at 1.0.
  const HAND_X_SQUEEZE = 0.80;

  ctx.save();
  ctx.globalAlpha = a;
  ctx.translate(HX, HY);

  // Tap-ring ripple — a glowing circle pulsing out from the fingertip.
  // Drawn BEFORE the sprite so it sits behind the hand. The fingertip
  // in the source image is around (10 %, 10 %) of its 128×128 frame.
  // After the X squeeze that horizontal fraction also shrinks (10 % ·
  // squeeze), so the ring's X offset uses the squeezed value to stay
  // glued to where the visible fingertip actually lands.
  const ringP = (p < 0.6) ? (p / 0.6) : 0;
  if (ringP > 0 && ringP < 1) {
    const r0 = baseDisp * 0.10;
    const r1 = baseDisp * 0.55;
    const rr = r0 + (r1 - r0) * EASE.outQuad(ringP);
    const ringX = (tutorial.hand.mirror ? -1 : 1) * baseDisp * 0.10 * HAND_X_SQUEEZE;
    const ringY = baseDisp * 0.10;
    ctx.save();
    ctx.globalAlpha = a * (1 - ringP) * 0.85;
    ctx.strokeStyle = '#ffe8a8';
    ctx.lineWidth = Math.max(1.4, baseDisp * 0.04);
    ctx.shadowColor = '#ffd24d';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(ringX, ringY, rr, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  // Hand sprite. Pivot at the image's top-left (= origin after translate).
  // For mirror, scale(-1, 1) flips horizontally; combined with the X
  // squeeze this becomes scale(-squeeze, 1). The image then extends
  // LEFT of the pivot (drawImage destination still drawn at 0,0 in the
  // flipped frame, lands at world x ∈ [HX − dispSize · squeeze, HX]).
  const sx = (tutorial.hand.mirror ? -1 : 1) * HAND_X_SQUEEZE;
  ctx.scale(sx, 1);
  ctx.drawImage(handImg, 0, 0, dispSize, dispSize);

  ctx.restore();
}

function hitTestBottle(px, py) {
  for (const b of bottles) {
    const top = b.y - b.h + b.lift - 10;
    const bot = b.y + b.lift + 24;
    const pad = b.isObjective ? 8 : 0;
    if (px >= b.x - b.w*0.75 - pad && px <= b.x + b.w*0.75 + pad &&
        py >= top && py <= bot) return b;
  }
  return null;
}

function canPour(src, dst) {
  if (src === dst) return false;
  if (src.layers.length === 0) return false;
  const dstCap = dst.capacity || CAPACITY;
  if (dst.layers.length >= dstCap) return false;
  // Objective tube accepts ONLY the goal juice (pink) — reject anything else
  if (dst.isObjective && src.layers[src.layers.length - 1] !== GOAL_COLOR) return false;
  if (dst.layers.length === 0) return true;
  return src.layers[src.layers.length-1] === dst.layers[dst.layers.length-1];
}

// ============================================================
// POUR CHOREOGRAPHY
// ============================================================
// Adaptive pour tilt — anchor table from the AppLovin reference's
// `B.waterLevelToDegree` (line ~32259, getDegreeAndEllipsePoses): a near-full
// bottle barely tips (small angle is all that's needed to start the spill),
// and an emptier bottle has to lean further to keep the surface near the
// spout. Linearly interpolated between fill-percentage anchors. Capped at 75°
// at the call site because past ~80° our 2-D world-horizontal layer model
// stops placing liquid at the spout end coherently.
function getPourTiltDeg(fillUnits, capacity) {
  const pct = (fillUnits / capacity) * 100;
  const table = [[0, 100], [25, 85], [50, 80], [75, 66], [100, 30]];
  if (pct <= table[0][0]) return table[0][1];
  if (pct >= table[table.length - 1][0]) return table[table.length - 1][1];
  for (let i = 0; i < table.length - 1; i++) {
    if (pct >= table[i][0] && pct <= table[i + 1][0]) {
      const t = (pct - table[i][0]) / (table[i + 1][0] - table[i][0]);
      return table[i][1] + t * (table[i + 1][1] - table[i][1]);
    }
  }
  return 58;
}

function executePour(src, dst) {
  isAnimating = true;
  const color = src.layers[src.layers.length - 1];

  let sameCount = 0;
  for (let i = src.layers.length - 1; i >= 0; i--) {
    if (src.layers[i] === color) sameCount++;
    else break;
  }
  const dstCap = dst.capacity || CAPACITY;
  const space = dstCap - dst.layers.length;
  const transfer = Math.min(sameCount, space);

  const sign = src.baseX <= dst.baseX ? 1 : -1;
  // Adaptive tilt: less for full bottles, more for emptier ones — same idea
  // as summer_juice_bar / witch_potion, ported from the magic_sort reference.
  // The starting angle is keyed off the CURRENT fill level so a full source
  // barely tips at first and progressively tilts more as units empty out
  // (re-tilt happens per pour-unit in pourOne).
  const srcCap = src.capacity || CAPACITY;
  const tiltDeg = Math.min(75, getPourTiltDeg(src.fillLevel, srcCap));
  const tiltAngle = sign * tiltDeg * Math.PI / 180;
  const cosA = Math.cos(tiltAngle);
  const sinA = Math.sin(tiltAngle);

  // Lip outer x — for potion-style bottles the lip is narrow
  // (±w*POTION_LIP_X_FRAC, not ±w/2 like a wide juice cup). Defined early
  // because the spout target Y offset below depends on it.
  const lipX = src.isObjective ? src.w / 2 : src.w * POTION_LIP_X_FRAC;

  // For tall targets (objective), pour at the CURRENT FILL SURFACE + small gap
  // rather than at the rim. Keeps source onscreen and feels physically right.
  const dstRimY = dst.baseY - dst.h;
  // Body shoulder vs lip vertical gap after rotation — for potion bottles
  // the rotated body shoulder corner sits BELOW the lip in world y because
  // the body is wider than the lip. Without raising the spout target Y by
  // this amount, the source's body shoulder OVERLAPS the destination's rim
  // during pour. The reference avoids this by pivoting at the lip
  // (LEFT_ROTATION_POINT_X = 0.25 in magic_sort_game_beauty.js); we pivot
  // at the base, so we compensate via the offset. Computed at the STARTING
  // tilt (worst case — the gap shrinks as the bottle empties and tilts
  // further). Only applies to non-objective sources.
  const interiorBoundsForOffset = getInteriorBounds(src);
  const lipShoulderOffset = src.isObjective
    ? 0
    : (interiorBoundsForOffset.r - lipX) * Math.abs(sinA)
      + (src.h - Math.abs(interiorBoundsForOffset.t)) * cosA;
  let spoutTargetY;
  if (dst.h > src.h * 1.4) {
    const avgFill = dst.fillLevel + transfer / 2;
    const surfaceY = getLayerTopY(dst, avgFill);
    spoutTargetY = surfaceY - Math.max(30, dst.w * 0.45);
    // Keep at least a minimum gap to rim
    spoutTargetY = Math.min(spoutTargetY, dstRimY - Math.max(12, lipShoulderOffset + 4));
  } else {
    spoutTargetY = dstRimY - Math.max(14, lipShoulderOffset + 4);
  }
  const spoutTargetX = dst.baseX;

  // Solve src position so its LIP CORNER after rotation lands at spout target.
  // (lipX declared above where the spout target Y offset uses it.)
  const tgtX = spoutTargetX - sign * lipX * cosA - src.h * sinA;
  const tgtY = spoutTargetY - sign * lipX * sinA + src.h * cosA;

  killTweensOf(src, ['lift','glow','x','y','angle']);
  // Smoothly retract the lift and glow during the first ~0.18s of the
  // approach to the destination — instead of snapping them to 0 (which
  // produced a visible "flick" of the yellow selection halo disappearing
  // the instant the pour started). Lift and glow run as a fast parallel
  // tween while the slower x/y/angle tween moves the bottle into pour
  // position over 0.55s.
  tween(src, { lift: 0, glow: 0 }, 0.18, { ease: 'outQuad' });

  tween(src, { x: tgtX, y: tgtY, angle: tiltAngle }, 0.55, {
    ease: 'inOutCubic',
    onComplete: () => startPourSequence()
  });

  function startPourSequence() {
    flowLine = { color, src, dst, sign, alpha: 0, active: true };
    tween(flowLine, { alpha: 1 }, 0.12);
    sfxPour();

    let done = 0;
    function pourOne() {
      if (!flowLine || done >= transfer) { endPour(); return; }
      done++;

      spawnSplash(dst, color);
      sfxSplash();
      // Bonus sparkle when pink lands in the goal tube
      if (dst.isObjective && color === GOAL_COLOR) sfxGoalProgress();
      // Strong impact slosh, but settle to a sustained wobble (0.22) so the
      // destination keeps visibly sloshing between pour-unit impacts.
      triggerSlosh(dst, 1.0, 0.9, 0.22);

      dst.layers.push(color);
      tween(dst, { fillLevel: dst.fillLevel + 1 }, 0.42, { ease: 'outQuad' });

      // DYNAMIC TILT — re-aim the source per pour-unit so the bottle
      // progressively tips more as it empties. Spout target X/Y are fixed
      // (same destination opening), but tgtX/tgtY recompute from the new
      // cosA/sinA so the source's lip corner keeps landing at the same
      // spout point even as the body shifts to accommodate the steeper
      // tilt.
      const newFill = src.fillLevel - 1;
      const newTiltDeg = Math.min(75, getPourTiltDeg(newFill, srcCap));
      const newTiltAngle = sign * newTiltDeg * Math.PI / 180;
      const newCos = Math.cos(newTiltAngle);
      const newSin = Math.sin(newTiltAngle);
      const newTgtX = spoutTargetX - sign * lipX * newCos - src.h * newSin;
      const newTgtY = spoutTargetY - sign * lipX * newSin + src.h * newCos;

      // Tween fillLevel + position + angle in a SINGLE tween so they
      // stay in lock-step.
      tween(src, {
        fillLevel: newFill,
        x: newTgtX,
        y: newTgtY,
        angle: newTiltAngle
      }, 0.42, {
        ease: 'outQuad',
        onComplete: () => {
          src.layers.pop();
          pourOne();
        }
      });
    }
    pourOne();
  }

  function endPour() {
    if (flowLine) {
      flowLine.active = false;
      tween(flowLine, { alpha: 0 }, 0.2, { onComplete: () => { flowLine = null; } });
    }
    // Sustained slosh on destination was held at 0.22 during pour; now let
    // it naturally decay back to 0 over ~1s for a nice settling effect.
    triggerSlosh(dst, dst.slosh || 0.22, 1.1, 0);
    tween(src, { x: src.baseX, y: src.baseY, angle: 0 }, 0.55, {
      ease: 'inOutCubic',
      onComplete: () => {
        triggerSlosh(src, 0.5, 0.6, 0);
        sfxBottleDown();
        isAnimating = false;
        checkWin();
      }
    });
  }
}

function checkWin() {
  // Win when objective has at least GOAL_UNITS of the goal color at the bottom
  let goalHits = 0;
  for (const c of objective.layers) {
    if (c === GOAL_COLOR) goalHits++;
  }
  if (goalHits >= GOAL_UNITS) {
    won = true;
    sfxWin();
    stopAmbient();
    celebrate();
  }
}

function celebrate() {
  for (const b of bottles) {
    if (!b.layers.length) continue;
    tween(b, { lift: -b.h * 0.05 }, 0.35, { ease: 'outBack', delay: Math.random() * 0.3 });
    tween(b, { glow: 0.6 }, 0.5);
    triggerSlosh(b, 0.8, 1.0);
  }
  setTimeout(() => {
    for (const b of bottles) if (b.layers.length) burstCelebrate(b);
  }, 250);
}

function burstCelebrate(b) {
  const topY = getLayerTopY(b, b.layers.length);
  const color = b.layers[b.layers.length - 1];
  for (let i = 0; i < 10; i++) {
    const a = (i / 10) * Math.PI * 2 + Math.random() * 0.3;
    const s = 90 + Math.random() * 80;
    particles.push({
      x: b.x, y: topY,
      vx: Math.cos(a) * s, vy: Math.sin(a) * s - 90,
      life: 0, maxLife: 0.9,
      color: JUICE[color].mid, edge: JUICE[color].bot,
      size: 2.5 + Math.random() * 2.5,
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: 0.15
    });
  }
}

// ============================================================
// PARTICLES
// ============================================================
// Sand splash on impact — MORE particles, SMALLER each (grains scatter
// more readily than viscous liquid). Increased count + reduced size
// gives a "fan of sand grains" look instead of round liquid droplets.
function spawnSplash(bottle, color) {
  const topY = getLayerTopY(bottle, bottle.fillLevel);
  const count = 16;                       // was 9
  const j = JUICE[color];
  for (let i = 0; i < count; i++) {
    const spread = (i / (count - 1) - 0.5) * 2;
    const vx = spread * (24 + Math.random() * 28);   // wider lateral kick
    const vy = -85 - Math.random() * 45;
    particles.push({
      parent: bottle,
      x: bottle.x + spread * bottle.w * 0.16,
      y: topY,
      vx, vy,
      life: 0, maxLife: 0.5 + Math.random() * 0.2,
      color: j.mid, edge: j.bot,
      size: 1.2 + Math.random() * 1.4,                // smaller (was 2.3 + 1.9)
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: 0.06                                // less wobble — grains tumble less than blobs
    });
  }
}

// Continuous "reaction" sand grains that spawn at the destination's
// surface WHILE the pour stream is flowing. Small, short-lived, and
// clipped to the bottle so they never escape the glass. More frequent
// + smaller than the witch-potion droplets (more grain-like).
function emitFlowDroplets(dt) {
  if (!flowLine || !flowLine.active) return;
  flowEmitAccum += dt;
  const interval = 0.035;                              // was 0.05 — more frequent grains
  while (flowEmitAccum > interval) {
    flowEmitAccum -= interval;
    const dst = flowLine.dst;
    const color = flowLine.color;
    const j = JUICE[color];
    const topY = getLayerTopY(dst, Math.min(dst.capacity || CAPACITY, dst.fillLevel + 0.15));
    const count = 2 + (Math.random() < 0.5 ? 1 : 0);   // 2-3 grains per tick
    for (let i = 0; i < count; i++) {
      const spread = (Math.random() - 0.5) * 1.4;
      const vx = spread * (16 + Math.random() * 18);
      const vy = -55 - Math.random() * 30;
      particles.push({
        parent: dst,
        x: dst.x + (Math.random() - 0.5) * dst.w * 0.22,
        y: topY,
        vx, vy,
        life: 0, maxLife: 0.35 + Math.random() * 0.12,
        color: j.mid, edge: j.bot,
        size: 0.9 + Math.random() * 0.9,               // smaller (was 1.4 + 1.2)
        wobble: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.06
      });
    }
  }
}

function updateParticles(dt) {
  // Gravity lowered from 520 → 380 so particles actually arc noticeably
  // (shoot up, pause at apex, fall) instead of snapping straight down.
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life += dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 380 * dt;
    p.wobble += p.wobbleSpeed;
    if (p.life >= p.maxLife) particles.splice(i, 1);
  }
}

function drawParticleAt(p) {
  const k = p.life / p.maxLife;
  const a = Math.min(1, 1 - k * k);
  const wx = p.x + (p.wobbleSpeed ? Math.cos(p.wobble) * 2.2 : 0);
  const wy = p.y + (p.wobbleSpeed ? Math.sin(p.wobble) * 1.4 : 0);
  ctx.globalAlpha = a;
  ctx.fillStyle = p.color;
  ctx.beginPath();
  ctx.arc(wx, wy, p.size, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = p.edge;
  ctx.beginPath();
  ctx.arc(wx - 0.4, wy + 0.5, p.size * 0.45, 0, Math.PI*2);
  ctx.fill();
}

function drawParticles() {
  // Split by parent bottle. Parented particles get clipped to that bottle's
  // interior so splashes never escape the glass walls.
  const parented = new Map();
  const loose = [];
  for (const p of particles) {
    if (p.parent) {
      if (!parented.has(p.parent)) parented.set(p.parent, []);
      parented.get(p.parent).push(p);
    } else {
      loose.push(p);
    }
  }
  for (const p of loose) drawParticleAt(p);
  for (const [parent, ps] of parented) {
    // Simple bounding-rect clip in world space — keeps splash particles
    // from escaping the glass without getting tripped up by the rotated
    // interior-path clip across transform resets.
    ctx.save();
    ctx.beginPath();
    const padX = 4;
    const padY = 10;
    ctx.rect(
      parent.x - parent.w / 2 - padX,
      parent.y + parent.lift - parent.h - padY,
      parent.w + 2 * padX,
      parent.h + 2 * padY
    );
    ctx.clip();
    for (const p of ps) drawParticleAt(p);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// GEOMETRY HELPERS
// ============================================================
function roundRectPath(l, t, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(l + r, t);
  ctx.lineTo(l + w - r, t);
  ctx.quadraticCurveTo(l + w, t, l + w, t + r);
  ctx.lineTo(l + w, t + h - r);
  ctx.quadraticCurveTo(l + w, t + h, l + w - r, t + h);
  ctx.lineTo(l + r, t + h);
  ctx.quadraticCurveTo(l, t + h, l, t + h - r);
  ctx.lineTo(l, t + r);
  ctx.quadraticCurveTo(l, t, l + r, t);
  ctx.closePath();
}

// Bottle outline. Two shapes:
//   - Potion bottle  (default): bulbous body + S-curved shoulder + narrow
//                                straight neck + small lip flare. Liquid
//                                lives ONLY in the body.
//   - Tall flask     (objective): straight cylindrical lab tube — same
//                                  shape as the original juice glass,
//                                  works as a measuring flask in the
//                                  witch's lab (the goal "fills" it).
function glassBodyPath(w, h, isObjective) {
  if (isObjective) { tallFlaskBodyPath(w, h); return; }
  potionBottleBodyPath(w, h);
}

function glassInteriorPath(w, h, isObjective) {
  if (isObjective) { tallFlaskInteriorPath(w, h); return; }
  potionBottleInteriorPath(w, h);
}

// ---------- POTION BOTTLE OUTLINE ----------
// Anatomy (y in -h units; clockwise from top-left of lip):
//   yLipTop    = -1.00   (the very rim — narrow)
//   yLipBot    = -0.96   (lip flare ends, neck begins)
//   yNeckBot   = -0.77   (neck ends, shoulder begins)
//   yShoulderBot = -0.66 (shoulder ends, body begins)
//   yBodyBot   =  0.00   (body floor)
// Shoulder is a smooth S-curve via bezier with control points that keep
// the neck wall vertical at the top of the shoulder and the body wall
// vertical at the bottom — gives a graceful "real glass" transition.
function potionBottleBodyPath(w, h) {
  const yLipTop      = -h;
  const yLipBot      = h * POTION_LIP_BOT_Y;
  const yNeckBot     = h * POTION_NECK_BOT_Y;
  const yShoulderBot = h * POTION_SHOULDER_BOT_Y;
  const yBodyBot     = 0;

  const xBodyR = w / 2;
  const xBodyL = -w / 2;
  const xNeckR = w * POTION_NECK_W_FRAC * 0.5;
  const xNeckL = -xNeckR;
  const xLipR  = w * POTION_LIP_X_FRAC;
  const xLipL  = -xLipR;
  const taperBottom = w * 0.04;
  const xBotR = xBodyR - taperBottom;
  const xBotL = xBodyL + taperBottom;
  const botCornerR = w * 0.18;
  const lipCornerR = w * POTION_LIP_FLARE * 0.4;
  const shoulderSpan = yShoulderBot - yNeckBot;        // positive (y is more positive at bottom)
  const sCurveBias = 0.35;                             // how far the bezier ctl-pts pull along the curve

  ctx.beginPath();
  // Lip top (left → right) with tiny rounded corners
  ctx.moveTo(xLipL + lipCornerR, yLipTop);
  ctx.lineTo(xLipR - lipCornerR, yLipTop);
  ctx.quadraticCurveTo(xLipR, yLipTop, xLipR, yLipTop + lipCornerR);
  // Right side of lip down to neck (tiny chamfer)
  ctx.lineTo(xLipR, yLipBot - 1);
  ctx.lineTo(xNeckR, yLipBot + 0.5);
  // Right neck wall
  ctx.lineTo(xNeckR, yNeckBot);
  // Right shoulder S-curve out to body
  ctx.bezierCurveTo(
    xNeckR, yNeckBot + shoulderSpan * sCurveBias,
    xBodyR, yShoulderBot - shoulderSpan * sCurveBias,
    xBodyR, yShoulderBot
  );
  // Right body wall
  ctx.lineTo(xBodyR, yBodyBot - botCornerR);
  // Bottom-right corner
  ctx.quadraticCurveTo(xBodyR, yBodyBot, xBotR, yBodyBot);
  // Floor (right → left)
  ctx.lineTo(xBotL, yBodyBot);
  // Bottom-left corner
  ctx.quadraticCurveTo(xBodyL, yBodyBot, xBodyL, yBodyBot - botCornerR);
  // Left body wall up to shoulder
  ctx.lineTo(xBodyL, yShoulderBot);
  // Left shoulder S-curve back to neck (mirror of right)
  ctx.bezierCurveTo(
    xBodyL, yShoulderBot - shoulderSpan * sCurveBias,
    xNeckL, yNeckBot + shoulderSpan * sCurveBias,
    xNeckL, yNeckBot
  );
  // Left neck wall
  ctx.lineTo(xNeckL, yLipBot + 0.5);
  // Inward chamfer to lip
  ctx.lineTo(xLipL, yLipBot - 1);
  // Up left side of lip
  ctx.lineTo(xLipL, yLipTop + lipCornerR);
  ctx.quadraticCurveTo(xLipL, yLipTop, xLipL + lipCornerR, yLipTop);
  ctx.closePath();
}

// Potion interior: same outline as the EXTERIOR (body + shoulder + neck +
// lip), inset by the wall thickness. Why include neck/lip even though the
// liquid level (controlled by getInteriorBounds) only reaches the body
// when upright? Because when the bottle is TILTED to pour, the liquid
// surface is horizontal in WORLD space — on the lower side, the liquid
// rises up into the shoulder and neck. If the clip stopped at the body,
// the lower-side liquid would visibly disappear inside the bottle while
// the spout was still pouring. Including the full outline lets the
// liquid clip correctly all the way to the lip.
function potionBottleInteriorPath(w, h) {
  const wallX = w * 0.05;
  const yLipTop      = -h + h * 0.005;                          // tiny top inset
  const yLipBot      = h * POTION_LIP_BOT_Y;
  const yNeckBot     = h * POTION_NECK_BOT_Y;
  const yShoulderBot = h * POTION_SHOULDER_BOT_Y;
  const yBodyBot     = -h * WALL_BOT_RATIO;

  const xBodyR = w / 2 - wallX;
  const xBodyL = -xBodyR;
  // Neck/lip use a smaller absolute inset so the narrow tube isn't
  // shrunk away — we keep the visual proportions of the exterior.
  const neckInset = wallX * 0.45;
  const xNeckR = w * POTION_NECK_W_FRAC * 0.5 - neckInset;
  const xNeckL = -xNeckR;
  const xLipR  = w * POTION_LIP_X_FRAC - neckInset;
  const xLipL  = -xLipR;

  const taperBottom = (w - wallX*2) * 0.04;
  const xBotR = xBodyR - taperBottom;
  const xBotL = xBodyL + taperBottom;
  const botCornerR = (w - wallX*2) * 0.18;
  const lipCornerR = (w * POTION_LIP_FLARE) * 0.4 * 0.9;

  const shoulderSpan = yShoulderBot - yNeckBot;
  const sCurveBias = 0.35;

  ctx.beginPath();
  ctx.moveTo(xLipL + lipCornerR, yLipTop);
  ctx.lineTo(xLipR - lipCornerR, yLipTop);
  ctx.quadraticCurveTo(xLipR, yLipTop, xLipR, yLipTop + lipCornerR);
  ctx.lineTo(xLipR, yLipBot - 1);
  ctx.lineTo(xNeckR, yLipBot + 0.5);
  ctx.lineTo(xNeckR, yNeckBot);
  ctx.bezierCurveTo(
    xNeckR, yNeckBot + shoulderSpan * sCurveBias,
    xBodyR, yShoulderBot - shoulderSpan * sCurveBias,
    xBodyR, yShoulderBot
  );
  ctx.lineTo(xBodyR, yBodyBot - botCornerR);
  ctx.quadraticCurveTo(xBodyR, yBodyBot, xBotR, yBodyBot);
  ctx.lineTo(xBotL, yBodyBot);
  ctx.quadraticCurveTo(xBodyL, yBodyBot, xBodyL, yBodyBot - botCornerR);
  ctx.lineTo(xBodyL, yShoulderBot);
  ctx.bezierCurveTo(
    xBodyL, yShoulderBot - shoulderSpan * sCurveBias,
    xNeckL, yNeckBot + shoulderSpan * sCurveBias,
    xNeckL, yNeckBot
  );
  ctx.lineTo(xNeckL, yLipBot + 0.5);
  ctx.lineTo(xLipL, yLipBot - 1);
  ctx.lineTo(xLipL, yLipTop + lipCornerR);
  ctx.quadraticCurveTo(xLipL, yLipTop, xLipL + lipCornerR, yLipTop);
  ctx.closePath();
}

// ---------- TALL FLASK OUTLINE (objective tube) ----------
// Same shape as the juice-glass tumbler from the parent file — works as a
// witch's lab measuring flask: slight outward taper, asymmetric corner
// radii (CLAUDE.md note: keep this asymmetry — beaker look without it).
function tallFlaskBodyPath(w, h) {
  const taperBottom = w * 0.065;
  const topCornerR = w * 0.14;
  const botCornerR = w * 0.22;
  const l = -w/2, r = w/2, t = -h, bot = 0;
  const bl = l + taperBottom, br = r - taperBottom;

  ctx.beginPath();
  ctx.moveTo(l + topCornerR, t);
  ctx.lineTo(r - topCornerR, t);
  ctx.quadraticCurveTo(r, t, r, t + topCornerR);
  ctx.lineTo(br + botCornerR * 0.1, bot - botCornerR);
  ctx.quadraticCurveTo(br, bot, br - botCornerR * 0.5, bot);
  ctx.lineTo(bl + botCornerR * 0.5, bot);
  ctx.quadraticCurveTo(bl, bot, bl - botCornerR * 0.1, bot - botCornerR);
  ctx.lineTo(l, t + topCornerR);
  ctx.quadraticCurveTo(l, t, l + topCornerR, t);
  ctx.closePath();
}

function tallFlaskInteriorPath(w, h) {
  const wallX = w * 0.05;
  const iw = w - wallX * 2;
  const taperBottom = iw * 0.05;
  const topCornerR = iw * 0.12;
  const botCornerR = iw * 0.2;
  const il = -iw/2, ir = iw/2;
  const it = -h + h * WALL_TOP_RATIO;
  const ibot = -h * WALL_BOT_RATIO;
  const bl = il + taperBottom, br = ir - taperBottom;

  ctx.beginPath();
  ctx.moveTo(il + topCornerR, it);
  ctx.lineTo(ir - topCornerR, it);
  ctx.quadraticCurveTo(ir, it, ir, it + topCornerR);
  ctx.lineTo(br + botCornerR * 0.1, ibot - botCornerR);
  ctx.quadraticCurveTo(br, ibot, br - botCornerR * 0.5, ibot);
  ctx.lineTo(bl + botCornerR * 0.5, ibot);
  ctx.quadraticCurveTo(bl, ibot, bl - botCornerR * 0.1, ibot - botCornerR);
  ctx.lineTo(il, it + topCornerR);
  ctx.quadraticCurveTo(il, it, il + topCornerR, it);
  ctx.closePath();
}

function getInteriorBounds(b) {
  const wallX = b.w * 0.05;
  const iw = b.w - wallX * 2;
  let top, bot;
  if (b.isObjective) {
    top = -b.h + b.h * WALL_TOP_RATIO;
    bot = -b.h * WALL_BOT_RATIO;
  } else {
    // Body region only (above this is shoulder + neck + lip — empty glass)
    top = b.h * POTION_SHOULDER_BOT_Y + b.h * WALL_TOP_RATIO * 0.5;
    bot = -b.h * WALL_BOT_RATIO;
  }
  return { l: -iw/2, r: iw/2, w: iw, t: top, b: bot, h: bot - top };
}

function getLayerTopY(b, fillUnits) {
  const i = getInteriorBounds(b);
  return b.y + b.lift + (i.b - fillUnits * LAYER_PX);
}

// ============================================================
// RENDER: BACKGROUND — magic sand: deep purple void w/ drifting golden
// stardust and soft cloud volumes at the edges. No moon, no bats, no
// stone wall — the playfield reads as a "magic chamber in the night sky".
// ============================================================
function drawBackground() {
  // Vertical gradient: dark indigo top → richer mid-purple → slightly
  // warmer purple at the bottom. Matches the hero art style.
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0,    '#150a28');
  bg.addColorStop(0.45, '#321653');
  bg.addColorStop(0.85, '#3a1855');
  bg.addColorStop(1,    '#1a0e30');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Soft cloud/fog volumes at the corners — large radial gradients in a
  // muted plum colour. Slight drift so the scene isn't static.
  const drift = (totalTime * 8) % W;
  drawCloudVolume(W * 0.12 + Math.sin(totalTime * 0.3) * 14, H * 0.20, Math.min(W, H) * 0.32, '#5a2d80', 0.28);
  drawCloudVolume(W * 0.88 - Math.sin(totalTime * 0.25) * 12, H * 0.18, Math.min(W, H) * 0.28, '#5a2d80', 0.24);
  drawCloudVolume(W * 0.95, H * 0.78, Math.min(W, H) * 0.34, '#3a1450', 0.30);
  drawCloudVolume(W * 0.05, H * 0.82, Math.min(W, H) * 0.30, '#3a1450', 0.30);

  // Drifting stardust: small golden specks that twinkle and slowly move.
  // 80 specks scattered across the upper 70% of the canvas.
  for (let i = 0; i < 80; i++) {
    const baseX = ((i * 9301 + 49297) % 233280) / 233280 * W;
    const baseY = ((i * 4357 + 12345) % 233280) / 233280 * (H * 0.7);
    // Slow horizontal drift, wrapped
    const dx = (baseX + totalTime * (4 + (i % 5))) % W;
    const tw = 0.35 + 0.65 * (0.5 + 0.5 * Math.sin(totalTime * 1.6 + i * 1.7));
    const r  = 0.6 + (i % 3) * 0.5;
    ctx.globalAlpha = 0.55 * tw;
    ctx.fillStyle = (i % 7 === 0) ? '#ffe48a' : '#ffd97a';
    ctx.beginPath();
    ctx.arc(dx, baseY, r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Top vignette: pulls the eye toward the bottles.
  const vg = ctx.createLinearGradient(0, 0, 0, H * 0.22);
  vg.addColorStop(0, 'rgba(0,0,0,0.45)');
  vg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H * 0.22);

  // Bottom vignette: under the CTA.
  const vg2 = ctx.createLinearGradient(0, H * 0.84, 0, H);
  vg2.addColorStop(0, 'rgba(0,0,0,0)');
  vg2.addColorStop(1, 'rgba(0,0,0,0.45)');
  ctx.fillStyle = vg2;
  ctx.fillRect(0, H * 0.84, W, H * 0.16);
}

// Soft cloud/fog volume — a single radial gradient that fades to
// transparent. Used at the corners as atmospheric mass.
function drawCloudVolume(cx, cy, r, color, alpha) {
  const g = ctx.createRadialGradient(cx, cy, r * 0.08, cx, cy, r);
  // Convert hex to rgba via a small parse (avoids string concat noise)
  const m = color.match(/^#(..)(..)(..)$/);
  const rgb = m ? `${parseInt(m[1],16)},${parseInt(m[2],16)},${parseInt(m[3],16)}` : '90,45,128';
  g.addColorStop(0,    `rgba(${rgb},${alpha})`);
  g.addColorStop(0.55, `rgba(${rgb},${alpha * 0.5})`);
  g.addColorStop(1,    `rgba(${rgb},0)`);
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();
}

// ============================================================
// RENDER: GLASS (unified for small cups and objective)
// ============================================================
function drawGlass(b) {
  ctx.save();
  ctx.translate(b.x, b.y + b.lift);
  ctx.rotate(b.angle);

  const w = b.w, h = b.h;

  // Brass/copper ring under each upright bottle — matches the goal-tube
  // base in the hero art. Warm wooden gradient + a small inner highlight.
  if (Math.abs(b.angle) < 0.1) {
    // Soft drop shadow
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.beginPath();
    ctx.ellipse(0, 4, w*0.55, w*0.12, 0, 0, Math.PI*2);
    ctx.fill();
    // Outer ring (darker bronze)
    ctx.fillStyle = '#5a3a1c';
    ctx.beginPath();
    ctx.ellipse(0, 0, w*0.58, w*0.13, 0, 0, Math.PI*2);
    ctx.fill();
    // Inner disc (warm copper)
    const cg = ctx.createRadialGradient(0, -3, w*0.05, 0, 0, w*0.5);
    cg.addColorStop(0, '#c08a4a');
    cg.addColorStop(1, '#7a4a20');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.ellipse(0, -2, w*0.5, w*0.1, 0, 0, Math.PI*2);
    ctx.fill();
    // Subtle gold sheen on top
    ctx.fillStyle = 'rgba(255,220,140,0.28)';
    ctx.beginPath();
    ctx.ellipse(0, -3, w*0.42, w*0.06, 0, 0, Math.PI*2);
    ctx.fill();
  }

  // Back glass (subtle tint)
  glassBodyPath(w, h, b.isObjective);
  const backTint = ctx.createLinearGradient(-w/2, 0, w/2, 0);
  backTint.addColorStop(0, 'rgba(200,230,255,0.22)');
  backTint.addColorStop(0.5, 'rgba(255,255,255,0.05)');
  backTint.addColorStop(1, 'rgba(60,90,130,0.2)');
  ctx.fillStyle = backTint;
  ctx.fill();

  // ==== LIQUID: counter-rotated so layers stay WORLD-HORIZONTAL ====
  ctx.save();
  glassInteriorPath(w, h, b.isObjective);
  ctx.clip();
  ctx.rotate(-b.angle);
  drawJuiceLayersWorld(b);
  ctx.restore();

  // Front overlay (shine + rim)
  drawGlassOverlay(w, h, b.isObjective);

  // Potion "sealing" decoration on completed bottles (same color fully
  // stacked, non-pink-slot). Cork stopper drops onto the rim, then magic
  // smoke wisps puff up out of the cork — see drawSealed.
  if (isBottleCompleted(b)) drawSealed(w, h, b);

  // Selected glow — yellow halo around the bottle. The 14-px shadow blur
  // bleeds INWARD by ~12 px from the stroke (which sits just outside the
  // bottle outline). Without clipping, that inward yellow shadow tints the
  // liquid noticeably (the source liquid looks "lighter / different
  // colour" the whole time the bottle is selected, and snaps back to its
  // natural colour when glow drops). Clipping to the OUTSIDE of the
  // bottle outline (via even-odd fill rule against a huge rect) means
  // the shadow can only render in the area surrounding the bottle, so
  // the liquid keeps its true colour while the halo is visible.
  if (b.glow > 0) {
    ctx.save();
    ctx.globalAlpha = b.glow;
    ctx.beginPath();
    ctx.rect(-w * 5, -h * 1.6, w * 10, h * 2.6);   // large enclosing rect
    glassBodyPath(w, h, b.isObjective);            // bottle outline (inner cutout)
    ctx.clip('evenodd');                           // keep only the OUTSIDE region

    glassBodyPath(w + 6, h + 6, b.isObjective);
    ctx.strokeStyle = '#fff4c2';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#ffd24d';
    ctx.shadowBlur = 14;
    ctx.stroke();
    ctx.restore();
  }

  ctx.restore();

  // Label/tag (outside rotated frame so it stays upright)
  if (b.isObjective) drawObjectiveLabel(b);
}

function drawGlassOverlay(w, h, isObjective) {
  const l = -w/2, r = w/2, t = -h, bot = 0;

  // Highlight rect Y-range:
  //   - Tall flask: full glass height (matches the original juice glass)
  //   - Potion bottle: BODY region only (above is shoulder + neck + lip,
  //     where vertical highlight strips would extend outside the glass
  //     outline since the body is wider than the neck — would look wrong)
  const hiTop = isObjective ? t + h * 0.10 : h * POTION_SHOULDER_BOT_Y + h * 0.04;
  const hiH   = isObjective ? h * 0.75      : h * (Math.abs(POTION_SHOULDER_BOT_Y) - 0.08);

  // Left vertical highlight strip (sells the cylindrical body)
  ctx.save();
  ctx.globalAlpha = 0.55;
  const hi = ctx.createLinearGradient(l, 0, l + w * 0.4, 0);
  hi.addColorStop(0, 'rgba(255,255,255,0)');
  hi.addColorStop(0.5, 'rgba(255,255,255,0.9)');
  hi.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hi;
  ctx.fillRect(l + w * 0.08, hiTop, w * 0.1, hiH);
  ctx.restore();

  // Right rim darkening (sells the rounded right side of the body)
  const rim = ctx.createLinearGradient(r - w * 0.22, 0, r, 0);
  rim.addColorStop(0, 'rgba(40,30,60,0)');
  rim.addColorStop(1, 'rgba(40,30,60,0.32)');
  ctx.fillStyle = rim;
  ctx.fillRect(r - w * 0.22, hiTop, w * 0.22, hiH);

  // Top rim ellipse (opening) — defines the reference perspective angle.
  // Tall flask: wide rim. Potion bottle: narrow rim matching the lip flare
  // (rx = lip outer edge, ry = rx*0.32 — same perspective as everywhere).
  const rimRx = isObjective ? w * 0.44 : w * POTION_LIP_X_FRAC;
  const rimRy = rimRx * 0.32;
  ctx.beginPath();
  ctx.ellipse(0, t, rimRx, rimRy, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(210,235,255,0.35)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.9)';
  ctx.lineWidth = 2;
  ctx.stroke();
  // Inner ring (shows the "depth" of the rim)
  ctx.beginPath();
  ctx.ellipse(0, t + Math.max(2, rimRy * 0.4), rimRx * 0.78, rimRy * 0.65, 0, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(60,40,90,0.45)';
  ctx.lineWidth = 1.2;
  ctx.stroke();

  // Bottom interior ellipse — at the body floor (same perspective as the
  // top rim, ry = rx*0.32). For potion bottles this draws across the FULL
  // body width so the floor reads as a curved disc, not a flat line.
  const baseRx = w * 0.36;
  const baseRy = baseRx * 0.32;
  ctx.beginPath();
  ctx.ellipse(0, bot - w * 0.04, baseRx, baseRy, 0, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(40,40,80,0.45)';
  ctx.lineWidth = 1.4;
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fill();

  // Subtle glass outline (the actual bottle silhouette)
  glassBodyPath(w, h, isObjective);
  ctx.strokeStyle = 'rgba(255,255,255,0.32)';
  ctx.lineWidth = 1.3;
  ctx.stroke();
}

// ============================================================
// RENDER: LIQUID LAYERS (merge runs, wavy top, meniscus)
// ============================================================
function drawJuiceLayersWorld(b) {
  if (b.layers.length === 0) return;
  const interior = getInteriorBounds(b);
  // `wide` must cover the tilted bottle's full extent in world space —
  // the rotated lip can sit ~h*sin(maxTilt) away from the pivot horizontally,
  // and the rotated floor corner can sit ~w*sin(maxTilt)/2 below it
  // vertically. Using FULL bottle dimensions (b.w, b.h) ensures the rect
  // covers the lip + floor regions even at the steepest pour tilt.
  const wide = Math.max(b.w, b.h) * 1.5;
  const rx = interior.w / 2;
  // Angulation matches the glass top rim (ry/rx ≈ 0.32) for consistent perspective
  const ry = rx * 0.32;

  // Group consecutive same-color units into RUNS so adjacent same-color
  // layers render as a single block with NO internal seam.
  const runs = [];
  let runColor = b.layers[0];
  let runStart = 0;
  for (let i = 1; i <= b.layers.length; i++) {
    if (i === b.layers.length || b.layers[i] !== runColor) {
      runs.push({ color: runColor, fromIdx: runStart, toIdx: i });
      if (i < b.layers.length) { runColor = b.layers[i]; runStart = i; }
    }
  }

  // TILT Y-COMPRESSION — surface threshold = LIP outer corner so liquid
  // physically rises through the neck and reaches the spill point. Compress
  // per-unit layer height by tiltScale so the whole stack settles between
  // interior.b (floor) and lowerRimY (lip). Min clamp at 0.3 keeps edge-case
  // tilts from collapsing layers to nothing. For tall-flask objective, lip
  // == body rim. See witch_potion_sort.html for the full rationale.
  let tiltScale = 1;
  if (Math.abs(b.angle) > 0.005 && b.fillLevel > 0) {
    const cosA = Math.cos(b.angle), sinA = Math.sin(b.angle);
    const lipX = b.isObjective ? interior.r : b.w * POTION_LIP_X_FRAC;
    const lipYTop = b.isObjective ? interior.t : -b.h;
    const lowerRimY = lipYTop * cosA + lipX * Math.abs(sinA);
    const naturalTop = interior.b - b.fillLevel * LAYER_PX;
    if (naturalTop < lowerRimY) {
      const stackPx = interior.b - lowerRimY;
      const naturalStackPx = interior.b - naturalTop;
      tiltScale = Math.max(0.3, stackPx / naturalStackPx);
    }
  }
  const effLayerPx = LAYER_PX * tiltScale;
  const useLayerYs = (tiltScale === 1) && b.layerYs;
  const yAt = (idx) => useLayerYs ? b.layerYs[idx] : (interior.b - idx * effLayerPx);
  const yAtFill = (fill) => useLayerYs ? getLayerTopYLocal(b, fill) : (interior.b - fill * effLayerPx);

  // PASS 1: draw rectangular bodies (no hard seams — colors stack straight).
  // The BOTTOM-most run extends its rect downward by `wide` extra pixels —
  // this matters when the bottle is tilted to pour. The liquid rect is
  // world-horizontal (drawn after the counter-rotation), but the rotated
  // bottle interior extends BELOW the local floor in world Y on the
  // tilting side. Without the extra extension, the corner of the rotated
  // body that's lowest in world has no fill (the rect doesn't reach there
  // and the clip just shows empty glass). The gradient is unchanged
  // (ends at juice.mid by `pad` mode), so the extension reads as solid
  // juice.mid down to wherever the rotated body clip ends.
  for (let ri = 0; ri < runs.length; ri++) {
    const run = runs[ri];
    const juice = JUICE[run.color];
    const isTop = (ri === runs.length - 1);
    const isBottom = (ri === 0);

    const baseY = interior.b - run.fromIdx * effLayerPx;
    const topSolidY = interior.b - run.toIdx * effLayerPx;
    const topY = isTop ? (interior.b - b.fillLevel * effLayerPx) : topSolidY;
    const visH = baseY - topY;
    if (visH <= 0.5) continue;

    // Effective bottom for drawing (extended for the bottom-most run only —
    // upper runs would overlap into the run below them if extended).
    const drawBaseY = isBottom ? baseY + wide : baseY;
    const drawVisH = drawBaseY - topY;

    // Gradient ENDS at juice.mid (not bot) so the rect's bottom color is
    // identical to the interface ellipse drawn on top of it in pass 2.
    // The gradient uses the ORIGINAL baseY so its color profile doesn't
    // get squished by the extension.
    const g = ctx.createLinearGradient(0, topY, 0, baseY);
    g.addColorStop(0, juice.top);
    g.addColorStop(0.55, juice.mid);
    g.addColorStop(1, juice.mid);
    ctx.fillStyle = g;

    // Threshold lowered from 0.04 → 0.005 so the wavy→flat transition
    // happens when the wave amplitude is ~0.07px (visually flat) and the
    // strokes have faded to ~1.6% alpha — switching at that point is
    // imperceptible. Higher threshold was creating a small visible step.
    if (isTop && b.slosh > 0.005) {
      drawWavyLayer(topY, drawBaseY, wide, juice, b.slosh, b.sloshSeed);
    } else {
      ctx.fillRect(-wide, topY, wide * 2, drawVisH);
    }

    // Soft LEFT-side highlight only — the right-side darkening was adding a
    // subtle 8%-black band that showed up as a serrated line at the bottom
    // of each layer (where the interface ellipse meets the rect).
    const side = ctx.createLinearGradient(-rx, 0, rx, 0);
    side.addColorStop(0, 'rgba(255,255,255,0.16)');
    side.addColorStop(0.5, 'rgba(255,255,255,0)');
    side.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = side;
    ctx.fillRect(-wide, topY, wide * 2, drawVisH);

    // Themed ambient puffs (fire/leaf/ice/smoke/etc.) spawn at random
    // positions within the run's ORIGINAL bounds — extension is just for
    // tilt fill coverage and doesn't affect ambient particle placement.
    drawSandAmbientWorld(topY, baseY, interior.w, juice, run.fromIdx, totalTime);
  }

  // PASS 2: interface ellipses between different-colored runs.
  // The bottom half of an ellipse in the UPPER run's color is drawn onto
  // the lower rect — the upper layer "bowls down" into the lower. This
  // guarantees the upper layer always renders IN FRONT of the lower at
  // every boundary, instead of a lower dome poking up into the upper.
  for (let ri = 0; ri < runs.length - 1; ri++) {
    const thisRun = runs[ri];
    const nextRun = runs[ri + 1];
    const upperJuice = JUICE[nextRun.color];
    const interfaceY = interior.b - thisRun.toIdx * effLayerPx;

    // Skip the ellipse when the upper run is still practically empty
    // (very early in the pour tween) — avoids a flash of upper color
    // before the actual rect is visible.
    const isUpperTop = (ri + 1 === runs.length - 1);
    const upperHeight = isUpperTop
      ? (b.fillLevel - nextRun.fromIdx) * effLayerPx
      : (nextRun.toIdx - nextRun.fromIdx) * effLayerPx;
    if (upperHeight < 1) continue;

    drawInterfaceEllipse(interfaceY, rx, ry, upperJuice);
  }

  // PASS 3: topmost meniscus — ALWAYS visible at full opacity (no more
  // alpha fade that was creating a visible fade-in/out when pour animations
  // ended). The dome bobs vertically with slosh so the surface still feels
  // alive during motion, but it never fades away.
  const topRun = runs[runs.length - 1];
  const topJuice = JUICE[topRun.color];
  const topY = interior.b - b.fillLevel * effLayerPx;
  // No threshold — when slosh = 0, bob = 0 automatically (multiply by 0).
  // The previous `slosh > 0.01` cutoff was snapping the meniscus from its
  // last bob position straight to topY, contributing to the visible jump.
  const bob = Math.sin(totalTime * 7 + b.sloshSeed) * b.slosh * 1.8;
  drawLayerMeniscus(topY + bob, rx, ry, topJuice);

  // PASS 4: base ellipse — the bottom of the glass/liquid column seen
  // through the lowest juice layer. Top half of an ellipse in the darker
  // shade of that juice, positioned at interior.b so it protrudes UP into
  // the bottom rect area and gives the base a curved (not flat) appearance.
  // Faded out during tilt: when the bottle is rotated, this ellipse
  // (drawn in counter-rotated world-aligned coords at local y=interior.b)
  // no longer aligns with the actual visual bottom of the rotated body —
  // it'd float in the middle of the liquid wedge. Smooth fade between
  // 0.05 rad and 0.25 rad of tilt so the transition is invisible.
  const tiltFade = 1 - Math.min(1, Math.max(0, Math.abs(b.angle) - 0.05) / 0.20);
  if (tiltFade > 0.01) {
    const bottomRun = runs[0];
    const bottomJuice = JUICE[bottomRun.color];
    const baseG = ctx.createRadialGradient(0, interior.b - ry * 0.35, rx * 0.08, 0, interior.b, rx);
    baseG.addColorStop(0, bottomJuice.mid);
    baseG.addColorStop(0.7, bottomJuice.bot);
    baseG.addColorStop(1, bottomJuice.bot);
    ctx.save();
    ctx.globalAlpha = tiltFade;
    ctx.fillStyle = baseG;
    ctx.beginPath();
    ctx.ellipse(0, interior.b, rx, ry, 0, Math.PI, 2 * Math.PI);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // PASS 5: granular sand-grain overlay. A pre-built tileable noise
  // pattern (CanvasPattern, GPU-cached) is drawn ONCE per bottle as a
  // filled rect spanning from the surface down to the floor (extended
  // by `wide` to cover the rotated body's lowest world-Y point during
  // tilt, same as the bottom-run rect extension). Transparent gaps in
  // the pattern let each potion's colour show through, while the
  // dark/light dots add the characteristic sand grit. Cost is one
  // pattern fill per bottle — negligible.
  if (sandGrainPattern && b.fillLevel > 0.05) {
    const surfaceY = interior.b - b.fillLevel * LAYER_PX;
    const grainBotY = interior.b + wide;   // matches the bottom-run extension for tilt
    ctx.fillStyle = sandGrainPattern;
    ctx.fillRect(-wide, surfaceY, wide * 2, grainBotY - surfaceY);
  }
}

function drawLayerMeniscus(y, rx, ry, juice) {
  // Solid dome in juice.top — matches the rect's top color seamlessly at y.
  ctx.fillStyle = juice.top;
  ctx.beginPath();
  ctx.ellipse(0, y, rx, ry, 0, Math.PI, 2 * Math.PI);
  ctx.closePath();
  ctx.fill();

  // Subtle top-only highlight — NO darkening at the base anymore. The old
  // gradient had 10% black at y which was creating the dark serrated line
  // at the top of the liquid where the dome met the rect.
  const dg = ctx.createLinearGradient(0, y, 0, y - ry);
  dg.addColorStop(0, 'rgba(255,255,255,0)');
  dg.addColorStop(0.5, 'rgba(255,255,255,0)');
  dg.addColorStop(1, 'rgba(255,255,255,0.22)');
  ctx.fillStyle = dg;
  ctx.beginPath();
  ctx.ellipse(0, y, rx, ry, 0, Math.PI, 2 * Math.PI);
  ctx.closePath();
  ctx.fill();

  // Bright specular shine on upper-left of the dome
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.beginPath();
  ctx.ellipse(-rx * 0.28, y - ry * 0.55, rx * 0.38, ry * 0.42, 0, Math.PI, 2 * Math.PI);
  ctx.closePath();
  ctx.fill();
}

// Bottom half of an ellipse in the UPPER run's color, drawn at the interface
// between two different-colored runs. The upper color "bowls down" into the
// lower — upper layer always in front. Kept intentionally simple (no dark
// shading, no horizontal rim line) to avoid visible artifact lines between
// the layers.
function drawInterfaceEllipse(y, rx, ry, upperJuice) {
  // Solid opaque fill using juice.mid — IDENTICAL to the rect's bottom color
  // (pass 1 gradient now ends at juice.mid). This makes the transition from
  // rect to ellipse literally invisible — no dark line between layers.
  // No sheen/highlight, no gradient overlay — just a clean continuous fill.
  ctx.fillStyle = upperJuice.mid;
  ctx.beginPath();
  ctx.ellipse(0, y, rx, ry, 0, 0, Math.PI);
  ctx.closePath();
  ctx.fill();
}

// ============================================================
// CAPS & COMPLETION
// ============================================================
function isBottleCompleted(b) {
  if (!b || b.isObjective) return false;
  if (b.layers.length !== (b.capacity || CAPACITY)) return false;
  const first = b.layers[0];
  if (first === GOAL_COLOR) return false; // pink is destined for the objective
  for (let i = 1; i < b.layers.length; i++) if (b.layers[i] !== first) return false;
  return true;
}

// Bottle "sealing" decoration: a cork stopper drops straight DOWN onto the
// rim, then two magical smoke wisps puff up out of the cork and rise
// while fading. Replaces the umbrella + ice cubes — matches the witch's
