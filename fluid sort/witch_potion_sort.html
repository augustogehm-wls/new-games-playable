    // get squished by the extension.
    const g = ctx.createLinearGradient(0, topY, 0, baseY);
    g.addColorStop(0, juice.top);
    g.addColorStop(0.55, juice.mid);
    g.addColorStop(1, juice.mid);
    ctx.fillStyle = g;

    // Threshold lowered from 0.04 → 0.005 so the wavy→flat transition
    // happens when the wave amplitude is ~0.07px (visually flat) and the
    // strokes have faded to ~1.6% alpha — switching at that point is
    // imperceptible. Higher threshold was creating a small visible step.
    if (isTop && b.slosh > 0.005) {
      drawWavyLayer(topY, drawBaseY, wide, juice, b.slosh, b.sloshSeed);
    } else {
      ctx.fillRect(-wide, topY, wide * 2, drawVisH);
    }

    // Soft LEFT-side highlight only — the right-side darkening was adding a
    // subtle 8%-black band that showed up as a serrated line at the bottom
    // of each layer (where the interface ellipse meets the rect).
    const side = ctx.createLinearGradient(-rx, 0, rx, 0);
    side.addColorStop(0, 'rgba(255,255,255,0.16)');
    side.addColorStop(0.5, 'rgba(255,255,255,0)');
    side.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = side;
    ctx.fillRect(-wide, topY, wide * 2, drawVisH);

    // Bubbles still rise from the ORIGINAL run boundaries (extension is
    // just for fill coverage during tilt) — passing baseY, not drawBaseY.
    drawBubblesWorld(topY, baseY, interior.w, juice, run.fromIdx, totalTime);
  }

  // PASS 2: interface ellipses between different-colored runs.
  // The bottom half of an ellipse in the UPPER run's color is drawn onto
  // the lower rect — the upper layer "bowls down" into the lower. This
  // guarantees the upper layer always renders IN FRONT of the lower at
  // every boundary, instead of a lower dome poking up into the upper.
  for (let ri = 0; ri < runs.length - 1; ri++) {
    const thisRun = runs[ri];
    const nextRun = runs[ri + 1];
    const upperJuice = JUICE[nextRun.color];
    const interfaceY = yAt(thisRun.toIdx);

    // Skip the ellipse when the upper run is still practically empty
    // (very early in the pour tween) — avoids a flash of upper color
    // before the actual rect is visible.
    const isUpperTop = (ri + 1 === runs.length - 1);
    const upperBotY = yAt(nextRun.fromIdx);
    const upperTopY = isUpperTop ? yAtFill(b.fillLevel) : yAt(nextRun.toIdx);
    const upperHeight = upperBotY - upperTopY;
    if (upperHeight < 1) continue;

    drawInterfaceEllipse(interfaceY, rx, ry, upperJuice);
  }

  // PASS 3: topmost meniscus — ALWAYS visible at full opacity (no more
  // alpha fade that was creating a visible fade-in/out when pour animations
  // ended). The dome bobs vertically with slosh so the surface still feels
  // alive during motion, but it never fades away.
  const topRun = runs[runs.length - 1];
  const topJuice = JUICE[topRun.color];
  const topY = yAtFill(b.fillLevel);
  // No threshold — when slosh = 0, bob = 0 automatically (multiply by 0).
  // The previous `slosh > 0.01` cutoff was snapping the meniscus from its
  // last bob position straight to topY, contributing to the visible jump.
  const bob = Math.sin(totalTime * 7 + b.sloshSeed) * b.slosh * 1.8;
  drawLayerMeniscus(topY + bob, rx, ry, topJuice);

  // PASS 4: base ellipse — the bottom of the glass/liquid column seen
  // through the lowest juice layer. Top half of an ellipse in the darker
  // shade of that juice, positioned at interior.b so it protrudes UP into
  // the bottom rect area and gives the base a curved (not flat) appearance.
  // Faded out during tilt: when the bottle is rotated, this ellipse
  // (drawn in counter-rotated world-aligned coords at local y=interior.b)
  // no longer aligns with the actual visual bottom of the rotated body —
  // it'd float in the middle of the liquid wedge. Smooth fade between
  // 0.05 rad and 0.25 rad of tilt so the transition is invisible.
  //
  // SCALED FOR THIN BOTTOM RUNS — without scaling, ry = rx*0.32 works out
  // to roughly 38–41 % of LAYER_PX (because layer height comes from h and
  // ry comes from w, and h ≈ 2.4–2.6×w). For a 1-unit bottom layer that
  // meant the bottom ~38 % of the visible band was painted in the very
  // dark juice.bot, plus the bottom of the rect's gradient was already
  // juice.mid — so a single-unit layer read as a small light dome on top
  // of a near-black wedge, "almost faded out" against the dark witch
  // background. Capping baseRy at 30 % of the bottom-run's visible height
  // (and accounting for the in-flight fillLevel tween when this run is
  // also the top) keeps the curved-floor perspective hint while leaving
  // the bulk of a 1-unit layer showing the bright juice.mid fill.
  const tiltFade = 1 - Math.min(1, Math.max(0, Math.abs(b.angle) - 0.05) / 0.20);
  if (tiltFade > 0.01) {
    const bottomRun = runs[0];
    const bottomJuice = JUICE[bottomRun.color];
    // Visible vertical span of the bottom run, in local coords. With
    // volume-aware layer Ys this naturally accounts for the bottom
    // layer being taller than the rest (because the curved bowl
    // absorbs less area per pixel of height).
    const bottomBotY = b.layerYs ? b.layerYs[bottomRun.fromIdx] : interior.b;
    const bottomTopY = (runs.length === 1)
      ? getLayerTopYLocal(b, b.fillLevel)
      : (b.layerYs ? b.layerYs[bottomRun.toIdx] : (interior.b - bottomRun.toIdx * LAYER_PX));
    const bottomRunPx = bottomBotY - bottomTopY;
    const baseRy = Math.min(ry, bottomRunPx * 0.30);
    if (baseRy > 0.5) {
      // Lightened radial gradient: juice.mid fills the inner ~55 % so the
      // visible band stays vibrant; juice.bot only at the outer edges
      // (corners) preserves perspective curvature without darkening the
      // entire layer. Previously the gradient hit juice.bot at 70 % of
      // the radius, which made even thicker layers' floors slightly
      // washed-out and was the dominant color of every 1-unit layer.
      const baseG = ctx.createRadialGradient(
        0, interior.b - baseRy * 0.35, rx * 0.08,
        0, interior.b, rx
      );
      baseG.addColorStop(0,    bottomJuice.mid);
      baseG.addColorStop(0.55, bottomJuice.mid);
      baseG.addColorStop(1,    bottomJuice.bot);
      ctx.save();
      ctx.globalAlpha = tiltFade;
      ctx.fillStyle = baseG;
      ctx.beginPath();
      ctx.ellipse(0, interior.b, rx, baseRy, 0, Math.PI, 2 * Math.PI);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }
}

function drawLayerMeniscus(y, rx, ry, juice) {
  // Solid dome in juice.top — matches the rect's top color seamlessly at y.
  ctx.fillStyle = juice.top;
  ctx.beginPath();
  ctx.ellipse(0, y, rx, ry, 0, Math.PI, 2 * Math.PI);
  ctx.closePath();
  ctx.fill();

  // Subtle top-only highlight — NO darkening at the base anymore. The old
  // gradient had 10% black at y which was creating the dark serrated line
  // at the top of the liquid where the dome met the rect.
  const dg = ctx.createLinearGradient(0, y, 0, y - ry);
  dg.addColorStop(0, 'rgba(255,255,255,0)');
  dg.addColorStop(0.5, 'rgba(255,255,255,0)');
  dg.addColorStop(1, 'rgba(255,255,255,0.22)');
  ctx.fillStyle = dg;
  ctx.beginPath();
  ctx.ellipse(0, y, rx, ry, 0, Math.PI, 2 * Math.PI);
  ctx.closePath();
  ctx.fill();

  // Bright specular shine on upper-left of the dome
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.beginPath();
  ctx.ellipse(-rx * 0.28, y - ry * 0.55, rx * 0.38, ry * 0.42, 0, Math.PI, 2 * Math.PI);
  ctx.closePath();
  ctx.fill();
}

// Bottom half of an ellipse in the UPPER run's color, drawn at the interface
// between two different-colored runs. The upper color "bowls down" into the
// lower — upper layer always in front. Kept intentionally simple (no dark
// shading, no horizontal rim line) to avoid visible artifact lines between
// the layers.
function drawInterfaceEllipse(y, rx, ry, upperJuice) {
  // Solid opaque fill using juice.mid — IDENTICAL to the rect's bottom color
  // (pass 1 gradient now ends at juice.mid). This makes the transition from
  // rect to ellipse literally invisible — no dark line between layers.
  // No sheen/highlight, no gradient overlay — just a clean continuous fill.
  ctx.fillStyle = upperJuice.mid;
  ctx.beginPath();
  ctx.ellipse(0, y, rx, ry, 0, 0, Math.PI);
  ctx.closePath();
  ctx.fill();
}

// ============================================================
// CAPS & COMPLETION
// ============================================================
function isBottleCompleted(b) {
  if (!b || b.isObjective) return false;
  if (b.layers.length !== (b.capacity || CAPACITY)) return false;
  const first = b.layers[0];
  if (first === GOAL_COLOR) return false; // pink is destined for the objective
  for (let i = 1; i < b.layers.length; i++) if (b.layers[i] !== first) return false;
  return true;
}

// Bottle "sealing" decoration: a cork stopper drops straight DOWN onto the
// rim, then two magical smoke wisps puff up out of the cork and rise
// while fading. Replaces the umbrella + ice cubes — matches the witch's
// potion theme. State names (umbrellaProgress / ice1Progress / ice2Progress)
// are kept so the boot/loop wiring is unchanged.
function drawSealed(w, h, b) {
  const t = -h;
  const corkP  = b.umbrellaProgress || 0;     // cork stopper drop progress
  const wisp1  = b.ice1Progress || 0;         // first smoke wisp rise
  const wisp2  = b.ice2Progress || 0;         // second smoke wisp rise

  // Cork is sized to plug into the bottle's NECK. For potion bottles the
  // neck is narrow (w * POTION_NECK_W_FRAC), so the cork fits snugly.
  // Cork-top width = corkSize * 0.72, so corkSize chosen so top is ~5%
  // wider than the neck (slight wedge fit).
  const corkSize = w * (POTION_NECK_W_FRAC * 1.05) / 0.72;  // ≈ w * 0.583
  const corkBodyH = corkSize * 0.34;                        // vertical extent of cork body

  // --- Cork stopper: pure vertical drop onto the rim plane (y = t) ---
  if (corkP > 0.01) {
    const finalY = t + w * 0.02;        // base sits just inside the rim opening
    const dropFrom = w * 2.0;
    const x = 0;
    const y = (finalY - dropFrom) + dropFrom * corkP;
    drawCork(x, y, corkSize, Math.min(1, corkP * 1.8));
  }

  // --- Magic smoke wisps: emerge from the cork top and rise.
  // Drawn ON TOP of the cork so the wisps appear to come out of it.
  // The potion's color tints the smoke faintly so each bottle reads
  // as "still glowing with its own magic" even after sealing.
  if (corkP > 0.4) {
    const tintKey = b.layers && b.layers.length ? b.layers[b.layers.length - 1] : 'pink';
    const tint = JUICE[tintKey] || JUICE.pink;
    const corkTopY = t + w * 0.02 - corkBodyH;             // top of cork in glass-local
    if (wisp1 > 0.01) drawSmokeWisp(-corkSize * 0.08, corkTopY, w * 0.50, wisp1, tint, 0);
    if (wisp2 > 0.01) drawSmokeWisp( corkSize * 0.16, corkTopY, w * 0.40, wisp2, tint, 1.7);
  }
}

// A bulbous cork stopper: tapered cylinder body (wider at top), rounded
// top dome, wax-band wrapper at the rim, and tiny pock-marks for cork
// texture. Drawn so its base aligns at (cx, cy + size*0.34) — i.e. the
// stopper PLUGS INTO the bottle from above.
function drawCork(cx, cy, size, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(cx, cy);

  const halfTop  = size * 0.36;    // wider top (sits over the bottle rim)
  const halfBot  = size * 0.28;    // slightly narrower base (plugs into glass)
  const bodyH    = size * 0.34;    // visible cork body height (above rim)
  const domeR    = size * 0.10;    // top dome curvature
  const topY     = -bodyH;
  const botY     = 0;

  // --- Cork body: rounded-top tapered tube, vertical cork-color gradient ---
  const bodyG = ctx.createLinearGradient(-halfTop, topY, halfTop, botY);
  bodyG.addColorStop(0,    '#a07346');
  bodyG.addColorStop(0.45, '#c08a55');
  bodyG.addColorStop(1,    '#7a4f28');
  ctx.fillStyle = bodyG;
  ctx.beginPath();
  ctx.moveTo(-halfBot, botY);
  ctx.lineTo(-halfTop, topY + domeR);
  ctx.quadraticCurveTo(-halfTop, topY, -halfTop + domeR, topY);
  ctx.lineTo(halfTop - domeR, topY);
  ctx.quadraticCurveTo(halfTop, topY, halfTop, topY + domeR);
  ctx.lineTo(halfBot, botY);
  ctx.closePath();
  ctx.fill();

  // Outer outline (subtle dark rim — sells the silhouette)
  ctx.strokeStyle = 'rgba(40,22,8,0.7)';
  ctx.lineWidth = 1.2;
  ctx.stroke();

  // Top oval cap — the cork seen from slightly above (matches glass perspective)
  ctx.beginPath();
  ctx.ellipse(0, topY, halfTop, halfTop * 0.32, 0, 0, Math.PI * 2);
  const capG = ctx.createRadialGradient(-halfTop * 0.3, topY - halfTop * 0.1, halfTop * 0.1,
                                        0, topY, halfTop);
  capG.addColorStop(0, '#e8c089');
  capG.addColorStop(0.6, '#b88554');
  capG.addColorStop(1, '#8a5a2c');
  ctx.fillStyle = capG;
  ctx.fill();
  ctx.strokeStyle = 'rgba(40,22,8,0.6)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Cork pock-marks (the characteristic dark dots/holes on cork) on the body
  ctx.fillStyle = 'rgba(50,28,10,0.55)';
  const dots = [
    [-halfTop * 0.4, topY + bodyH * 0.30, 1.4],
    [-halfTop * 0.1, topY + bodyH * 0.55, 1.0],
    [ halfTop * 0.25, topY + bodyH * 0.40, 1.6],
    [ halfTop * 0.05, topY + bodyH * 0.78, 1.1],
    [-halfTop * 0.3, topY + bodyH * 0.85, 0.9],
    [ halfTop * 0.45, topY + bodyH * 0.70, 1.2]
  ];
  for (const [dx, dy, dr] of dots) {
    ctx.beginPath();
    ctx.arc(dx, dy, dr, 0, Math.PI * 2);
    ctx.fill();
  }
  // A few pocks on the top cap as well
  for (const [tx, ty, tr] of [
    [-halfTop * 0.35, topY + 1, 1.1],
    [ halfTop * 0.2,  topY - 1, 0.9],
    [-halfTop * 0.05, topY + 2, 0.7]
  ]) {
    ctx.beginPath();
    ctx.arc(tx, ty, tr, 0, Math.PI * 2);
    ctx.fill();
  }

  // Light highlight on the upper-left of the body — sells the cylindrical form
  ctx.fillStyle = 'rgba(255,236,200,0.18)';
  ctx.beginPath();
  ctx.ellipse(-halfTop * 0.55, topY + bodyH * 0.45, halfTop * 0.18, bodyH * 0.4, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// Single rising magic-smoke wisp. Starts at (cx, cy) with full opacity,
// rises by `riseSize` units while curling left-right, fades out by p=1.
// Subtly tinted by the potion color so each bottle's smoke matches its brew.
function drawSmokeWisp(cx, cy, riseSize, p, tint, phase) {
  ctx.save();
  const lift = riseSize * p;
  // Curl: gentle horizontal sway as it rises
  const sway = Math.sin(p * 4 + phase) * riseSize * 0.18;
  // Opacity: full 0..0.5, fades 0.5..1
  const a = p < 0.5 ? p / 0.5 : (1 - (p - 0.5) / 0.5);
  ctx.globalAlpha = a * 0.85;
  ctx.translate(cx + sway, cy - lift);

  // Outer puff — soft, mostly white-grey with slight tint
  const outerR = riseSize * (0.22 + p * 0.35);
  const og = ctx.createRadialGradient(0, 0, outerR * 0.1, 0, 0, outerR);
  og.addColorStop(0,    'rgba(240,230,255,0.85)');
  og.addColorStop(0.55, 'rgba(180,160,220,0.45)');
  og.addColorStop(1,    'rgba(180,160,220,0)');
  ctx.fillStyle = og;
  ctx.beginPath();
  ctx.arc(0, 0, outerR, 0, Math.PI * 2);
  ctx.fill();

  // Inner tinted core — lets each bottle's smoke read as ITS color
  const coreR = riseSize * (0.10 + p * 0.18);
  const cg = ctx.createRadialGradient(0, 0, coreR * 0.1, 0, 0, coreR);
  cg.addColorStop(0, tint.top);
  cg.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = cg;
  ctx.globalCompositeOperation = 'screen';
  ctx.beginPath();
  ctx.arc(0, 0, coreR, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalCompositeOperation = 'source-over';

  ctx.restore();
}

function drawWavyLayer(topY, baseY, wide, juice, slosh, seed) {
  // Multi-frequency wave for organic "water" motion (3 superimposed sines
  // with different freqs, speeds and phases — mimics the GPU displacement
  // shader used in Magic Sort).
  const t = totalTime;
  // Amplitudes reduced from (cap 7, scale 8) → (cap 4, scale 5). The wave
  // is shifted UP by maxAmp (CLAUDE.md trick to avoid void troughs below
  // topY), which means the entire wave sits ABOVE topY filled with
  // juice.top via pad-mode gradient. A larger amplitude produces a
  // taller "halo" of light colour above the surface, making the liquid
  // read as visibly LIGHTER during sustained slosh (select / pour-into).
  // Smaller amplitudes keep the wave alive without lightening the area.
  const amp1 = Math.min(4, slosh * 5);
  const amp2 = amp1 * 0.5;
  const amp3 = amp1 * 0.28;
  const maxAmp = amp1 + amp2 + amp3;        // worst-case upward excursion
  const freq1 = 0.08, freq2 = 0.17, freq3 = 0.23;
  const speed1 = 6, speed2 = 10, speed3 = 14;

  // The wave is SHIFTED UP by maxAmp so that waveAt() is always ≤ 0.
  // That guarantees wy = topY + waveAt never dips below topY, which was
  // causing a visible empty strip (void) between topY and the wave trough
  // during slosh. Now the trembling surface only extends UPWARD from topY.
  function waveAt(x) {
    return (Math.sin(x * freq1 + t * speed1 + seed)       * amp1
          + Math.sin(x * freq2 + t * speed2 + seed * 1.3) * amp2
          + Math.sin(x * freq3 - t * speed3 + seed * 1.7) * amp3) - maxAmp;
  }

  // IMPORTANT: do NOT create a new gradient here. We rely on the gradient
  // already set as `ctx.fillStyle` by the caller (drawJuiceLayersWorld),
  // which uses the run's ORIGINAL baseY (interior.b - run.fromIdx*LAYER_PX),
  // not the extended drawBaseY that we receive as the `baseY` parameter
  // of this function. For the bottom-most run, drawBaseY = baseY + wide
  // (~300 px below the real floor) — if we built a gradient from
  //   topY → drawBaseY, the visible portion of the liquid (topY → realBaseY)
  // would only cover ~28% of the gradient range, keeping the colour near
  // juice.top throughout and making the liquid look noticeably LIGHTER
  // during slosh. That manifested as: single-colour bottles becoming
  // pale on select, and a "flick" back to the correct colour when slosh
  // decayed below the wavy threshold and the renderer switched to fillRect
  // (which had been using the correct topY → realBaseY gradient all along).
  // Multi-colour stacks didn't show the bug because the top run isn't the
  // bottom run there, so its drawBaseY equals its real baseY.

  ctx.beginPath();
  const steps = 40;
  for (let i = 0; i <= steps; i++) {
    const tt = i / steps;
    const x = -wide + tt * wide * 2;
    const wy = topY + waveAt(x);
    if (i === 0) ctx.moveTo(x, wy);
    else ctx.lineTo(x, wy);
  }
  ctx.lineTo(wide, baseY);
  ctx.lineTo(-wide, baseY);
  ctx.closePath();
  ctx.fill();

  // White highlight strokes on the wave surface — alpha SCALES with slosh
  // so they fade out smoothly as the wave decays. Without scaling, the
  // strokes stayed at full alpha right up to slosh<0.04 and then vanished
  // instantly when the renderer switched to the flat path → that's what
  // looked like "the liquid suddenly gets darker / cuts to a new colour".
  // The scaling factor `min(1, slosh/0.3)` reaches 100% at slosh=0.3
  // (full sustained-select wobble of 0.14 → 47%, full pour-impact of
  // 1.0 → 100%) and fades to zero as slosh decays toward zero.
  const strokeFade = Math.min(1, slosh / 0.3);
  // Reduced max alpha from 0.4 → 0.28 — the original was tuned for the
  // bright juice-bar scene; on the dark witch background the white crests
  // were reading as too "shiny" and contributing to the perceived
  // lightening of the whole liquid surface.
  ctx.strokeStyle = 'rgba(255,255,255,' + (0.28 * strokeFade).toFixed(3) + ')';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const tt = i / steps;
    const x = -wide + tt * wide * 2;
    const wy = topY + waveAt(x);
    if (i === 0) ctx.moveTo(x, wy);
    else ctx.lineTo(x, wy);
  }
  ctx.stroke();

  ctx.strokeStyle = 'rgba(255,255,255,' + (0.12 * strokeFade).toFixed(3) + ')';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const tt = i / steps;
    const x = -wide + tt * wide * 2;
    const wy = topY + waveAt(x) + 3;
    if (i === 0) ctx.moveTo(x, wy);
    else ctx.lineTo(x, wy);
  }
  ctx.stroke();
}

function drawMeniscusFlat(y, interior, juice) {
  const rx = interior.w / 2;
  const ry = rx * 0.16;
  const g = ctx.createRadialGradient(0, y - ry * 0.3, rx * 0.1, 0, y, rx);
  g.addColorStop(0, juice.top);
  g.addColorStop(1, juice.mid);
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.ellipse(0, y, rx, ry, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath();
  ctx.ellipse(-rx * 0.25, y - ry * 0.2, rx * 0.45, ry * 0.3, 0, 0, Math.PI*2);
  ctx.fill();
}

// Procedural rising-bubbles texture inside a liquid run. Replaces the
// pulp/chia speckles from the juice version (which read as "dirt" on
// potions). Each bubble has a deterministic seed (xorshift32 — same hash
// the original speckles used, so the column-position/size distribution is
// well-mixed), and a continuous lifecycle in time:
//
//   y(t) = bot - ((t * speed + phase) mod cycleH)
//   alpha = fade-in at the bottom 12% → full → fade-out in the top 18%
//
// So bubbles are born at the base, rise at slightly different speeds,
// sway a tiny bit horizontally, and "pop" near the surface. The fade
// envelopes hide the wrap-around so it reads as continuous motion.
//
// Density is much lower than the speckles were (~1 bubble per ~1200 px²
// vs 1 per 320 px²) — bubbles are larger and more visible, so a smaller
// count keeps the liquid readable.
function drawBubblesWorld(top, bot, w, juice, seed, time) {
  const layerH = bot - top;
  if (layerH < 6 || w < 6) return;
  const area = layerH * w;
  const n = Math.max(2, Math.floor(area / 1200));
  const U32 = 4294967295;
  const cycleH = layerH + 6;            // small overscroll past `top` before respawning

  for (let i = 0; i < n; i++) {
    let s = ((seed + 1) * 2654435761 ^ (i + 1) * 40503) | 0;
    if (s === 0) s = 1;

    // x — horizontal column position, slightly inset from the walls so
    // bubbles don't visually clip against the glass interior.
    s ^= s << 13; s ^= s >>> 17; s ^= s << 5;
    const sx = -w * 0.42 + ((s >>> 0) / U32) * w * 0.84;

    // speed — px/s rise rate, varied per bubble for a natural feel
    s ^= s << 13; s ^= s >>> 17; s ^= s << 5;
    const speed = 12 + ((s >>> 0) / U32) * 18;

    // phase — initial offset along the cycle so bubbles aren't synced
    s ^= s << 13; s ^= s >>> 17; s ^= s << 5;
    const phase = ((s >>> 0) / U32) * cycleH;

    // radius — small to mid, distributed in steps for variety
    s ^= s << 13; s ^= s >>> 17; s ^= s << 5;
    const r = 1.4 + (((s >>> 0) % 6)) * 0.45;

    // sway phase — independent so x oscillation feels uncorrelated to y
    s ^= s << 13; s ^= s >>> 17; s ^= s << 5;
    const swayPhase = ((s >>> 0) / U32) * Math.PI * 2;

    const t = (time * speed + phase) % cycleH;     // 0 = at bottom, cycleH = past top
    const y = bot - t;
    const sway = Math.sin(time * 1.3 + swayPhase) * Math.min(2.2, r * 0.9);

    // Fade envelopes: smooth in over the bottom 12%, smooth out over the top 18%
    const fadeInEnd  = layerH * 0.12;
    const fadeOutStart = layerH * 0.82;
    let a;
    if (t < fadeInEnd)            a = t / fadeInEnd;
    else if (t > fadeOutStart)    a = Math.max(0, 1 - (t - fadeOutStart) / (layerH - fadeOutStart));
    else                          a = 1;
    if (a <= 0.02) continue;

    drawBubble(sx + sway, y, r, juice, a);
  }
}

// One potion bubble: faint tinted ring + tiny white specular highlight.
// Drawn additively-ish (low alpha) so bubbles read as light catches in
// the liquid rather than as solid dots.
function drawBubble(x, y, r, juice, alpha) {
  // Subtle inner fill — tints the bubble interior in the light potion color
  ctx.globalAlpha = alpha * 0.22;
  ctx.fillStyle = juice.top;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();

  // Outer ring — bright potion-top color, 0.8 px stroke
  ctx.globalAlpha = alpha * 0.7;
  ctx.strokeStyle = juice.top;
  ctx.lineWidth = 0.9;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.stroke();

  // Specular highlight — small bright dot on the upper-left of the bubble
  ctx.globalAlpha = alpha * 0.85;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(x - r * 0.32, y - r * 0.32, Math.max(0.5, r * 0.32), 0, Math.PI * 2);
  ctx.fill();

  ctx.globalAlpha = 1;
}

// ============================================================
// RENDER: OBJECTIVE LABEL (chalkboard-style tip, like the reference)
// ============================================================
function drawObjectiveLabel(b) {
  // Pulsing pink glow around the tube (attention cue — this is the goal!)
  const pulse = 0.4 + 0.2 * Math.sin(totalTime * 2.2);
  ctx.save();
  ctx.globalAlpha = pulse;
  ctx.strokeStyle = JUICE[GOAL_COLOR].top;
  ctx.lineWidth = 3;
  ctx.shadowColor = JUICE[GOAL_COLOR].mid;
  ctx.shadowBlur = 16;
  ctx.save();
  ctx.translate(b.x, b.y + b.lift);
  glassBodyPath(b.w + 4, b.h + 4, true);  // objective is always the tall flask
  ctx.stroke();
  ctx.restore();
  ctx.restore();

  // Witchy badge: a parchment-cream disc framed in dark wood, with a tiny
  // glowing potion-flask icon in the goal color centered inside.
  const size = Math.min(b.w * 0.78, 50);
  const cx = b.x;
  const cy = b.y + b.lift - b.h * 0.6;

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.55)';
  ctx.shadowBlur = 6;
  ctx.shadowOffsetY = 2;
  // Outer dark frame ring
  ctx.fillStyle = '#1d1230';
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.55, 0, Math.PI * 2);
  ctx.fill();
  // Parchment inner disc
  ctx.fillStyle = '#f0d8b0';
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  ctx.strokeStyle = '#5b3a1c';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.5, 0, Math.PI * 2);
  ctx.stroke();

  // Tiny potion flask icon — round body filled with the goal color
  const fr = size * 0.22;          // flask body radius
  const fx = cx;
  const fy = cy + fr * 0.18;
  // Aura behind the flask
  ctx.save();
  ctx.shadowColor = JUICE[GOAL_COLOR].mid;
  ctx.shadowBlur = 8;
  // Flask body (round bulb)
  const fg = ctx.createRadialGradient(fx - fr * 0.25, fy - fr * 0.3, fr * 0.1, fx, fy, fr);
  fg.addColorStop(0, JUICE[GOAL_COLOR].top);
  fg.addColorStop(0.7, JUICE[GOAL_COLOR].mid);
  fg.addColorStop(1, JUICE[GOAL_COLOR].bot);
  ctx.fillStyle = fg;
  ctx.beginPath();
  ctx.arc(fx, fy, fr, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Flask neck + stopper (drawn above the bulb)
  ctx.fillStyle = '#3a2956';
  // Neck
  const neckW = fr * 0.55;
  const neckH = fr * 0.5;
  ctx.fillRect(fx - neckW / 2, fy - fr - neckH * 0.85, neckW, neckH);
  // Lip flare
  ctx.beginPath();
  ctx.moveTo(fx - neckW * 0.85, fy - fr - neckH * 0.85);
  ctx.lineTo(fx + neckW * 0.85, fy - fr - neckH * 0.85);
  ctx.lineTo(fx + neckW * 0.6,  fy - fr - neckH * 0.55);
  ctx.lineTo(fx - neckW * 0.6,  fy - fr - neckH * 0.55);
  ctx.closePath();
  ctx.fill();
  // Cork stopper on top (small)
  ctx.fillStyle = '#a07346';
  ctx.fillRect(fx - neckW * 0.55, fy - fr - neckH * 1.15, neckW * 1.1, neckH * 0.35);

  // Flask outline + tiny shine on the bulb
  ctx.strokeStyle = 'rgba(0,0,0,0.45)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(fx, fy, fr, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.beginPath();
  ctx.ellipse(fx - fr * 0.35, fy - fr * 0.45, fr * 0.18, fr * 0.28, 0, 0, Math.PI*2);
  ctx.fill();
}

// ============================================================
// RENDER: FLOW LINE
// ============================================================
function drawFlowLine() {
  if (!flowLine) return;
  const f = flowLine;
  const src = f.src;
  const dst = f.dst;

  // Spout is at the LIP CORNER on the tilting side. Potion bottles have a
  // narrow lip (±w * POTION_LIP_X_FRAC ≈ 0.25w); the tall flask uses the
  // body width (≈ 0.42w). Stream y just below the lip top.
  const spoutLocalXFrac = src.isObjective ? 0.42 : POTION_LIP_X_FRAC;
  const spoutLocalX = f.sign * src.w * spoutLocalXFrac;
  const spoutLocalY = -src.h + src.w * 0.06;
  const cos = Math.cos(src.angle), sin = Math.sin(src.angle);
  const spoutX = src.x + spoutLocalX * cos - spoutLocalY * sin;
  const spoutY = src.y + src.lift + spoutLocalX * sin + spoutLocalY * cos;

  const landY = getLayerTopY(dst, Math.min(dst.capacity || CAPACITY, dst.fillLevel + 0.1));
  const landX = dst.x;

  ctx.save();
  ctx.globalAlpha = f.alpha;
  const juice = JUICE[f.color];
  const midX = (spoutX + landX) / 2;
  const midY = (spoutY + landY) / 2 + 4;
  const streamW = src.w * 0.11;

  ctx.fillStyle = juice.mid;
  ctx.beginPath();
  ctx.moveTo(spoutX - streamW * 0.7, spoutY);
  ctx.quadraticCurveTo(midX - streamW * 0.5, midY, landX - streamW * 0.55, landY);
  ctx.lineTo(landX + streamW * 0.55, landY);
  ctx.quadraticCurveTo(midX + streamW * 0.5, midY, spoutX + streamW * 0.7, spoutY);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = juice.top;
  ctx.lineWidth = streamW * 0.32;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(spoutX - streamW * 0.2, spoutY);
  ctx.quadraticCurveTo(midX - streamW * 0.2, midY, landX - streamW * 0.2, landY);
  ctx.stroke();

  ctx.fillStyle = juice.top;
  ctx.beginPath();
  ctx.arc(landX, landY - 1, streamW * 0.7, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = juice.bot;
  ctx.beginPath();
  ctx.arc(landX, landY + 1, streamW * 0.35, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

// ============================================================
// RENDER: UI
// ============================================================
function drawLogo() {
  const lw = Math.min(150, W * 0.20);
  const lh = lw * 0.55;
  const lx = 10, ly = 10;
  ctx.save();
  // Spellbook-cover gradient: deep velvet purple → black with a luminous
  // arcane border in green (matching the "magic smoke" wisps).
  const g = ctx.createLinearGradient(0, ly, 0, ly + lh);
  g.addColorStop(0, '#3b1466');
  g.addColorStop(1, '#1a0633');
  ctx.fillStyle = g;
  roundRectPath(lx, ly, lw, lh, 8);
  ctx.fill();
  ctx.strokeStyle = '#7df04a';
  ctx.lineWidth = 1.6;
  ctx.shadowColor = '#7df04a';
  ctx.shadowBlur = 8;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // "WITCH'S" — pale lavender; "POTION" — glowing arcane green; "SORT" — muted gold
  ctx.font = 'bold ' + Math.floor(lh * 0.24) + 'px Georgia,"Times New Roman",serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#e6d4ff';
  ctx.fillText("WITCH'S", lx + lw/2, ly + lh * 0.26);
  ctx.fillStyle = '#9eff5a';
  ctx.shadowColor = '#48b020';
  ctx.shadowBlur = 6;
  ctx.font = 'bold ' + Math.floor(lh * 0.30) + 'px Georgia,"Times New Roman",serif';
  ctx.fillText('POTION', lx + lw/2, ly + lh * 0.56);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#ffd47a';
  ctx.font = 'bold ' + Math.floor(lh * 0.16) + 'px Georgia,serif';
  ctx.fillText('— SORT —', lx + lw/2, ly + lh * 0.85);
  ctx.restore();
}

function drawCTA() {
  const cw = Math.min(240, W * 0.52);
  const ch = 56;
  const cx = W / 2;
  const cy = H - ch / 2 - 18;
  ctaHitBox = { x: cx - cw/2, y: cy - ch/2, w: cw, h: ch };

  const pulse = 1 + Math.sin(totalTime * 3.2) * 0.04;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(pulse, pulse);
  ctx.shadowColor = 'rgba(0,0,0,0.55)';
  ctx.shadowBlur = 12;
  ctx.shadowOffsetY = 4;
  // Glowing arcane-green CTA (matches the witch's smoke / cauldron tint)
  const g = ctx.createLinearGradient(0, -ch/2, 0, ch/2);
  g.addColorStop(0, '#aaff66');
  g.addColorStop(0.5, '#5ec92a');
  g.addColorStop(1, '#1f7a08');
  ctx.fillStyle = g;
  roundRectPath(-cw/2, -ch/2, cw, ch, ch/2);
  ctx.fill();
  ctx.shadowColor = 'transparent';
  ctx.strokeStyle = '#e8ffd1';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.fillStyle = '#0d2208';
  ctx.font = 'bold 22px Georgia,"Times New Roman",serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(won ? 'DOWNLOAD NOW' : 'PLAY NOW', 0, 0);
  ctx.restore();
}

function drawWinOverlay() {
  ctx.save();
  ctx.fillStyle = 'rgba(8,2,18,0.55)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#f4e6ff';
  ctx.font = 'bold 44px Georgia,"Times New Roman",serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(160,255,80,0.9)';
  ctx.shadowBlur = 22;
  ctx.fillText('POTION BREWED!', W/2, H * 0.3);
  ctx.shadowBlur = 0;
  ctx.font = '18px Georgia,serif';
  ctx.fillStyle = '#d3ff9a';
  ctx.fillText('100+ enchanting levels inside', W/2, H * 0.3 + 32);
  ctx.restore();
}

function hitCTA(px, py) {
  if (!ctaHitBox) return false;
  return px >= ctaHitBox.x && px <= ctaHitBox.x + ctaHitBox.w &&
         py >= ctaHitBox.y && py <= ctaHitBox.y + ctaHitBox.h;
}
function fireCTA() {
  sfxClick();
  try {
    if (window.mraid && window.mraid.open) window.mraid.open('https://apps.apple.com/');
    else if (window.install) window.install();
  } catch(e) {}
}

// ============================================================
// MAIN LOOP
// ============================================================
let lastTime = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - lastTime) / 1000);
  lastTime = now;
  totalTime += dt;

  updateTweens(dt);
  updateParticles(dt);
  emitFlowDroplets(dt);
  updateTutorial(dt);

  // Trigger potion-sealing sequence the first frame a bottle becomes complete:
  //   1. Cork stopper drops straight down onto the rim
  //   2. First magic smoke wisp rises from the cork and fades
  //   3. Second smoke wisp follows, slightly offset, for a layered puff
  for (const b of bottles) {
    const done = isBottleCompleted(b);
    if (done && !b.capTriggered) {
      b.capTriggered = true;
      b.umbrellaProgress = 0;
      b.ice1Progress = 0;
      b.ice2Progress = 0;
      tween(b, { umbrellaProgress: 1 }, 0.42, { ease: 'outCubic' });
      // Smoke wisps don't bounce — outCubic on a 0→1 lift gives a gentle
      // ease-out as they reach the top of the rise (outBounce would create
      // a "fall back / rise again" effect that breaks smoke physics).
      tween(b, { ice1Progress: 1 },     0.85, { delay: 0.25, ease: 'outCubic' });
      tween(b, { ice2Progress: 1 },     0.85, { delay: 0.45, ease: 'outCubic' });
      sfxSealed();
    }
  }

  drawBackground();

  // Ordering: objective behind other glasses, selected/animating on top
  const order = bottles.slice().sort((a, b) => {
    if (a.isObjective !== b.isObjective) return a.isObjective ? -1 : 1;
    const aAnim = (a === selected || (isAnimating && a.angle !== 0));
    const bAnim = (b === selected || (isAnimating && b.angle !== 0));
    if (aAnim !== bAnim) return aAnim ? 1 : -1;
    return a.baseY - b.baseY;
  });
  for (const b of order) drawGlass(b);

  drawFlowLine();
  drawParticles();

  drawLogo();
  drawCTA();
  // Tutorial hand sits ABOVE bottles, particles, logo and CTA so the
  // pointing finger is always clearly visible — but BELOW the win
  // overlay so the celebration screen takes precedence.
  drawTutorialHand();
  if (won) drawWinOverlay();

  requestAnimationFrame(loop);
}

// ============================================================
// BOOT
// ============================================================
buildLevel();
resize();
requestAnimationFrame(loop);

})();
</script>
