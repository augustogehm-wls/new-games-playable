<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playables Hub — Catálogo</title>
<style>
  :root {
    --bg: #0f0f12;
    --surface: #18181d;
    --surface-2: #21212a;
    --border: #2a2a35;
    --text: #f5f5f7;
    --text-dim: #9a9aa8;
    --accent: #ff5b3a;
    --accent-2: #ffb84d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; display: flex; flex-direction: column; }
  a { color: inherit; text-decoration: none; }

  header {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; background: rgba(15,15,18,0.85); backdrop-filter: blur(12px); z-index: 10;
  }
  .logo { font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  nav { display: flex; gap: 24px; font-size: 14px; color: var(--text-dim); }
  nav a:hover { color: var(--text); }

  main { flex: 1; padding: 48px 32px 96px; max-width: 1200px; margin: 0 auto; width: 100%; }

  .hero { margin-bottom: 56px; }
  .hero h1 { font-size: clamp(32px, 5vw, 56px); font-weight: 800; letter-spacing: -1.5px; line-height: 1.05; margin-bottom: 16px; }
  .hero h1 em { font-style: normal; background: linear-gradient(90deg, var(--accent), var(--accent-2)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .hero p { color: var(--text-dim); font-size: 17px; max-width: 600px; line-height: 1.5; }

  .section-title { font-size: 13px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 20px; font-weight: 600; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex; flex-direction: column; gap: 12px;
    min-height: 160px;
    position: relative;
    overflow: hidden;
  }
  .card:hover { transform: translateY(-2px); border-color: var(--accent); background: var(--surface-2); }
  .card .emoji { font-size: 40px; line-height: 1; }
  .card .name { font-weight: 700; font-size: 17px; }
  .card .count { font-size: 12px; color: var(--text-dim); margin-top: auto; }
  .card .badge { position: absolute; top: 12px; right: 12px; font-size: 10px; padding: 3px 8px; border-radius: 999px; background: var(--accent); color: #fff; font-weight: 700; letter-spacing: 0.5px; }
  .card.empty .badge { background: var(--surface-2); color: var(--text-dim); border: 1px solid var(--border); }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
    display: none; align-items: flex-start; justify-content: center;
    padding: 48px 16px; overflow-y: auto; z-index: 100;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    max-width: 900px; width: 100%;
    padding: 32px;
    animation: pop 0.2s ease;
  }
  @keyframes pop { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .modal-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
  .modal-header .emoji { font-size: 48px; }
  .modal-header h2 { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
  .modal-header p { color: var(--text-dim); font-size: 14px; margin-top: 4px; }
  .modal-close {
    margin-left: auto; background: var(--surface-2); border: 1px solid var(--border);
    color: var(--text); width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
    font-size: 18px; display: grid; place-items: center;
  }
  .modal-close:hover { background: var(--accent); border-color: var(--accent); }

  .variations {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }
  .variation {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
    transition: all 0.15s ease;
    display: flex; flex-direction: column; gap: 8px;
  }
  .variation:hover { border-color: var(--accent); transform: translateY(-1px); }
  .variation .thumb { font-size: 28px; }
  .variation .title { font-weight: 600; font-size: 15px; }
  .variation .desc { font-size: 12px; color: var(--text-dim); line-height: 1.4; }
  .variation .play {
    margin-top: 8px; font-size: 12px; color: var(--accent); font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
  }

  .empty-state {
    padding: 48px 24px; text-align: center; color: var(--text-dim);
    border: 1px dashed var(--border); border-radius: 12px;
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }

  footer {
    padding: 24px 32px; border-top: 1px solid var(--border);
    color: var(--text-dim); font-size: 12px; text-align: center;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
</style>
</head>
<body>

<header>
  <div class="logo">PLAYABLES<span>.</span>HUB</div>
  <nav>
    <a href="#catalog">Catálogo</a>
    <a href="#about">Sobre</a>
  </nav>
</header>

<main>
  <section class="hero">
    <h1>Catálogo de <em>Playables</em></h1>
    <p>Coleção de mini-jogos interativos organizados por mecânica. Clique numa categoria para ver as variações de tema disponíveis.</p>
  </section>

  <section id="catalog">
    <div class="section-title">Categorias</div>
    <div class="grid" id="categories"></div>
  </section>
</main>

<div class="modal-backdrop" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="emoji" id="m-emoji"></div>
      <div>
        <h2 id="m-name"></h2>
        <p id="m-desc"></p>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="m-content"></div>
  </div>
</div>

<footer>
  Built with vanilla web tech · <a href="#" style="color: var(--accent)">@playables-hub</a>
</footer>

<script>
const CATEGORIES = [
  {
    id: "water-sort", emoji: "💧", name: "Water Sort",
    desc: "Organize líquidos coloridos em tubos até que cada um contenha uma única cor.",
    variations: [
      { thumb: "🍹", title: "Summer Juice Bar", desc: "Misture sucos tropicais num bar de praia.", url: "summer_juice_bar_sort.html" },
      { thumb: "✨", title: "Magic Sort", desc: "Versão mágica com poções coloridas.", url: "magic_sort_unpacked.html" },
    ]
  },
  {
    id: "pixel-blast", emoji: "💥", name: "Pixel Blast",
    desc: "Destrua pixels e revele a imagem por trás — satisfação garantida.",
    variations: []
  },
  {
    id: "tile-sort", emoji: "🧩", name: "Tile Sort",
    desc: "Combine peças iguais coletando-as do tabuleiro até completar trios.",
    variations: []
  },
  {
    id: "yarn-untangle", emoji: "🧶", name: "Yarn Untangle",
    desc: "Desenrole linhas embaraçadas e teça padrões coloridos.",
    variations: []
  },
  {
    id: "sand-drop", emoji: "⏳", name: "Sand Drop",
    desc: "Areia que escorre — separe as cores usando física e timing.",
    variations: []
  },
  {
    id: "block-jam", emoji: "🟦", name: "Block Jam",
    desc: "Mova blocos para liberar a saída num quebra-cabeça de deslizamento.",
    variations: []
  },
  {
    id: "match-3", emoji: "💎", name: "Match 3",
    desc: "Combine três ou mais elementos iguais para pontuar.",
    variations: []
  },
  {
    id: "screw-out", emoji: "🔩", name: "Screw Out",
    desc: "Remova parafusos na ordem certa para desmontar a estrutura.",
    variations: []
  },
  {
    id: "traffic-jam", emoji: "🚗", name: "Traffic Jam",
    desc: "Direcione veículos pelas pistas evitando colisões e congestionamento.",
    variations: []
  },
];

function render() {
  const grid = document.getElementById("categories");
  grid.innerHTML = CATEGORIES.map(c => {
    const count = c.variations.length;
    const empty = count === 0 ? "empty" : "";
    const badge = count > 0
      ? `<div class="badge">${count} ${count === 1 ? "tema" : "temas"}</div>`
      : `<div class="badge">em breve</div>`;
    return `
      <div class="card ${empty}" onclick="openModal('${c.id}')">
        ${badge}
        <div class="emoji">${c.emoji}</div>
        <div class="name">${c.name}</div>
        <div class="count">${count > 0 ? `${count} variaç${count === 1 ? "ão" : "ões"} disponível` : "Nenhuma variação ainda"}</div>
      </div>
    `;
  }).join("");
}

function openModal(id) {
  const c = CATEGORIES.find(x => x.id === id);
  if (!c) return;
  document.getElementById("m-emoji").textContent = c.emoji;
  document.getElementById("m-name").textContent = c.name;
  document.getElementById("m-desc").textContent = c.desc;
  const content = document.getElementById("m-content");
  if (c.variations.length === 0) {
    content.innerHTML = `
      <div class="empty-state">
        <div class="icon">🚧</div>
        <div><strong>Nenhuma variação ainda.</strong></div>
        <div style="margin-top:6px; font-size: 13px;">Quando criarmos novos temas para esta categoria, eles aparecerão aqui.</div>
      </div>
    `;
  } else {
    content.innerHTML = `
      <div class="variations">
        ${c.variations.map(v => `
          <a class="variation" href="${v.url}" target="_blank" rel="noopener">
            <div class="thumb">${v.thumb}</div>
            <div class="title">${v.title}</div>
            <div class="desc">${v.desc}</div>
            <div class="play">▶ Jogar</div>
          </a>
        `).join("")}
      </div>
    `;
  }
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
}

document.getElementById("modal").addEventListener("click", e => {
  if (e.target.id === "modal") closeModal();
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModal();
});

render();
</script>
</body>
</html>
