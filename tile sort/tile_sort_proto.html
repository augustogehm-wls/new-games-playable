'use strict';

// ============================================================
// TILE SORT — Prototype
//
// Drag-and-drop triple-match on a 9x8 grid of shelves. Each shelf
// has 3 horizontal slots. Pick up any item, drop it on any free
// slot on the board. When a shelf has 3 identical items, they
// merge and clear. Win when the board is empty. No lose state,
// no power-ups (matches reference: AppLovin "Goods Sorting:
// Match 3 Puzzle", a Luna Unity bundle — visual mechanic only).
// ============================================================

// ============================================================
// SETUP
// ============================================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;
let totalTime = 0;

function resize() {
  DPR = Math.min(2, window.devicePixelRatio || 1);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  layoutBoard();
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', resize);

// ============================================================
// TWEEN ENGINE
// ============================================================
const tweens = [];
function tween(obj, to, dur, opts) {
  opts = opts || {};
  const from = {};
  for (const k in to) from[k] = obj[k];
  const t = {
    obj, from, to, dur,
    ease: opts.ease || 'outSine',
    onComplete: opts.onComplete || null,
    delay: opts.delay || 0,
    elapsed: 0, alive: true
  };
  tweens.push(t);
  return t;
}
function killTweensOf(obj, keys) {
  for (const t of tweens) {
    if (t.obj !== obj) continue;
    if (!keys) { t.alive = false; continue; }
    for (const k of keys) if (k in t.to) { t.alive = false; break; }
  }
}
const EASE = {
  linear:    t => t,
  outSine:   t => Math.sin(t * Math.PI / 2),
  inSine:    t => 1 - Math.cos(t * Math.PI / 2),
  inOutSine: t => -(Math.cos(Math.PI * t) - 1) / 2,
  inQuad:    t => t * t,
  outQuad:   t => 1 - (1-t)*(1-t),
  inCubic:   t => t * t * t,
  outCubic:  t => 1 - Math.pow(1-t, 3),
  inOutCubic: t => t<0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2,
  outBack:   t => { const c1=1.70158, c3=c1+1; return 1 + c3*Math.pow(t-1,3) + c1*Math.pow(t-1,2); },
  inOutBack: t => {
    const c1 = 1.70158, c2 = c1 * 1.525;
    return t < 0.5
      ? (Math.pow(2*t, 2) * ((c2+1) * 2*t - c2)) / 2
      : (Math.pow(2*t-2, 2) * ((c2+1) * (2*t-2) + c2) + 2) / 2;
  },
  outBounce: t => {
    const n1 = 7.5625, d1 = 2.75;
    if (t < 1/d1) return n1 * t * t;
    if (t < 2/d1) { t -= 1.5/d1; return n1 * t * t + 0.75; }
    if (t < 2.5/d1) { t -= 2.25/d1; return n1 * t * t + 0.9375; }
    t -= 2.625/d1; return n1 * t * t + 0.984375;
  }
};
function updateTweens(dt) {
  for (let i = tweens.length - 1; i >= 0; i--) {
    const t = tweens[i];
    if (!t.alive) { tweens.splice(i, 1); continue; }
    if (t.delay > 0) { t.delay -= dt; continue; }
    t.elapsed += dt;
    const k = t.dur > 0 ? Math.min(1, t.elapsed / t.dur) : 1;
    const easeFn = EASE[t.ease] || EASE.outSine;
    const e = easeFn(k);
    for (const key in t.to) {
      t.obj[key] = t.from[key] + (t.to[key] - t.from[key]) * e;
    }
    if (k >= 1) {
      if (t.onComplete) t.onComplete();
      tweens.splice(i, 1);
    }
  }
}

// ============================================================
// AUDIO (Web Audio API — procedural)
// ============================================================
let audioCtx = null, audioMaster = null, audioMuted = false;
function initAudio() {
  if (audioCtx) return;
  const Ctx = window.AudioContext || window.webkitAudioContext;
  if (!Ctx) return;
  try {
    audioCtx = new Ctx();
    audioMaster = audioCtx.createGain();
    audioMaster.gain.value = 0.5;
    audioMaster.connect(audioCtx.destination);
  } catch (e) { audioCtx = null; }
}
function audioResume() {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
}
function playTone(opts) {
  if (!audioCtx || audioMuted) return;
  const o = opts || {};
  const freq = o.freq || 440, dur = o.dur || 0.12, type = o.type || 'sine';
  const vol = o.vol || 0.18, attack = o.attack || 0.005, release = o.release || 0.05;
  const sweep = o.sweep || 0;
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  if (sweep) osc.frequency.exponentialRampToValueAtTime(Math.max(40, freq + sweep), t0 + dur);
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol, t0 + attack);
  g.gain.linearRampToValueAtTime(0, t0 + dur + release);
  osc.connect(g); g.connect(audioMaster);
  osc.start(t0); osc.stop(t0 + dur + release + 0.02);
}
function playNoise(opts) {
  if (!audioCtx || audioMuted) return;
  const o = opts || {};
  const dur = o.dur || 0.1, vol = o.vol || 0.18;
  const freq = o.freq || 1500, q = o.q || 4;
  const attack = o.attack || 0.005, release = o.release || 0.06;
  const t0 = audioCtx.currentTime;
  const len = Math.ceil((dur + release) * audioCtx.sampleRate);
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const filt = audioCtx.createBiquadFilter();
  filt.type = o.filter || 'bandpass'; filt.frequency.value = freq; filt.Q.value = q;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol, t0 + attack);
  g.gain.linearRampToValueAtTime(0, t0 + dur + release);
  src.connect(filt); filt.connect(g); g.connect(audioMaster);
  src.start(t0); src.stop(t0 + dur + release + 0.02);
}
function sfxPick()    { playTone({ freq: 620, dur: 0.06, type: 'triangle', vol: 0.22, sweep: 240 }); }
function sfxDrop()    { playTone({ freq: 480, dur: 0.07, type: 'triangle', vol: 0.18, sweep: -180 }); }
function sfxInvalid() { playTone({ freq: 180, dur: 0.12, type: 'square',   vol: 0.16, sweep: -40 }); }
function sfxMatch()   {
  playTone({ freq: 520, dur: 0.10, type: 'triangle', vol: 0.20, sweep: 360, attack: 0.005 });
  setTimeout(() => playTone({ freq: 780, dur: 0.10, type: 'triangle', vol: 0.18, sweep: 320 }), 70);
  setTimeout(() => playTone({ freq: 1040, dur: 0.14, type: 'triangle', vol: 0.16, sweep: 380 }), 140);
  playNoise({ dur: 0.18, vol: 0.08, freq: 4000, q: 2, attack: 0.005, release: 0.10 });
}
function sfxWin() {
  const notes = [523, 659, 784, 988, 1175];
  notes.forEach((f, i) => setTimeout(() => playTone({ freq: f, dur: 0.18, type: 'triangle', vol: 0.22 }), i * 110));
}

// Validate all type counts are multiples of 3. Logs a warning per
// type that's off — the puzzle is unsolvable until all are valid.
function countValidate(board) {
  const counts = {};
  for (const row of board) for (const shelf of row) for (const id of shelf) {
    if (id == null) continue;
    counts[id] = (counts[id] || 0) + 1;
  }
  const bad = [];
  for (const t of TYPES) {
    const c = counts[t.id] || 0;
    if (c % 3 !== 0) bad.push({ id: t.id, emoji: t.emoji, count: c });
  }
  if (bad.length) {
    console.warn('[tile-sort] Type counts not multiple of 3:', bad);
  } else {
    console.log('[tile-sort] All type counts valid. Total items:',
      Object.values(counts).reduce((a,b)=>a+b, 0));
  }
  return bad;
}

// shelves[r][c] = { items, shake, phase, item{Sx,Sy,Alpha}, stampProgress, soldOut }
//   phase ∈ 'normal' | 'matching' | 'soldOut'
//   Squash/stretch values drive item draw during 'matching'.
//   stampProgress: 0 = stamp fully above cell (out of view); 1 = at rest covering
//   the full cell. The slide-down anim tweens this to 1 with outBack overshoot.
let shelves = [];
function buildLevel() {
  shelves = [];
  for (let r = 0; r < ROWS; r++) {
    const row = [];
    for (let c = 0; c < COLS; c++) {
      const src = INITIAL_BOARD[r][c];
      row.push({
        items: [src[0], src[1], src[2]],
        shake: 0,
        phase: 'normal',
        itemSx: 1, itemSy: 1, itemAlpha: 1, itemLift: 0,
        stampProgress: 0,
        soldOut: false,
      });
    }
    shelves.push(row);
  }
  countValidate(INITIAL_BOARD);
}

// ============================================================
// LAYOUT — fit 9×8 board into the viewport (landscape primary).
// ============================================================
let board = { x: 0, y: 0, cellW: 0, cellH: 0, slotW: 0, slotH: 0 };
function layoutBoard() {
  // Pad on top/bottom for logo + CTA later
  const padX = Math.max(12, W * 0.02);
  const padTop = Math.max(40, H * 0.06);
  const padBot = Math.max(40, H * 0.06);
  const availW = W - padX * 2;
  const availH = H - padTop - padBot;
  // Each cell aspect: 3 slots horizontally, ~1.0:0.85 (slightly taller)
  // Cell aspect = (3*slotW)/(slotH). Tune slot aspect so total fits.
  // Target: cellW/cellH ≈ 1.5
  const cellAspect = 1.5;
  let cellW = availW / COLS;
  let cellH = cellW / cellAspect;
  if (cellH * ROWS > availH) {
    cellH = availH / ROWS;
    cellW = cellH * cellAspect;
  }
  const totalW = cellW * COLS;
  const totalH = cellH * ROWS;
  board.x = (W - totalW) / 2;
  board.y = padTop + (availH - totalH) / 2;
  board.cellW = cellW;
  board.cellH = cellH;
  board.slotW = cellW / SLOTS;
  board.slotH = cellH * 0.86; // item area; rest is shelf-floor below
}
function shelfRect(c, r) {
  return {
    x: board.x + c * board.cellW,
    y: board.y + r * board.cellH,
    w: board.cellW,
    h: board.cellH,
  };
}
function slotCenter(c, r, s) {
  return {
    x: board.x + c * board.cellW + (s + 0.5) * board.slotW,
    y: board.y + r * board.cellH + board.slotH * 0.5,
  };
}

// RENDER
// ============================================================
function drawBackground() {
  // Cream wall behind shelves
  ctx.fillStyle = '#efe1c2';
  ctx.fillRect(0, 0, W, H);
  // Subtle vertical gradient for depth
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, 'rgba(255,255,255,0.15)');
  g.addColorStop(1, 'rgba(0,0,0,0.06)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

function drawShelfBack(c, r) {
  const rect = shelfRect(c, r);
  // Recessed back panel — slightly lighter than wall, with a soft
  // inset shadow on top to suggest the shelf-above-and-into-it look.
  const panelInset = Math.max(2, rect.w * 0.018);
  ctx.fillStyle = '#f5e9cd';
  ctx.fillRect(rect.x + panelInset, rect.y, rect.w - panelInset * 2, rect.h);
  // Top inner shadow (the underside of the shelf above)
  const sh = ctx.createLinearGradient(0, rect.y, 0, rect.y + rect.h * 0.18);
  sh.addColorStop(0, 'rgba(80,55,30,0.32)');
  sh.addColorStop(1, 'rgba(80,55,30,0)');
  ctx.fillStyle = sh;
  ctx.fillRect(rect.x + panelInset, rect.y, rect.w - panelInset * 2, rect.h * 0.18);
  // Side dividers (vertical wood posts)
  ctx.fillStyle = '#cda36a';
  ctx.fillRect(rect.x, rect.y, panelInset, rect.h);
  ctx.fillRect(rect.x + rect.w - panelInset, rect.y, panelInset, rect.h);
}

function drawShelfFloor(c, r) {
  const rect = shelfRect(c, r);
  const floorY = rect.y + board.slotH;
  const floorH = rect.h - board.slotH;
  // Wood plank
  const g = ctx.createLinearGradient(0, floorY, 0, floorY + floorH);
  g.addColorStop(0, '#d9b277');
  g.addColorStop(0.5, '#c69757');
  g.addColorStop(1, '#a8783f');
  ctx.fillStyle = g;
  ctx.fillRect(rect.x, floorY, rect.w, floorH);
  // Top edge highlight
  ctx.fillStyle = 'rgba(255, 240, 210, 0.55)';
  ctx.fillRect(rect.x, floorY, rect.w, Math.max(1, floorH * 0.12));
  // Bottom edge dark line (drop shadow under shelf)
  ctx.fillStyle = 'rgba(60, 40, 18, 0.5)';
  ctx.fillRect(rect.x, floorY + floorH - Math.max(1, floorH * 0.08), rect.w, Math.max(1, floorH * 0.08));
}

// Render an item: shadow (always axis-aligned on the floor), then disc +
// highlight + emoji in a translated/rotated/scaled local frame so a true
// ellipse appears when sx != sy (instead of just a smaller circle).
//
//   opts.scale         uniform scale (default 1)
//   opts.scaleX/scaleY non-uniform stretch (overrides .scale per-axis)
//   opts.rotation      rotation in radians (default 0) — the (sx, sy) axes
//                      are AFTER rotation, so passing rotation=θ + sx>1 makes
//                      the item fatter along θ.
//   opts.lift          vertical offset upward (default 0)
//   opts.alpha         opacity 0–1 (default 1)
function drawItem(typeId, cx, cy, w, h, opts) {
  const t = TYPE_BY_ID[typeId];
  if (!t) return;
  opts = opts || {};
  const lift = opts.lift || 0;
  const scaleU = opts.scale != null ? opts.scale : 1;
  const sx = opts.scaleX != null ? opts.scaleX : scaleU;
  const sy = opts.scaleY != null ? opts.scaleY : scaleU;
  const rot = opts.rotation || 0;
  const alpha = opts.alpha != null ? opts.alpha : 1;
  if (alpha <= 0 || sx <= 0 || sy <= 0) return;
  const baseY = cy + h * 0.5 - lift;
  const baseDiscR = Math.min(w, h) * 0.42;
  // Anchor disc so its bottom touches baseY when sy=1, and the contact
  // point stays on baseY as sy varies (squash sits on the floor).
  const discCY = baseY - sy * h * 0.42;

  ctx.save();
  ctx.globalAlpha = alpha;

  // Drop shadow — fixed orientation, widens slightly with horizontal stretch.
  ctx.fillStyle = 'rgba(0,0,0,' + (0.22 + lift / Math.max(1,h) * 0.15) + ')';
  ctx.beginPath();
  ctx.ellipse(cx, baseY + 2 + lift * 0.05, w * 0.32 * Math.max(0.6, sx), h * 0.07, 0, 0, Math.PI * 2);
  ctx.fill();

  // Disc + highlight + emoji in rotated+scaled local frame.
  ctx.translate(cx, discCY);
  if (rot !== 0) ctx.rotate(rot);
  ctx.scale(sx, sy);

  const grad = ctx.createRadialGradient(-baseDiscR * 0.3, -baseDiscR * 0.3, baseDiscR * 0.15, 0, 0, baseDiscR);
  grad.addColorStop(0, lighten(t.bg, 0.35));
  grad.addColorStop(1, t.bg);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(0, 0, baseDiscR, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath();
  ctx.ellipse(-baseDiscR * 0.3, -baseDiscR * 0.4, baseDiscR * 0.45, baseDiscR * 0.18, -0.4, 0, Math.PI * 2);
  ctx.fill();

  const fontSize = Math.floor(Math.min(w, h) * 0.55);
  ctx.font = fontSize + 'px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(t.emoji, 0, 1);

  ctx.restore();
}

function lighten(hex, amt) {
  const c = hex.replace('#','');
  const r = parseInt(c.substr(0,2),16), g = parseInt(c.substr(2,2),16), b = parseInt(c.substr(4,2),16);
  const lr = Math.min(255, Math.round(r + (255-r) * amt));
  const lg = Math.min(255, Math.round(g + (255-g) * amt));
  const lb = Math.min(255, Math.round(b + (255-b) * amt));
  return 'rgb(' + lr + ',' + lg + ',' + lb + ')';
}

function drawBoard() {
  // Pass 1: shelf backs (recessed panel)
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      drawShelfBack(c, r);
  // Pass 2: items inside slots (with squash anim if 'matching')
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      const cell = shelves[r][c];
      const shake = cell.shake || 0;
      const matching = cell.phase === 'matching';
      for (let s = 0; s < SLOTS; s++) {
        const id = cell.items[s];
        if (id == null) continue;
        // Skip the slot we're currently dragging from (drawn under cursor)
        if (drag && drag.fromR === r && drag.fromC === c && drag.fromS === s) continue;
        const center = slotCenter(c, r, s);
        if (matching) {
          drawItem(id, center.x + shake, center.y, board.slotW, board.slotH, {
            scaleX: cell.itemSx, scaleY: cell.itemSy, alpha: cell.itemAlpha,
            lift: cell.itemLift
          });
        } else {
          drawItem(id, center.x + shake, center.y, board.slotW, board.slotH);
        }
      }
      // Pass 3: shelf floor (drawn AFTER items so the wood plank
      // visually overlaps the items' bottom — items "sit on" the shelf)
      drawShelfFloor(c, r);
      // Pass 4: SOLD OUT stamp on completed shelves (after floor so it's on top)
      if (cell.soldOut) drawSoldOutStamp(c, r);
    }
}

// === Sold out stamp ===
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}
function fillStar(ctx, cx, cy, r) {
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const a = -Math.PI / 2 + i * Math.PI / 5;
    const rr = (i & 1) ? r * 0.45 : r;
    const x = cx + Math.cos(a) * rr;
    const y = cy + Math.sin(a) * rr;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
}
// SOLD OUT shutter door: covers the FULL cell, slides down from above.
// Clipped to the cell rect so the panel never paints over neighbours.
// `stampProgress` 0→1 drives the slide; outBack overshoots slightly past 1 so
// the door slams down with a small rebound (feels like metal hitting the floor).
function drawSoldOutStamp(c, r) {
  const cell = shelves[r][c];
  if (cell.stampProgress <= 0.0001 && !cell.soldOut) return;
  const rect = shelfRect(c, r);
  const inset = Math.max(2, rect.w * 0.018);
  const stampX = rect.x + inset;
  const stampW = rect.w - inset * 2;
  const stampH = rect.h - 2;
  const offsetY = (1 - cell.stampProgress) * -rect.h;
  const stampY = rect.y + 1 + offsetY;
  const radius = Math.min(8, stampW * 0.06);

  ctx.save();
  // Mask to the cell rect — anything outside is never drawn (esp. while sliding).
  ctx.beginPath();
  ctx.rect(rect.x, rect.y, rect.w, rect.h);
  ctx.clip();

  // Bottom shadow strip — sells the "panel sitting in front of the shelf"
  ctx.fillStyle = 'rgba(0,0,0,0.30)';
  ctx.fillRect(stampX, stampY + stampH - 4, stampW, 6);

  // Red shutter body with vertical gradient
  const g = ctx.createLinearGradient(0, stampY, 0, stampY + stampH);
  g.addColorStop(0,   '#ef5048');
  g.addColorStop(0.5, '#cf3530');
  g.addColorStop(1,   '#a82420');
  ctx.fillStyle = g;
  roundRect(ctx, stampX, stampY, stampW, stampH, radius);
  ctx.fill();

  // Top trim line (where the shutter rolls down from — gives a "lip")
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.fillRect(stampX + 1, stampY, stampW - 2, 2);

  // Horizontal slat lines (suggest a roller-shutter texture)
  ctx.strokeStyle = 'rgba(0,0,0,0.10)';
  ctx.lineWidth = 1;
  const slatStep = Math.max(6, stampH * 0.10);
  for (let y = stampY + slatStep; y < stampY + stampH - 4; y += slatStep) {
    ctx.beginPath();
    ctx.moveTo(stampX + 8, y);
    ctx.lineTo(stampX + stampW - 8, y);
    ctx.stroke();
  }

  // White stamp-ring inner border
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = Math.max(2, stampH * 0.025);
  roundRect(ctx, stampX + 5, stampY + 5, stampW - 10, stampH - 10, Math.max(3, radius - 3));
  ctx.stroke();

  // Stars flanking the text
  ctx.fillStyle = '#fff';
  const starR = Math.min(stampW * 0.07, stampH * 0.22);
  fillStar(ctx, stampX + stampW * 0.18, stampY + stampH * 0.5, starR);
  fillStar(ctx, stampX + stampW * 0.82, stampY + stampH * 0.5, starR);

  // "SOLD OUT" centered
  ctx.fillStyle = '#fff';
  const fontSize = Math.floor(Math.min(stampW * 0.16, stampH * 0.42));
  ctx.font = '900 ' + fontSize + 'px system-ui,-apple-system,sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('SOLD OUT', stampX + stampW / 2, stampY + stampH / 2);

  ctx.restore();
}

function drawDragItem() {
  if (!drag) return;
  // Base size multiplier grows from 1.0 (shelf size) to 1.26 (held size)
  // via the pickup tween. Multiplied into w/h so the disc/emoji actually
  // get bigger; stretch then layers on top, area-conserving.
  const sizeMult = 1.0 + drag.pickupT * 0.26;
  const w = board.slotW * sizeMult;
  const h = board.slotH * sizeMult;
  const sx = 1 + drag.stretch;
  const sy = 1 - drag.stretch;
  drawItem(drag.typeId, drag.x, drag.y, w, h, {
    lift: 14 * sizeMult, scaleX: sx, scaleY: sy, rotation: drag.angle
  });
}

let won = false;
function drawWinOverlay() {
  if (!won) return;
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff5d8';
  ctx.font = '700 ' + Math.floor(H * 0.10) + 'px system-ui,sans-serif';
  ctx.shadowColor = 'rgba(0,0,0,0.6)';
  ctx.shadowBlur = 24;
  ctx.fillText('SHELVES SORTED!', W/2, H * 0.42);
  ctx.shadowBlur = 0;
  ctx.font = '500 ' + Math.floor(H * 0.035) + 'px system-ui,sans-serif';
  ctx.fillStyle = '#ffe4a8';
  ctx.fillText('100+ supermarket levels inside', W/2, H * 0.42 + H * 0.08);
  ctx.restore();
}

// ============================================================
// INPUT — drag & drop
// ============================================================
let drag = null; // { typeId, fromC, fromR, fromS, x, y, startX, startY }

function pointerPos(e) {
  const rect = canvas.getBoundingClientRect();
  const t = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]) || e;
  return { x: t.clientX - rect.left, y: t.clientY - rect.top };
}

// hitSlot is for PICKING UP — must hit the item area of a slot exactly.
// Returns null on shelf floor (lower part of cell) so you can't pick up
// "from nothing". Used by onPointerDown.
function hitSlot(px, py) {
  if (px < board.x || py < board.y) return null;
  const cx = px - board.x, cy = py - board.y;
  const c = Math.floor(cx / board.cellW);
  const r = Math.floor(cy / board.cellH);
  if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return null;
  const cell = shelves[r][c];
  if (cell.soldOut || cell.phase === 'matching') return null;
  const lx = cx - c * board.cellW;
  const ly = cy - r * board.cellH;
  if (ly > board.slotH) return null;
  const s = Math.min(SLOTS - 1, Math.max(0, Math.floor(lx / board.slotW)));
  return { c, r, s };
}

// hitShelf is for DROPPING — accepts a hit anywhere within the cell
// bounds (slot area OR shelf floor). Used by onPointerUp so the player
// can release the cursor anywhere over a target shelf and we'll route
// the item to the most sensible slot.
function hitShelf(px, py) {
  if (px < board.x || py < board.y) return null;
  const cx = px - board.x, cy = py - board.y;
  const c = Math.floor(cx / board.cellW);
  const r = Math.floor(cy / board.cellH);
  if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return null;
  const cell = shelves[r][c];
  if (cell.soldOut || cell.phase === 'matching') return null;
  return { c, r };
}

function onPointerDown(e) {
  e.preventDefault && e.preventDefault();
  if (!audioCtx) initAudio();
  audioResume();
  if (won) return;
  const p = pointerPos(e);
  const hit = hitSlot(p.x, p.y);
  if (!hit) return;
  const cell = shelves[hit.r][hit.c];
  const id = cell.items[hit.s];
  if (id == null) return;
  drag = {
    typeId: id,
    fromC: hit.c, fromR: hit.r, fromS: hit.s,
    x: p.x, y: p.y,
    startX: p.x, startY: p.y,
    // Velocity & visual state used by updateDragShape each frame
    prevX: p.x, prevY: p.y, prevT: performance.now(),
    vx: 0, vy: 0,                  // smoothed velocity in px/s
    stretch: 0, stretchVel: 0,     // spring on per-axis stretch (-1..+1ish)
    angle: 0,                      // current rotation (radians)
    pickupT: 0,                    // 0→1 grow tween (size mult on drag visual)
  };
  // Pickup grow: item swells from shelf size to drag size (≈1.25×) with
  // outCubic — feels like the item is being plucked up off the shelf.
  tween(drag, { pickupT: 1 }, 0.18, { ease: 'outCubic' });
  sfxPick();
  dismissTutorial();
}
function onPointerMove(e) {
  if (!drag) return;
  e.preventDefault && e.preventDefault();
  const p = pointerPos(e);
  // Smooth velocity via low-pass filter so single-frame jitter doesn't
  // throw the rotation/stretch around. dt clamped to avoid div-by-tiny.
  const now = performance.now();
  const dt = Math.max(4, now - drag.prevT) / 1000; // seconds
  const k = 0.55; // blend factor: higher = more responsive, less smooth
  const instVx = (p.x - drag.prevX) / dt;
  const instVy = (p.y - drag.prevY) / dt;
  drag.vx = drag.vx * (1 - k) + instVx * k;
  drag.vy = drag.vy * (1 - k) + instVy * k;
  drag.prevX = p.x; drag.prevY = p.y; drag.prevT = now;
  drag.x = p.x; drag.y = p.y;
}
// In-flight items moving from drop point → resolved target slot. Each
// entry is { typeId, x, y, scale, dstC, dstR, dstS } and is rendered on
// top of the board until its position+scale tween completes.
const transit = [];

// Smoke-puff particles spawned when an item lands. Platform-style: kicks
// outward sideways with a small upward arc (smoke rises a touch and fades).
// Particle count is small (≈6 per landing) and each one is a single arc;
// total cost is negligible even with several stacked landings.
const particles = [];

function spawnLandingPuff(cx, cy) {
  const count = 6;
  for (let i = 0; i < count; i++) {
    const side = (i < count / 2) ? -1 : 1;
    const speedH = 70 + Math.random() * 50;
    const speedV = 28 + Math.random() * 22;
    particles.push({
      x: cx + side * (1 + Math.random() * 3),
      y: cy,
      vx: side * speedH,
      vy: -speedV,
      r: 3 + Math.random() * 2,
      grow: 14 + Math.random() * 6,
      life: 0,
      maxLife: 0.42 + Math.random() * 0.12,
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life += dt;
    if (p.life >= p.maxLife) { particles.splice(i, 1); continue; }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= Math.exp(-dt * 4);   // air drag, slows down
    p.vy *= Math.exp(-dt * 2);   // less drag vertically (smoke keeps rising a bit)
  }
}

function drawParticles() {
  for (const p of particles) {
    const t = p.life / p.maxLife;
    const r = p.r + (p.grow - p.r) * t;
    const alpha = 0.55 * (1 - t * t);
    ctx.fillStyle = 'rgba(255, 250, 235, ' + alpha + ')';
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function onPointerUp(e) {
  if (!drag) return;
  e.preventDefault && e.preventDefault();
  const p = pointerPos(e);
  const shelfHit = hitShelf(p.x, p.y);
  const d = drag;
  drag = null;

  if (!shelfHit) {
    sfxDrop();
    return;
  }
  const dst = shelves[shelfHit.r][shelfHit.c];

  // Pick the target slot inside the destination shelf:
  //   1. If pointer is over the slot row AND that slot is empty → use it.
  //   2. Otherwise (pointer on the shelf floor, or on an occupied slot
  //      within a shelf that has empty slots) → use the first empty slot.
  //   3. If no empty slot exists in the shelf → invalid drop, shake.
  let targetSlot = -1;
  const cx = p.x - board.x, cy = p.y - board.y;
  const ly = cy - shelfHit.r * board.cellH;
  if (ly >= 0 && ly <= board.slotH) {
    const lx = cx - shelfHit.c * board.cellW;
    const s = Math.min(SLOTS - 1, Math.max(0, Math.floor(lx / board.slotW)));
    if (dst.items[s] == null) targetSlot = s;
  }
  if (targetSlot < 0) {
    for (let s = 0; s < SLOTS; s++) {
      if (dst.items[s] == null) { targetSlot = s; break; }
    }
  }

  // Drop on the same exact slot we picked from → cancel (no-op)
  if (shelfHit.c === d.fromC && shelfHit.r === d.fromR && targetSlot === d.fromS) {
    sfxDrop();
    return;
  }
  if (targetSlot < 0) {
    // Shelf is completely full — invalid
    shakeShelf(shelfHit.c, shelfHit.r);
    sfxInvalid();
    return;
  }

  // Clear source slot in DATA immediately so it doesn't double-render
  // alongside the transit visual. The destination slot stays null until
  // the fly-tween completes — visually the item travels through the air
  // from cursor to slot, shrinking from drag-size back to shelf-size.
  shelves[d.fromR][d.fromC].items[d.fromS] = null;
  const target = slotCenter(shelfHit.c, shelfHit.r, targetSlot);
  const startScale = 1 + (drag ? drag.pickupT : 1) * 0.26;
  const tr = {
    typeId: d.typeId,
    x: p.x, y: p.y,
    scale: startScale,
    dstR: shelfHit.r, dstC: shelfHit.c, dstS: targetSlot,
  };
  transit.push(tr);
  sfxDrop();
  // inOutBack: gentle pull-back at start, slight overshoot before settling
  // — gives the drop a "flicked into place" feel.
  tween(tr, { x: target.x, y: target.y, scale: 1.0 }, 0.22, { ease: 'inOutBack', onComplete: () => {
    shelves[tr.dstR][tr.dstC].items[tr.dstS] = tr.typeId;
    const idx = transit.indexOf(tr);
    if (idx >= 0) transit.splice(idx, 1);
    // Landing puff at the disc's contact point on the shelf floor.
    spawnLandingPuff(target.x, target.y + board.slotH * 0.42);
    if (isShelfMatch(tr.dstC, tr.dstR)) triggerMatch(tr.dstC, tr.dstR);
    else checkWin();
  }});
}

function drawTransit() {
  for (const tr of transit) {
    drawItem(tr.typeId, tr.x, tr.y, board.slotW * tr.scale, board.slotH * tr.scale, { lift: 8 * tr.scale });
  }
}

// Smoothly interpolate an angle toward a target along the shorter arc
// (full circle, 2π wrap).
function lerpAngle(a, b, t) {
  let d = b - a;
  while (d > Math.PI) d -= 2 * Math.PI;
  while (d < -Math.PI) d += 2 * Math.PI;
  return a + d * t;
}

// Axis-aligned angle lerp: treats angles 180° apart as the same orientation
// (because the elongated item is symmetric — a horizontal pill rotated 180°
// looks identical). Going right then going left should NOT rotate the item;
// going down then going up should NOT either. We achieve this by wrapping
// the difference into [-π/2, π/2] before scaling: the rotation always takes
// the SHORTER of the two equivalent arcs (CW or CCW around the half-circle).
function lerpAxisAngle(a, b, t) {
  let d = b - a;
  while (d > Math.PI / 2) d -= Math.PI;
  while (d < -Math.PI / 2) d += Math.PI;
  return a + d * t;
}

// Drive the dragged item's stretch + rotation each frame:
//   • Target stretch is proportional to drag speed (px/s).
//   • Stretch is integrated through an under-damped spring so it lags into
//     motion AND overshoots through 0 when motion stops — naturally producing
//     a bounce in the perpendicular axis before settling round.
//   • Rotation aligns with the velocity vector when speed is meaningful;
//     when the player slows or stops, the last orientation is held so the
//     bounce happens along the same axis the drag was using.
//   • Velocity decays each frame so target stretch returns to 0 a beat after
//     the player stops moving — this is what triggers the bounce.
function updateDragShape(dt) {
  if (!drag) return;
  const speed = Math.hypot(drag.vx, drag.vy);
  // Threshold target to 0 when nearly stopped — gives the spring a clean
  // step-down to chase, which is what produces the satisfying bounce
  // through 0 in the perpendicular direction.
  const targetStretch = speed > 80 ? Math.min(0.30, speed * 0.0005) : 0;
  // Spring physics — under-damped (damping ratio ~0.42) so it overshoots
  // through 0 once and settles, like a soft body coming to rest.
  const stiffness = 320, damping = 15;
  const accel = (targetStretch - drag.stretch) * stiffness - drag.stretchVel * damping;
  drag.stretchVel += accel * dt;
  drag.stretch += drag.stretchVel * dt;
  // Aggressive velocity decay (half-life ~45 ms) so the player feels the
  // bounce start within a few frames after they stop or release.
  const decay = Math.exp(-dt * 16);
  drag.vx *= decay;
  drag.vy *= decay;
  // Rotation tracks velocity direction, but on the HALF-circle: opposite
  // velocities (right↔left, up↔down) map to the same axis orientation, so
  // reversing direction along an axis does NOT rotate the item. Frozen
  // during stop/bounce so it doesn't snap to (0,0)'s default angle.
  if (speed > 80) {
    const target = Math.atan2(drag.vy, drag.vx);
    drag.angle = lerpAxisAngle(drag.angle, target, Math.min(1, dt * 14));
  }
  // Keep stored angle bounded in [-π/2, π/2) so it doesn't drift unbounded
  // over many lerps. The visual is identical because of the half-circle
  // symmetry of the elongated shape.
  while (drag.angle > Math.PI / 2) drag.angle -= Math.PI;
  while (drag.angle < -Math.PI / 2) drag.angle += Math.PI;
}

function shakeShelf(c, r) {
  const cell = shelves[r][c];
  killTweensOf(cell, ['shake']);
  cell.shake = 8;
  tween(cell, { shake: -8 }, 0.05, { ease: 'inOutSine',
    onComplete: () => tween(cell, { shake: 6 }, 0.06, { ease: 'inOutSine',
      onComplete: () => tween(cell, { shake: 0 }, 0.08, { ease: 'outSine' })
    })
  });
}

canvas.addEventListener('mousedown', onPointerDown);
canvas.addEventListener('mousemove', onPointerMove);
canvas.addEventListener('mouseup', onPointerUp);
canvas.addEventListener('mouseleave', onPointerUp);
canvas.addEventListener('touchstart', onPointerDown, { passive: false });
canvas.addEventListener('touchmove', onPointerMove, { passive: false });
canvas.addEventListener('touchend', onPointerUp, { passive: false });
canvas.addEventListener('touchcancel', onPointerUp, { passive: false });

// ============================================================
// MATCH + WIN
// ============================================================
function isShelfMatch(c, r) {
  const it = shelves[r][c].items;
  if (it[0] == null || it[1] == null || it[2] == null) return false;
  return it[0] === it[1] && it[1] === it[2];
}

// Match → squash-stretch on items → SOLD OUT stamp animates in. The
// rest of the board stays interactive throughout (we don't gate input
// on any anim flag — `won` is the only gate, and that only flips when
// every shelf is sold out).
function triggerMatch(c, r) {
  const cell = shelves[r][c];
  cell.phase = 'matching';
  cell.itemSx = 1; cell.itemSy = 1; cell.itemAlpha = 1; cell.itemLift = 0;
  killTweensOf(cell, ['itemSx', 'itemSy', 'itemAlpha', 'itemLift', 'stampProgress']);
  sfxMatch();
  // Subtle bouncy squash-stretch arc, area roughly preserved:
  //   1. Anticipation squash (slightly wider, shorter)
  //   2. Jump up (slightly taller, thinner) + lift Y
  //   3. Landing squash (impact)
  //   4. Recover to neutral + fade out — STAMP slides down in parallel
  tween(cell, { itemSx: 1.10, itemSy: 0.88 }, 0.08, { ease: 'outQuad', onComplete: () => {
    tween(cell, { itemSx: 0.92, itemSy: 1.10, itemLift: 20 }, 0.16, { ease: 'outQuad', onComplete: () => {
      tween(cell, { itemSx: 1.12, itemSy: 0.86, itemLift: 0 }, 0.10, { ease: 'inQuad', onComplete: () => {
        // Mark the cell as sold out NOW so input is blocked while the
        // shutter comes down; items keep rendering with itemAlpha until
        // the fade tween finishes (then we null them and flip phase).
        cell.soldOut = true;
        cell.stampProgress = 0;
        // Stamp slide-down (clipped) — runs in parallel with item fade-out.
        tween(cell, { stampProgress: 1.0 }, 0.36, { ease: 'outBack', onComplete: checkWin });
        // Items recover to neutral scale + fade to 0 alpha — appears as
        // "settling, then dissolving" beneath the descending shutter.
        tween(cell, { itemSx: 1.0, itemSy: 1.0, itemAlpha: 0 }, 0.22, { ease: 'outQuad', onComplete: () => {
          cell.items = [null, null, null];
          cell.phase = 'soldOut';
        }});
      }});
    }});
  }});
}

// Win = no shelf has any non-null item left. This handles the "donor"
// cells that started with empty slots and end up with all 3 slots null
// (never matched, never soldOut, but legitimately empty). The 6 starting
// empties + 70 matches × 3 = 216 slots → exactly 2 cells stay fully empty
// at the end, but they should NOT block the win.
function checkWin() {
  for (const row of shelves)
    for (const cell of row)
      for (const it of cell.items)
        if (it != null) return;
  if (won) return;
  won = true;
  setTimeout(sfxWin, 200);
}

// ============================================================
// TUTORIAL — looping demo of the drag-to-match gesture.
//
// Looks for a real match opportunity in the initial level (a shelf with
// [X, X, null] plus an X elsewhere) and replays the gesture every cycle:
// approach → press → drag → release → idle pause → loop. The destination
// already has 2 of the matching type visible, so when the ghost arrives
// the player visually understands "3rd one would complete it".
//
// Dismissed permanently on the player's first successful pickup — the
// hand fades out and never returns.
// ============================================================
const tutorial = {
  dismissed: false,
  phase: 'approach',  // 'approach' | 'press' | 'drag' | 'release' | 'idle'
  t: 0,
  // Pre-chosen demo move from the hand-mapped initial level:
  // r2c2 = [38, 26, 26] → pick the pear at slot 1
  // r4c6 = [null, 26, 26] → drop into slot 0 to complete the trio
  src: { r: 2, c: 2, s: 1 },
  dst: { r: 4, c: 6, s: 0 },
  typeId: 26,
  hX: 0, hY: 0, ghostAlpha: 0, pressDown: 0,
  // Phase durations (seconds)
  IDLE_DUR: 0.50, APPROACH_DUR: 0.50, PRESS_DUR: 0.20,
  DRAG_DUR: 0.85, RELEASE_DUR: 0.20,
};

function lerp(a, b, t) { return a + (b - a) * t; }

function updateTutorial(dt) {
  if (tutorial.dismissed || won) return;
  // If the layout isn't ready yet (board not laid out), skip.
  if (!board || !board.cellW) return;
  tutorial.t += dt;
  const sP = slotCenter(tutorial.src.c, tutorial.src.r, tutorial.src.s);
  const dP = slotCenter(tutorial.dst.c, tutorial.dst.r, tutorial.dst.s);

  if (tutorial.phase === 'approach') {
    const k = Math.min(1, tutorial.t / tutorial.APPROACH_DUR);
    const e = EASE.outCubic(k);
    tutorial.hX = sP.x;
    tutorial.hY = lerp(sP.y - 80, sP.y, e);
    tutorial.ghostAlpha = 0;
    tutorial.pressDown = 0;
    if (k >= 1) { tutorial.phase = 'press'; tutorial.t = 0; }
  } else if (tutorial.phase === 'press') {
    const k = Math.min(1, tutorial.t / tutorial.PRESS_DUR);
    tutorial.hX = sP.x; tutorial.hY = sP.y;
    tutorial.pressDown = EASE.outQuad(k);
    tutorial.ghostAlpha = k * 0.5;
    if (k >= 1) { tutorial.phase = 'drag'; tutorial.t = 0; }
  } else if (tutorial.phase === 'drag') {
    const k = Math.min(1, tutorial.t / tutorial.DRAG_DUR);
    const e = EASE.inOutCubic(k);
    tutorial.hX = lerp(sP.x, dP.x, e);
    tutorial.hY = lerp(sP.y, dP.y, e);
    tutorial.pressDown = 1;
    tutorial.ghostAlpha = 0.5;
    if (k >= 1) { tutorial.phase = 'release'; tutorial.t = 0; }
  } else if (tutorial.phase === 'release') {
    const k = Math.min(1, tutorial.t / tutorial.RELEASE_DUR);
    tutorial.hX = dP.x; tutorial.hY = dP.y;
    tutorial.pressDown = 1 - EASE.outQuad(k);
    tutorial.ghostAlpha = 0.5 * (1 - k);
    if (k >= 1) { tutorial.phase = 'idle'; tutorial.t = 0; }
  } else if (tutorial.phase === 'idle') {
    tutorial.ghostAlpha = 0;
    tutorial.pressDown = 0;
    if (tutorial.t >= tutorial.IDLE_DUR) { tutorial.phase = 'approach'; tutorial.t = 0; }
  }
}

function dismissTutorial() {
  if (tutorial.dismissed) return;
  tutorial.dismissed = true;
}

function drawTutorialHand() {
  if (tutorial.dismissed) return;
  if (!handImgReady) return;
  if (won) return;
  if (tutorial.phase === 'idle') return;

  const hX = tutorial.hX, hY = tutorial.hY;

  // Ghost item — 50% alpha pear following the hand. Drawn first so the
  // hand sits ON TOP of it (more like the player's hand grabbing the item).
  if (tutorial.ghostAlpha > 0.01) {
    drawItem(tutorial.typeId, hX, hY, board.slotW, board.slotH, {
      alpha: tutorial.ghostAlpha, lift: 10, scale: 1.10,
    });
  }

  // Hand sprite — fingertip pivots at (hX, hY). Scaled down vertically
  // when "pressing" so the gesture reads as a tap-and-hold.
  const baseSize = Math.max(60, Math.min(120, board.slotW * 0.95));
  const w = baseSize, h = baseSize; // source is 128×128 square
  const fingerOffX = w * 0.40; // fingertip ~40% from left of image
  const fingerOffY = h * 0.05; // fingertip ~5% from top
  ctx.save();
  ctx.translate(hX, hY);
  ctx.scale(1, 1 - 0.10 * tutorial.pressDown);
  ctx.translate(-hX, -hY);
  ctx.drawImage(handImg, hX - fingerOffX, hY - fingerOffY, w, h);
  ctx.restore();
}

// ============================================================
// MAIN LOOP
// ============================================================
let lastTime = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - lastTime) / 1000);
  lastTime = now;
  totalTime += dt;
  updateTweens(dt);
  updateDragShape(dt);
  updateParticles(dt);
  updateTutorial(dt);
  drawBackground();
  drawBoard();
  drawTransit();
  drawParticles();
  drawTutorialHand();
  drawDragItem();
  drawWinOverlay();
  requestAnimationFrame(loop);
}

// ============================================================
// BOOT
// ============================================================
buildLevel();
resize();
requestAnimationFrame(loop);

// === Debug hook (only when ?debug in URL) ===
if (location.search.indexOf('debug') >= 0) {
  window.__tileSortDebug = {
    shelves: () => shelves,
    triggerMatch: (c, r) => triggerMatch(c, r),
    setShelf: (r, c, items) => { shelves[r][c].items = items.slice(); },
    cellState: (r, c) => {
      const x = shelves[r][c];
      return { items: x.items.slice(), phase: x.phase, soldOut: x.soldOut,
        itemSx: x.itemSx, itemSy: x.itemSy, itemAlpha: x.itemAlpha,
        itemLift: x.itemLift, stampProgress: x.stampProgress };
    },
    transit: () => transit.slice(),
    drag: () => drag ? {
      x: drag.x, y: drag.y,
      vx: drag.vx, vy: drag.vy,
      stretch: drag.stretch, stretchVel: drag.stretchVel,
      angle: drag.angle, pickupT: drag.pickupT,
    } : null,
    particles: () => particles.length,
    tutorial: () => ({
      dismissed: tutorial.dismissed, phase: tutorial.phase, t: tutorial.t,
      hX: tutorial.hX, hY: tutorial.hY,
      ghostAlpha: tutorial.ghostAlpha, pressDown: tutorial.pressDown,
      handImgReady,
    }),
    tweens: () => tweens.map(t => ({
      objKind: t.obj === shelves[t.obj.r]?.[t.obj.c] ? 'cell' : 'other',
      to: Object.keys(t.to).join(','),
      dur: t.dur, delay: t.delay, elapsed: t.elapsed, alive: t.alive,
    })),
    tweensRaw: () => tweens.length,
    advance: (dt) => { updateTweens(dt); updateDragShape(dt); updateTutorial(dt); },
    redraw: () => {
      drawBackground(); drawBoard(); drawDragItem(); drawWinOverlay();
    },
    won: () => won,
  };
}

})();
</script>
