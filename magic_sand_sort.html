  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath();
  ctx.ellipse(-rx * 0.25, y - ry * 0.2, rx * 0.45, ry * 0.3, 0, 0, Math.PI*2);
  ctx.fill();
}

// Themed ambient puffs inside a liquid run.
//
// REPLACES the previous "rising bubbles" effect (which used a deterministic
// time-based y-offset to fake particles flowing upward). For magic sand
// that didn't make sense — a static pile of sand shouldn't have
// particles continuously rising through it. The new behaviour treats
// each particle as a real short-lived spawn with these properties:
//
//   • lifetime:  2 s (fixed)
//   • position:  random within the run's (x, y) bounds — REROLLED every cycle
//   • rotation:  random −60° … +60°                    — REROLLED every cycle
//   • size:      1.6× the previous "rising bubble" radius (4× then ÷2.5)
//   • alpha:     piecewise-linear curve through 4 control points —
//                  t=0.00 → 0.00     (invisible at birth)
//                  t=0.25 → 0.75     (rapid brighten / "pop in")
//                  t=0.75 → 0.10     (slow fade to a faint plateau)
//                  t=1.00 → 0.00     (final dim out)
//                That gives each puff a quick appear, a long lingering
//                tail, then a clean disappearance.
//
// Particles never move while alive — they fade in, hold briefly, fade
// out, then respawn with a fresh random position/rotation. Cycle
// duration = lifetime + a small variable gap, staggered per particle so
// births aren't synchronised. No per-particle state is stored in memory:
// everything is derived from a deterministic seed + the global time.
function drawSandAmbientWorld(top, bot, w, juice, seed, time) {
  const layerH = bot - top;
  if (layerH < 6 || w < 6) return;
  const elem = juice.element || 'wisp';
  const cfg  = ELEMENT_CFG[elem] || ELEMENT_CFG.wisp;
  const area = layerH * w;
  // Particles are 1.6× larger (≈ 2.6× area), density tuned so the
  // overall visual mass stays comparable to the original rising-bubble
  // version while letting each puff read clearly.
  const n = Math.max(1, Math.floor(area / (cfg.areaPerParticle * 2.5)));
  const U32 = 4294967295;
  const LIFETIME = 2.0;   // fixed lifetime in seconds

  for (let i = 0; i < n; i++) {
    // Stable per-particle constants — same across all cycles of this
    // particle so its cycle/offset are consistent.
    let s = ((seed + 1) * 2654435761 ^ (i + 1) * 40503) | 0;
    if (s === 0) s = 1;

    s ^= s << 13; s ^= s >>> 17; s ^= s << 5;
    const cycleDur = LIFETIME + 0.05 + ((s >>> 0) / U32) * 0.15;  // small variable dead-gap

    s ^= s << 13; s ^= s >>> 17; s ^= s << 5;
    const startOffset = ((s >>> 0) / U32) * cycleDur;

    // Where are we in this particle's lifecycle right now?
    const at = time + startOffset;
    const cycleIdx = Math.floor(at / cycleDur);
    const localT = at - cycleIdx * cycleDur;

    if (localT > LIFETIME) continue;   // currently in dead-gap, skip render

    // Per-cycle randomness — position/rotation REROLL every birth so the
    // particles don't always appear at the same spots. Mixing cycleIdx
    // into the seed varies them across cycles.
    let cs = ((seed + 1) * 2654435761 ^ ((i + 1) * 40503) ^ ((cycleIdx + 1) * 0x9e3779b1)) | 0;
    if (cs === 0) cs = 1;

    cs ^= cs << 13; cs ^= cs >>> 17; cs ^= cs << 5;
    const px = -w * 0.40 + ((cs >>> 0) / U32) * w * 0.80;       // x in run width

    cs ^= cs << 13; cs ^= cs >>> 17; cs ^= cs << 5;
    const py = top + ((cs >>> 0) / U32) * layerH;                // y in run height

    cs ^= cs << 13; cs ^= cs >>> 17; cs ^= cs << 5;
    // Rotation: −60° to +60° → −π/3 to +π/3 radians
    const rot = (-60 + ((cs >>> 0) / U32) * 120) * Math.PI / 180;

    cs ^= cs << 13; cs ^= cs >>> 17; cs ^= cs << 5;
    // 1.6× the original "rising bubble" radii (4× then ÷2.5 per the
    // user's tuning — bigger than original but smaller than the first 4×
    // attempt that overflowed thin runs)
    const r = (cfg.rMin + (((cs >>> 0) % 6)) * cfg.rStep) * 1.6;

    // Alpha curve: piecewise-linear through 4 control points
    //   (0.00, 0.00) → (0.25, 0.75) → (0.75, 0.10) → (1.00, 0.00)
    const lifeT = localT / LIFETIME;
    let alpha;
    if (lifeT < 0.25)      alpha = lifeT * 3.0;                       // 0    → 0.75 over [0, 0.25]
    else if (lifeT < 0.75) alpha = 0.75 - (lifeT - 0.25) * 1.30;      // 0.75 → 0.10 over [0.25, 0.75]
    else                   alpha = 0.10 - (lifeT - 0.75) * 0.40;      // 0.10 → 0    over [0.75, 1.00]
    if (alpha <= 0.005) continue;

    drawSandParticle(px, py, r, juice, alpha, elem, time, rot);
  }
}

// Per-element configuration — controls density, speed, size and sway.
// areaPerParticle: lower = denser. r*: particle radius range. speed*:
// upward rise speed (px/s). sway*: horizontal oscillation parameters.
const ELEMENT_CFG = {
  ember:     { areaPerParticle: 900,  speedMin: 18, speedMax: 36, rMin: 1.0, rStep: 0.4, swaySpeed: 1.6, swayScale: 0.7, swayMax: 1.8 },
  flame:     { areaPerParticle: 1100, speedMin: 22, speedMax: 42, rMin: 1.6, rStep: 0.5, swaySpeed: 2.0, swayScale: 0.5, swayMax: 1.2 },
  leaf:      { areaPerParticle: 1500, speedMin: 8,  speedMax: 18, rMin: 1.4, rStep: 0.5, swaySpeed: 1.0, swayScale: 1.4, swayMax: 3.5 },
  sparkle:   { areaPerParticle: 700,  speedMin: 6,  speedMax: 16, rMin: 0.9, rStep: 0.4, swaySpeed: 1.4, swayScale: 0.6, swayMax: 1.6 },
  swirl:     { areaPerParticle: 1300, speedMin: 12, speedMax: 22, rMin: 1.6, rStep: 0.5, swaySpeed: 1.2, swayScale: 0.8, swayMax: 2.0 },
  snowflake: { areaPerParticle: 1400, speedMin: 8,  speedMax: 16, rMin: 1.4, rStep: 0.5, swaySpeed: 1.0, swayScale: 1.0, swayMax: 2.5 },
  wisp:      { areaPerParticle: 1200, speedMin: 14, speedMax: 26, rMin: 1.4, rStep: 0.5, swaySpeed: 1.3, swayScale: 0.9, swayMax: 2.2 }
};

// Per-element shape dispatcher. Every shape now accepts `rot` (random
// per-particle rotation in radians, set by the ambient spawner). Shapes
// with internal symmetry (ember = circle) ignore it; asymmetric shapes
// (flame, leaf, wisp, etc.) apply it as a translate+rotate.
function drawSandParticle(x, y, r, juice, alpha, type, time, rot) {
  switch (type) {
    case 'ember':     drawEmber(x, y, r, juice, alpha, rot);          break;
    case 'flame':     drawFlame(x, y, r, juice, alpha, time, rot);    break;
    case 'leaf':      drawLeaf(x, y, r, juice, alpha, rot);            break;
    case 'sparkle':   drawSparkle(x, y, r, juice, alpha, time, rot);  break;
    case 'swirl':     drawSwirl(x, y, r, juice, alpha, time, rot);    break;
    case 'snowflake': drawSnowflake(x, y, r, juice, alpha, rot);       break;
    case 'wisp':      drawWisp(x, y, r, juice, alpha, rot);            break;
  }
}

// EMBER — bright orange/yellow glowing dot with soft halo (radial — rot is
// effectively a no-op but accepted for the uniform interface).
function drawEmber(x, y, r, juice, alpha, rot) {
  ctx.globalAlpha = alpha * 0.65;
  const g = ctx.createRadialGradient(x, y, r * 0.1, x, y, r * 1.6);
  g.addColorStop(0,   '#fff2c4');
  g.addColorStop(0.4, juice.top);
  g.addColorStop(1,   'rgba(255,160,40,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(x, y, r * 1.6, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#fffce4';
  ctx.beginPath();
  ctx.arc(x, y, r * 0.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

// FLAME — painterly fire texture, modelled after a yellow/orange/red
// wavy reference image. Built up in 6 layers:
//
//   1. Outer halo glow             — soft radial, fades to transparent
//   2. Vertical streaks            — faint brushstrokes (motion-blur feel)
//   3. Main flame body             — wavy bezier silhouette w/ vertical
//                                    yellow→orange→red gradient
//   4. Inner brighter wisp         — smaller wave inside the body, hotter
//   5. Hot yellow core             — small ellipse near apex
//   6. Scattered sparks            — 12 deterministic dots around the
//                                    flame in 3 colour tiers
//
// All randomness is seeded from (x, y, rot) so a given flame particle
// keeps the same speckle/streak pattern through its full lifetime
// (2 s) — twinkling per frame would look broken at this scale.
function drawFlame(x, y, r, juice, alpha, time, rot) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);

  const flameH = r * 2.5;            // visible flame "tip-to-base"
  const flameW = r * 1.0;
  const t = time;
  const wave1 = Math.sin(t * 4 + rot)       * flameW * 0.12;
  const wave2 = Math.sin(t * 5.5 + rot * 1.5) * flameW * 0.15;

  // Stable per-particle PRNG seed (positions of streaks + sparks)
  let seed = ((Math.floor(x * 91) ^ Math.floor(y * 137) ^ Math.floor(rot * 530)) * 2654435761) | 0;
  if (seed === 0) seed = 1;
  const U32 = 4294967295;

  // ===== LAYER 1 — Outer halo (soft warm glow) =====
  ctx.globalAlpha = alpha * 0.42;
  const haloG = ctx.createRadialGradient(0, -flameH * 0.1, flameH * 0.05,
                                          0, -flameH * 0.1, flameH * 1.2);
  haloG.addColorStop(0,   'rgba(255,210, 90,0.55)');
  haloG.addColorStop(0.5, 'rgba(255,110, 30,0.30)');
  haloG.addColorStop(1,   'rgba(160, 30, 15,0)');
  ctx.fillStyle = haloG;
  ctx.beginPath();
  ctx.ellipse(0, -flameH * 0.1, flameW * 1.7, flameH * 1.2, 0, 0, Math.PI * 2);
  ctx.fill();

  // ===== LAYER 2 — Vertical streaks (faint painterly brushstrokes) =====
  ctx.globalAlpha = alpha * 0.30;
  ctx.strokeStyle = '#ffa840';
  ctx.lineWidth = Math.max(0.5, r * 0.06);
  ctx.lineCap = 'round';
  for (let i = 0; i < 8; i++) {
    seed ^= seed << 13; seed ^= seed >>> 17; seed ^= seed << 5;
    const stX = (((seed >>> 0) / U32) - 0.5) * flameW * 2.4;
    seed ^= seed << 13; seed ^= seed >>> 17; seed ^= seed << 5;
    const stTop = (((seed >>> 0) / U32) - 0.4) * flameH * 1.3;
    seed ^= seed << 13; seed ^= seed >>> 17; seed ^= seed << 5;
    const stLen = flameH * (0.35 + ((seed >>> 0) / U32) * 0.55);
    ctx.beginPath();
    ctx.moveTo(stX, stTop);
    ctx.lineTo(stX, stTop + stLen);
    ctx.stroke();
  }

  // ===== LAYER 3 — Main flame body (wavy silhouette, yellow→orange→red) =====
  ctx.globalAlpha = alpha * 0.78;
  ctx.beginPath();
  ctx.moveTo(0, -flameH);
  // Right side wave down to bottom-right
  ctx.bezierCurveTo(
    flameW * 0.50 + wave1, -flameH * 0.55,
    flameW * 0.95,         -flameH * 0.10,
    flameW * 0.65,          flameH * 0.30
  );
  // Bottom rounded
  ctx.bezierCurveTo(
    flameW * 0.35,          flameH * 0.45,
    -flameW * 0.35,         flameH * 0.45,
    -flameW * 0.65,         flameH * 0.30
  );
  // Left side mirror back to top
  ctx.bezierCurveTo(
    -flameW * 0.95,         -flameH * 0.10,
    -flameW * 0.50 + wave1, -flameH * 0.55,
    0, -flameH
  );
  ctx.closePath();
  const bodyG = ctx.createLinearGradient(0, -flameH, 0, flameH * 0.3);
  bodyG.addColorStop(0,    '#fff48a');   // yellow tip
  bodyG.addColorStop(0.20, '#ffd05a');   // gold
  bodyG.addColorStop(0.45, '#ff8020');   // orange body
  bodyG.addColorStop(0.75, '#e84028');   // red mid-base
  bodyG.addColorStop(1,    '#9c2410');   // deep red base
  ctx.fillStyle = bodyG;
  ctx.fill();

  // ===== LAYER 4 — Inner brighter wisp (offset by a 2nd wave phase) =====
  ctx.globalAlpha = alpha * 0.85;
  ctx.beginPath();
  ctx.moveTo(wave2 * 0.5, -flameH * 0.85);
  ctx.bezierCurveTo(
    flameW * 0.30 + wave2, -flameH * 0.50,
    flameW * 0.55,         -flameH * 0.05,
    flameW * 0.40,          flameH * 0.15
  );
  ctx.bezierCurveTo(
    flameW * 0.15,          flameH * 0.30,
    -flameW * 0.15,         flameH * 0.30,
    -flameW * 0.40,         flameH * 0.15
  );
  ctx.bezierCurveTo(
    -flameW * 0.55,         -flameH * 0.05,
    -flameW * 0.30 + wave2, -flameH * 0.50,
    wave2 * 0.5,            -flameH * 0.85
  );
  ctx.closePath();
  const innerG = ctx.createLinearGradient(0, -flameH * 0.85, 0, flameH * 0.2);
  innerG.addColorStop(0,    '#fffce0');
  innerG.addColorStop(0.30, '#ffe890');
  innerG.addColorStop(0.60, '#ffb045');
  innerG.addColorStop(1,    '#ff6028');
  ctx.fillStyle = innerG;
  ctx.fill();

  // ===== LAYER 5 — Hot core (bright ellipse near the apex) =====
  ctx.globalAlpha = alpha * 0.95;
  ctx.fillStyle = '#fffce0';
  ctx.beginPath();
  ctx.ellipse(wave2 * 0.5, -flameH * 0.40, flameW * 0.20, flameH * 0.28, 0, 0, Math.PI * 2);
  ctx.fill();

  // ===== LAYER 6 — Scattered sparks =====
  // 12 deterministic dots in 3 vertical colour tiers (yellow / orange /
  // red), positioned in a slightly wider area than the flame body so
  // they read as embers flying off the flame.
  for (let i = 0; i < 12; i++) {
    seed ^= seed << 13; seed ^= seed >>> 17; seed ^= seed << 5;
    const sU = (seed >>> 0) / U32;
    seed ^= seed << 13; seed ^= seed >>> 17; seed ^= seed << 5;
    const sV = (seed >>> 0) / U32;
    seed ^= seed << 13; seed ^= seed >>> 17; seed ^= seed << 5;
    const sR = (seed >>> 0) / U32;

    const dotX = (sU - 0.5) * flameW * 3.0;
    const dotY = (sV - 0.55) * flameH * 2.2;
    const dotR = 0.4 + sR * 0.9;

    let col;
    if (dotY < -flameH * 0.25)      col = '#fff48a';   // bright yellow (top tier)
    else if (dotY < flameH * 0.05)  col = '#ffaa30';   // orange (mid tier)
    else                             col = '#e8442c';   // red (bottom tier)

    ctx.fillStyle = col;
    ctx.globalAlpha = alpha * (0.45 + sR * 0.5);
    ctx.beginPath();
    ctx.arc(dotX, dotY, dotR, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
  ctx.globalAlpha = 1;
}

// LEAF — pointed oval with midrib line. Rotated by `rot`.
function drawLeaf(x, y, r, juice, alpha, rot) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.globalAlpha = alpha * 0.85;
  ctx.fillStyle = juice.top;
  ctx.beginPath();
  ctx.moveTo(0, -r * 1.2);
  ctx.quadraticCurveTo(r * 1.0, -r * 0.2, 0, r * 1.2);
  ctx.quadraticCurveTo(-r * 1.0, -r * 0.2, 0, -r * 1.2);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = alpha * 0.6;
  ctx.strokeStyle = juice.bot;
  // Slightly thicker midrib so it stays visible at the larger 4× scale
  ctx.lineWidth = Math.max(0.7, r * 0.06);
  ctx.beginPath();
  ctx.moveTo(0, -r * 1.2);
  ctx.lineTo(0, r * 1.2);
  ctx.stroke();
  ctx.restore();
  ctx.globalAlpha = 1;
}

// SPARKLE — 4-point cross + diagonal smaller cross, bright center.
// Rotated by `rot`. Twinkle pulse still applied (within brief lifetime
// it produces a few quick brightness oscillations).
function drawSparkle(x, y, r, juice, alpha, time, rot) {
  const pulse = 0.7 + 0.3 * Math.sin(time * 4 + x * 0.4 + y * 0.2);
  const a = alpha * pulse;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.globalAlpha = a * 0.85;
  ctx.strokeStyle = '#ffffff';
  // Stroke thickness scales with radius so it stays readable at 4× size
  ctx.lineWidth = Math.max(0.9, r * 0.10);
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(0, -r * 1.5); ctx.lineTo(0, r * 1.5);
  ctx.moveTo(-r * 1.5, 0); ctx.lineTo(r * 1.5, 0);
  ctx.stroke();
  ctx.globalAlpha = a * 0.5;
  ctx.beginPath();
  ctx.moveTo(-r * 0.7, -r * 0.7); ctx.lineTo(r * 0.7, r * 0.7);
  ctx.moveTo(-r * 0.7, r * 0.7);  ctx.lineTo(r * 0.7, -r * 0.7);
  ctx.stroke();
  ctx.globalAlpha = a;
  ctx.fillStyle = '#fffce0';
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.45, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  ctx.globalAlpha = 1;
}

// SWIRL — 4-pointed glyph + radial glow. Rotation = static rot + slow
// time-based spin (the spin amounts to ~0.3 rad over a 0.5 s lifetime —
// subtle but adds magical motion to each puff).
function drawSwirl(x, y, r, juice, alpha, time, rot) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot + time * 0.6);
  ctx.globalAlpha = alpha * 0.8;

  const g = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 1.4);
  g.addColorStop(0,   '#ffffff');
  g.addColorStop(0.4, juice.top);
  g.addColorStop(1,   'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(0, 0, r * 1.4, 0, Math.PI * 2);
  ctx.fill();

  ctx.globalAlpha = alpha * 0.95;
  ctx.fillStyle = '#fff8ff';
  ctx.beginPath();
  for (let k = 0; k < 4; k++) {
    const a0 = k * Math.PI / 2;
    const a1 = a0 + Math.PI / 4;
    ctx.lineTo(Math.cos(a0) * r * 1.3, Math.sin(a0) * r * 1.3);
    ctx.lineTo(Math.cos(a1) * r * 0.3, Math.sin(a1) * r * 0.3);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
  ctx.globalAlpha = 1;
}

// SNOWFLAKE — 6-point ice crystal. Rotated by `rot`.
function drawSnowflake(x, y, r, juice, alpha, rot) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.globalAlpha = alpha * 0.85;
  ctx.strokeStyle = '#e8f4ff';
  // Stroke thickness scales with radius so the crystal stays readable at 4× size
  ctx.lineWidth = Math.max(0.9, r * 0.08);
  ctx.lineCap = 'round';
  for (let k = 0; k < 6; k++) {
    ctx.save();
    ctx.rotate(k * Math.PI / 3);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, -r * 1.4);
    ctx.moveTo(0, -r * 0.85);
    ctx.lineTo(-r * 0.35, -r * 1.15);
    ctx.moveTo(0, -r * 0.85);
    ctx.lineTo( r * 0.35, -r * 1.15);
    ctx.stroke();
    ctx.restore();
  }
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.35, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  ctx.globalAlpha = 1;
}

// WISP — vertical elongated smoke puff. Rotated by `rot` (sideways smoke
// reads naturally — like a draft).
function drawWisp(x, y, r, juice, alpha, rot) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.globalAlpha = alpha * 0.6;
  const g = ctx.createRadialGradient(0, r * 0.5, 0, 0, 0, r * 1.8);
  g.addColorStop(0,   juice.top);
  g.addColorStop(0.6, juice.mid);
  g.addColorStop(1,   'rgba(60,30,120,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.ellipse(0, 0, r * 0.95, r * 1.6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = alpha * 0.7;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.ellipse(-r * 0.18, -r * 0.4, r * 0.18, r * 0.32, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  ctx.globalAlpha = 1;
}

// ============================================================
// RENDER: OBJECTIVE LABEL (chalkboard-style tip, like the reference)
// ============================================================
function drawObjectiveLabel(b) {
  // Pulsing pink glow around the tube (attention cue — this is the goal!)
  const pulse = 0.4 + 0.2 * Math.sin(totalTime * 2.2);
  ctx.save();
  ctx.globalAlpha = pulse;
  ctx.strokeStyle = JUICE[GOAL_COLOR].top;
  ctx.lineWidth = 3;
  ctx.shadowColor = JUICE[GOAL_COLOR].mid;
  ctx.shadowBlur = 16;
  ctx.save();
  ctx.translate(b.x, b.y + b.lift);
  glassBodyPath(b.w + 4, b.h + 4, true);  // objective is always the tall flask
  ctx.stroke();
  ctx.restore();
  ctx.restore();

  // Magic-sand badge: small wooden tag on a string with a crescent-moon +
  // sparkle glyph in the goal colour (matches the hero art's tag).
  const size = Math.min(b.w * 0.7, 44);
  const cx = b.x;
  const cy = b.y + b.lift - b.h * 0.6;

  // Hanging string (a short line above the tag)
  ctx.save();
  ctx.strokeStyle = '#7a5a30';
  ctx.lineWidth = 1.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx - size * 0.18, cy - size * 0.55);
  ctx.lineTo(cx,                cy - size * 0.42);
  ctx.lineTo(cx + size * 0.18, cy - size * 0.55);
  ctx.stroke();
  ctx.restore();

  // Tag body — rounded square, wood gradient, tipped slightly
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(0.05);
  ctx.shadowColor = 'rgba(0,0,0,0.55)';
  ctx.shadowBlur = 6;
  ctx.shadowOffsetY = 2;
  const tagW = size * 0.95;
  const tagH = size * 1.05;
  const tg = ctx.createLinearGradient(0, -tagH / 2, 0, tagH / 2);
  tg.addColorStop(0, '#c08a4a');
  tg.addColorStop(0.5, '#9a6a30');
  tg.addColorStop(1, '#6a4418');
  ctx.fillStyle = tg;
  roundRectPath(-tagW / 2, -tagH / 2, tagW, tagH, 5);
  ctx.fill();
  ctx.shadowColor = 'transparent';
  ctx.strokeStyle = '#3c2208';
  ctx.lineWidth = 1.4;
  ctx.stroke();
  // Tag string hole
  ctx.fillStyle = '#1f1208';
  ctx.beginPath();
  ctx.arc(0, -tagH * 0.36, 1.8, 0, Math.PI * 2);
  ctx.fill();

  // Crescent moon + small sparkle, both in the goal sand colour with a
  // soft glow. The crescent reads as a "magic of the night" emblem
  // matching the hero art.
  const goal = JUICE[GOAL_COLOR];
  ctx.shadowColor = goal.mid;
  ctx.shadowBlur = 8;
  // Crescent: outer disc minus an inner offset disc (use globalCompositeOperation
  // for a clean cutout)
  ctx.fillStyle = goal.top;
  ctx.beginPath();
  ctx.arc(-size * 0.05, size * 0.04, size * 0.26, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.globalCompositeOperation = 'destination-out';
  ctx.beginPath();
  ctx.arc(size * 0.06, -size * 0.02, size * 0.22, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalCompositeOperation = 'source-over';

  // Tiny 4-point sparkle next to the crescent
  ctx.fillStyle = '#fff8c0';
  ctx.shadowColor = '#ffe48a';
  ctx.shadowBlur = 4;
  const sx = size * 0.30, sy = -size * 0.28;
  const sr = size * 0.10;
  ctx.beginPath();
  for (let k = 0; k < 4; k++) {
    const a0 = k * Math.PI / 2;
    const a1 = a0 + Math.PI / 4;
    ctx.lineTo(sx + Math.cos(a0) * sr,        sy + Math.sin(a0) * sr);
    ctx.lineTo(sx + Math.cos(a1) * sr * 0.35, sy + Math.sin(a1) * sr * 0.35);
  }
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

// ============================================================
// RENDER: FLOW LINE
// ============================================================
function drawFlowLine() {
  if (!flowLine) return;
  const f = flowLine;
  const src = f.src;
  const dst = f.dst;

  // Spout is at the LIP CORNER on the tilting side. Potion bottles have a
  // narrow lip (±w * POTION_LIP_X_FRAC ≈ 0.25w); the tall flask uses the
  // body width (≈ 0.42w). Stream y just below the lip top.
  const spoutLocalXFrac = src.isObjective ? 0.42 : POTION_LIP_X_FRAC;
  const spoutLocalX = f.sign * src.w * spoutLocalXFrac;
  const spoutLocalY = -src.h + src.w * 0.06;
  const cos = Math.cos(src.angle), sin = Math.sin(src.angle);
  const spoutX = src.x + spoutLocalX * cos - spoutLocalY * sin;
  const spoutY = src.y + src.lift + spoutLocalX * sin + spoutLocalY * cos;

  const landY = getLayerTopY(dst, Math.min(dst.capacity || CAPACITY, dst.fillLevel + 0.1));
  const landX = dst.x;

  ctx.save();
  ctx.globalAlpha = f.alpha;
  const juice = JUICE[f.color];
  const midX = (spoutX + landX) / 2;
  const midY = (spoutY + landY) / 2 + 4;
  const streamW = src.w * 0.11;

  // Build the stream silhouette — quadratic-bezier curve from spout to
  // landing with a parallel curve mirrored to give it width.
  ctx.beginPath();
  ctx.moveTo(spoutX - streamW * 0.7, spoutY);
  ctx.quadraticCurveTo(midX - streamW * 0.5, midY, landX - streamW * 0.55, landY);
  ctx.lineTo(landX + streamW * 0.55, landY);
  ctx.quadraticCurveTo(midX + streamW * 0.5, midY, spoutX + streamW * 0.7, spoutY);
  ctx.closePath();

  // Solid base fill in juice.mid
  ctx.fillStyle = juice.mid;
  ctx.fill();

  // Granular sand-grain overlay re-fills the SAME path so the stream gets
  // the same speckled look as the liquid in the bottles. Pattern is
  // animated downward (gravity direction) so the grains visually FLOW
  // along the stream instead of sitting still — sells the "pouring sand"
  // effect without per-grain particle work.
  if (sandGrainPattern) {
    const m = new DOMMatrix();
    m.translateSelf(0, (totalTime * 90) % SAND_GRAIN_TILE);
    sandGrainPattern.setTransform(m);
    ctx.fillStyle = sandGrainPattern;
    ctx.fill();
    sandGrainPattern.setTransform(new DOMMatrix());   // reset for other consumers
  }

  // Bright top stroke (juice.top) — keeps the stream's specular edge
  ctx.strokeStyle = juice.top;
  ctx.lineWidth = streamW * 0.32;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(spoutX - streamW * 0.2, spoutY);
  ctx.quadraticCurveTo(midX - streamW * 0.2, midY, landX - streamW * 0.2, landY);
  ctx.stroke();

  // Landing dots — bright top + dark mound below for visual anchor
  ctx.fillStyle = juice.top;
  ctx.beginPath();
  ctx.arc(landX, landY - 1, streamW * 0.7, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = juice.bot;
  ctx.beginPath();
  ctx.arc(landX, landY + 1, streamW * 0.35, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// ============================================================
// RENDER: UI
// ============================================================
function drawLogo() {
  const lw = Math.min(160, W * 0.22);
  const lh = lw * 0.62;
  const lx = 10, ly = 10;
  ctx.save();

  // Golden swirl — semicircle of dotted/feathered gold curving around
  // the bottom-left of the logo (matches the hero art's "magic dust"
  // flourish).
  ctx.save();
  ctx.translate(lx + lw * 0.15, ly + lh * 0.55);
  ctx.strokeStyle = '#ffd86a';
  ctx.shadowColor = '#ffac35';
  ctx.shadowBlur = 8;
  ctx.lineWidth = 2.2;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(0, 0, lh * 0.55, Math.PI * 0.85, Math.PI * 1.85);
  ctx.stroke();
  // Tiny gold sparkle dots along the swirl
  ctx.shadowBlur = 4;
  ctx.fillStyle = '#fff2c4';
  for (let k = 0; k < 5; k++) {
    const a = Math.PI * (0.9 + k * 0.22);
    ctx.beginPath();
    ctx.arc(Math.cos(a) * lh * 0.65, Math.sin(a) * lh * 0.65, 1.6, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;
  ctx.restore();

  // "MAGIC" — bold purple with white outline
  ctx.font = 'bold ' + Math.floor(lh * 0.32) + 'px "Cooper Black", Georgia, serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.lineJoin = 'round';
  // Stroke (white outline)
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 4;
  ctx.strokeText('MAGIC', lx + lw / 2, ly + lh * 0.30);
  // Fill (vibrant purple gradient)
  const mg = ctx.createLinearGradient(0, ly + lh * 0.18, 0, ly + lh * 0.42);
  mg.addColorStop(0, '#cc7dff');
  mg.addColorStop(1, '#8b3fd8');
  ctx.fillStyle = mg;
  ctx.fillText('MAGIC', lx + lw / 2, ly + lh * 0.30);

  // "SAND" — bigger, same style
  ctx.font = 'bold ' + Math.floor(lh * 0.38) + 'px "Cooper Black", Georgia, serif';
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 4;
  ctx.strokeText('SAND', lx + lw / 2, ly + lh * 0.70);
  const sg = ctx.createLinearGradient(0, ly + lh * 0.55, 0, ly + lh * 0.88);
  sg.addColorStop(0, '#cc7dff');
  sg.addColorStop(1, '#8b3fd8');
  ctx.fillStyle = sg;
  ctx.fillText('SAND', lx + lw / 2, ly + lh * 0.70);

  ctx.restore();
}

function drawCTA() {
  const cw = Math.min(240, W * 0.52);
  const ch = 56;
  const cx = W / 2;
  const cy = H - ch / 2 - 18;
  ctaHitBox = { x: cx - cw/2, y: cy - ch/2, w: cw, h: ch };

  const pulse = 1 + Math.sin(totalTime * 3.2) * 0.04;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(pulse, pulse);
  ctx.shadowColor = 'rgba(0,0,0,0.55)';
  ctx.shadowBlur = 12;
  ctx.shadowOffsetY = 4;
  // Golden CTA — matches the magic-sand swirl in the logo
  const g = ctx.createLinearGradient(0, -ch/2, 0, ch/2);
  g.addColorStop(0, '#ffe48a');
  g.addColorStop(0.5, '#ffb73a');
  g.addColorStop(1, '#c47008');
  ctx.fillStyle = g;
  roundRectPath(-cw/2, -ch/2, cw, ch, ch/2);
  ctx.fill();
  ctx.shadowColor = 'transparent';
  ctx.strokeStyle = '#fff2c4';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.fillStyle = '#3a1a06';
  ctx.font = 'bold 22px "Cooper Black",Georgia,serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(won ? 'DOWNLOAD NOW' : 'PLAY NOW', 0, 0);
  ctx.restore();
}

function drawWinOverlay() {
  ctx.save();
  ctx.fillStyle = 'rgba(8,2,18,0.55)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff2c4';
  ctx.font = 'bold 44px "Cooper Black",Georgia,serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(255,196,70,0.9)';
  ctx.shadowBlur = 24;
  ctx.fillText('SAND ALIGNED!', W/2, H * 0.3);
  ctx.shadowBlur = 0;
  ctx.font = '18px Georgia,serif';
  ctx.fillStyle = '#ffd97a';
  ctx.fillText('100+ enchanting levels inside', W/2, H * 0.3 + 32);
  ctx.restore();
}

function hitCTA(px, py) {
  if (!ctaHitBox) return false;
  return px >= ctaHitBox.x && px <= ctaHitBox.x + ctaHitBox.w &&
         py >= ctaHitBox.y && py <= ctaHitBox.y + ctaHitBox.h;
}
function fireCTA() {
  sfxClick();
  try {
    if (window.mraid && window.mraid.open) window.mraid.open('https://apps.apple.com/');
    else if (window.install) window.install();
  } catch(e) {}
}

// ============================================================
// MAIN LOOP
// ============================================================
let lastTime = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - lastTime) / 1000);
  lastTime = now;
  totalTime += dt;

  updateTweens(dt);
  updateParticles(dt);
  emitFlowDroplets(dt);

  // Trigger potion-sealing sequence the first frame a bottle becomes complete:
  //   1. Cork stopper drops straight down onto the rim
  //   2. First magic smoke wisp rises from the cork and fades
  //   3. Second smoke wisp follows, slightly offset, for a layered puff
  for (const b of bottles) {
    const done = isBottleCompleted(b);
    if (done && !b.capTriggered) {
      b.capTriggered = true;
      b.umbrellaProgress = 0;
      b.ice1Progress = 0;
      b.ice2Progress = 0;
      tween(b, { umbrellaProgress: 1 }, 0.42, { ease: 'outCubic' });
      // Smoke wisps don't bounce — outCubic on a 0→1 lift gives a gentle
      // ease-out as they reach the top of the rise (outBounce would create
      // a "fall back / rise again" effect that breaks smoke physics).
      tween(b, { ice1Progress: 1 },     0.85, { delay: 0.25, ease: 'outCubic' });
      tween(b, { ice2Progress: 1 },     0.85, { delay: 0.45, ease: 'outCubic' });
      sfxSealed();
    }
  }

  drawBackground();

  // Ordering: objective behind other glasses, selected/animating on top
  const order = bottles.slice().sort((a, b) => {
    if (a.isObjective !== b.isObjective) return a.isObjective ? -1 : 1;
    const aAnim = (a === selected || (isAnimating && a.angle !== 0));
    const bAnim = (b === selected || (isAnimating && b.angle !== 0));
    if (aAnim !== bAnim) return aAnim ? 1 : -1;
    return a.baseY - b.baseY;
  });
  for (const b of order) drawGlass(b);

  drawFlowLine();
  drawParticles();

  drawLogo();
  drawCTA();
  if (won) drawWinOverlay();

  requestAnimationFrame(loop);
}

// ============================================================
// BOOT
// ============================================================
buildLevel();
resize();
buildSandGrainPattern();   // one-time noise tile generation
requestAnimationFrame(loop);

})();
</script>
